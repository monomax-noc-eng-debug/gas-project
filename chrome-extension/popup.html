<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #181b1f; color: #d8d9da; padding: 10px; margin: 0; line-height: 1.2; font-size: 13px; }
    h2 { font-size: 14px; color: #32a852; padding-bottom: 5px; border-bottom: 1px solid #333; margin: 0 0 5px 0; display: flex; justify-content: space-between; align-items: center; }
    
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
    .ok-dot { background-color: #32a852; }
    .danger-dot { background-color: #e02f44; }
    .warn-dot { background-color: #e5a93d; }

    .section { border-bottom: 1px solid #222; padding-bottom: 5px; margin-bottom: 5px; }
    .section:last-child { border-bottom: none; }
    
    .section-header { font-size: 11px; color: #999; text-transform: uppercase; font-weight: bold; margin-bottom: 3px; display: flex; justify-content: space-between; align-items: center; }
    .time-tiny { font-size: 9px; color: #666; text-transform: none; font-weight: normal; }

    .compact-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px 8px; }
    .compact-grid.err { grid-template-columns: repeat(3, 1fr); }
    
    .item { display: flex; justify-content: space-between; align-items: baseline; }
    .label { font-size: 12px; color: #999; margin-right: 4px; }
    .value { font-weight: bold; color: #fff; }
    .ok { color: #32a852; } .danger { color: #e02f44; } .warn { color: #e5a93d; }

    #alerts-container { background: #3d1c1d; border-left: 3px solid #e02f44; padding: 4px; margin-bottom: 5px; display: none; }
    .alert-title { color: #ff8a8a; font-size: 11px; font-weight: bold; margin-bottom: 2px; }
    .alert-item { color: #ff8a8a; font-size: 11px; margin-bottom: 1px; }

    /* สไตล์ปุ่มกดสลับโหมด */
    #toggle-btn { cursor: pointer; user-select: none; font-size: 11px; font-weight: normal; background: #2a2d32; padding: 3px 8px; border-radius: 4px; border: 1px solid #444; transition: 0.2s; display: flex; align-items: center; color: #fff; }
    #toggle-btn:hover { background: #3a3d42; }
  </style>
</head>
<body>
  <h2>
    Monomax Monitor
    <div id="toggle-btn">
      <span class="status-dot ok-dot" id="status-dot"></span><span id="toggle-text">Active</span>
    </div>
  </h2>
  
  <div id="alerts-container">
    <div class="alert-title">ALERTS</div>
    <div id="alerts-list"></div>
  </div>

  <div class="section">
    <div class="section-header">
      <span>Tomcat <span class="time-tiny">(192.168.13.13)</span></span>
      <span class="time-tiny" id="tc-countdown">--:--</span>
    </div>
    <div class="item" style="margin-bottom: 2px;">
      <span class="value" id="tc-status" style="font-size:12px;">กำลังรอ...</span>
      <span class="value" id="tc-rt">-- ms</span>
    </div>
    <div class="time-tiny" style="text-align: right; color: #666;" id="tc-time">--</div>
  </div>

  <div class="section">
    <div class="section-header">
      Grafana <span class="time-tiny" id="gf-time">--</span>
    </div>
    <div class="compact-grid" style="margin-bottom: 3px;">
      <div class="item"><span class="label">st: me</span><span class="value" id="st-mono">--</span></div>
      <div class="item"><span class="label">st: www</span><span class="value" id="st-www">--</span></div>
    </div>
    <div class="compact-grid" style="margin-bottom: 3px;">
      <div class="item"><span class="label">rt: me</span><span class="value" id="dr-mono">--s</span></div>
      <div class="item"><span class="label">rt: www</span><span class="value" id="dr-www">--s</span></div>
    </div>
    <div class="compact-grid" style="margin-bottom: 3px;">
      <div class="item"><span class="label">rt: elb</span><span class="value" id="dr-elb">--s</span></div>
    </div>
    <div class="compact-grid err">
      <div class="item"><span class="label">er: 5w</span><span class="value" id="er-5w">--</span></div>
      <div class="item"><span class="label">er: 5v</span><span class="value" id="er-5v">--</span></div>
      <div class="item"><span class="label">er: 4v</span><span class="value" id="er-4v">--</span></div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>

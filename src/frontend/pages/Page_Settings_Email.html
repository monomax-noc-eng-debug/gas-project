<div id="page-settings-email"
  class="page-section hidden w-full h-full relative bg-base-200 overflow-hidden flex flex-col p-3 gap-2">

  <!-- Header -->
  <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-xl shadow-sm border border-base-300 shrink-0">
    <div class="flex items-center gap-2">
      <div class="bg-purple-50 p-1.5 rounded-lg text-purple-500"><i class="fas fa-envelope-open-text text-sm"></i></div>
      <div class="hidden sm:block">
        <h2 class="text-xs font-bold text-gray-800">ตั้งค่าอีเมล</h2>
      </div>
    </div>
    <div class="flex items-center gap-1.5 ml-auto">
      <button id="btn-refresh-settings-email" onclick="EmailSettings.loadData(true)"
        class="btn btn-xs btn-outline border-slate-300 text-slate-600 hover:bg-slate-100 hover:text-slate-800 hover:border-slate-400 gap-1.5 px-3">
        <span class="loading loading-spinner loading-xs text-slate-500"></span>
        <i class="fas fa-sync-alt text-[10px]"></i>
        <span class="hidden sm:inline text-[11px] font-semibold">โหลดใหม่</span>
      </button>
      <button onclick="EmailSettings.openAdd()"
        class="btn btn-xs btn-primary text-white shadow-sm gap-1.5 px-3 hover:shadow-md">
        <i class="fas fa-plus text-[10px]"></i>
        <span class="hidden sm:inline text-[11px] font-semibold">เพิ่ม</span>
      </button>
      <button onclick="EmailSettings.saveAll()"
        class="btn btn-xs btn-primary text-white shadow-sm gap-1.5 px-3 hover:shadow-md">
        <i class="fas fa-save text-[10px]"></i>
        <span class="hidden sm:inline text-[11px] font-semibold">บันทึก</span>
      </button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="flex gap-1 shrink-0">
    <button onclick="EmailSettings.switchTab('profiles')" data-emtab="profiles"
      class="em-tab-btn btn btn-sm bg-white border-base-200 shadow-sm font-semibold text-gray-500 hover:text-primary gap-1.5"><i
        class="fas fa-address-book text-primary text-[10px]"></i> Profiles <span
        class="badge badge-ghost badge-xs font-mono" id="em-cnt-profiles">0</span></button>
    <button onclick="EmailSettings.switchTab('templates')" data-emtab="templates"
      class="em-tab-btn btn btn-sm bg-white border-base-200 shadow-sm font-semibold text-gray-500 hover:text-primary gap-1.5"><i
        class="fas fa-file-signature text-warning text-[10px]"></i> Templates <span
        class="badge badge-ghost badge-xs font-mono" id="em-cnt-templates">0</span></button>
  </div>

  <!-- Table Card -->
  <div class="flex-1 bg-white rounded-2xl shadow-sm border border-base-200 flex flex-col overflow-hidden min-h-0">
    <div class="flex-1 overflow-y-auto">
      <table class="table table-sm w-full">
        <thead class="bg-base-100 sticky top-0 z-10" id="em-thead">
          <tr>
            <th class="w-12 text-center">#</th>
            <th>ชื่อ</th>
            <th>To</th>
            <th>CC</th>
            <th class="w-28 text-center">จัดการ</th>
          </tr>
        </thead>
        <tbody id="em-table-body"></tbody>
      </table>

      <div id="em-loader" class="hidden flex-col w-full bg-white z-10">
        <div class="p-4 space-y-4 w-full">
          <div class="flex gap-4 w-full items-center">
            <div class="skeleton h-8 w-12 rounded-lg"></div>
            <div class="skeleton h-8 flex-1 rounded-lg"></div>
            <div class="skeleton h-8 flex-1 rounded-lg"></div>
            <div class="skeleton h-8 flex-1 rounded-lg"></div>
            <div class="skeleton h-8 w-28 rounded-lg"></div>
          </div>
          <div class="flex gap-4 w-full items-center">
            <div class="skeleton h-8 w-12 rounded-lg"></div>
            <div class="skeleton h-8 flex-1 rounded-lg"></div>
            <div class="skeleton h-8 flex-1 rounded-lg"></div>
            <div class="skeleton h-8 flex-1 rounded-lg"></div>
            <div class="skeleton h-8 w-28 rounded-lg"></div>
          </div>
          <div class="flex gap-4 w-full items-center">
            <div class="skeleton h-8 w-12 rounded-lg"></div>
            <div class="skeleton h-8 flex-1 rounded-lg"></div>
            <div class="skeleton h-8 flex-1 rounded-lg"></div>
            <div class="skeleton h-8 flex-1 rounded-lg"></div>
            <div class="skeleton h-8 w-28 rounded-lg"></div>
          </div>
          <div class="flex gap-4 w-full items-center">
            <div class="skeleton h-8 w-12 rounded-lg"></div>
            <div class="skeleton h-8 flex-1 rounded-lg"></div>
            <div class="skeleton h-8 flex-1 rounded-lg"></div>
            <div class="skeleton h-8 flex-1 rounded-lg"></div>
            <div class="skeleton h-8 w-28 rounded-lg"></div>
          </div>
        </div>
      </div>

      <div id="em-empty" class="hidden text-center py-16 text-gray-300"><i class="fas fa-inbox text-4xl mb-3"></i>
        <p class="text-sm font-semibold">ยังไม่มีข้อมูล</p>
      </div>
    </div>
  </div>

  <!-- Modal: Profile -->
  <dialog id="modal-em-profile" class="modal">
    <div class="modal-box max-w-md">
      <h3 class="font-bold text-base mb-4" id="em-profile-title">เพิ่ม Email Profile</h3>
      <input type="hidden" id="em-profile-idx" value="-1">
      <div class="form-control mb-3">
        <label class="label pb-1"><span class="label-text text-xs font-bold">Profile Name</span></label>
        <input type="text" id="em-in-name" class="input input-sm input-bordered w-full" placeholder="เช่น NOC Team">
      </div>
      <div class="form-control mb-3">
        <label class="label pb-1"><span class="label-text text-xs font-bold">To</span></label>
        <input type="text" id="em-in-to" class="input input-sm input-bordered w-full font-mono text-xs"
          placeholder="email@example.com">
      </div>
      <div class="form-control mb-3">
        <label class="label pb-1"><span class="label-text text-xs font-bold">CC <span
              class="text-gray-400 font-normal">(optional)</span></span></label>
        <input type="text" id="em-in-cc" class="input input-sm input-bordered w-full font-mono text-xs"
          placeholder="cc@example.com">
      </div>
      <div class="modal-action mt-4">
        <button class="btn btn-sm btn-ghost"
          onclick="document.getElementById('modal-em-profile').close()">ยกเลิก</button>
        <button class="btn btn-sm btn-primary" onclick="EmailSettings.saveProfileModal()">บันทึก</button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>

  <!-- Modal: Template (ข้อมูลบริษัท - เหมือน Ticket Specs Site Info) -->
  <dialog id="modal-em-template" class="modal">
    <div class="modal-box max-w-lg">
      <h3 class="font-bold text-base mb-4" id="em-tmpl-title">เพิ่ม Template</h3>
      <input type="hidden" id="em-tmpl-idx" value="-1">

      <div class="form-control mb-3">
        <label class="label pb-1"><span class="label-text text-xs font-bold">Template Name</span></label>
        <input type="text" id="em-tmpl-name" class="input input-sm input-bordered w-full" placeholder="ชื่อเทมเพลต">
      </div>

      <!-- ข้อมูลผู้ติดต่อ / บริษัท (Site Info) -->
      <div class="bg-blue-50/60 p-3 rounded-lg border border-blue-100 mb-3 space-y-3">
        <p class="text-[10px] font-bold text-blue-600 uppercase flex items-center gap-1.5">
          <i class="fas fa-building text-[9px]"></i> ข้อมูลผู้ติดต่อ / บริษัท (Site Info)
        </p>
        <div class="grid grid-cols-2 gap-3">
          <div class="form-control">
            <label class="label pb-0.5"><span class="label-text text-[10px] font-bold text-blue-700">Company
                Name</span></label>
            <input type="text" id="em-tmpl-company" class="input input-sm input-bordered w-full text-xs bg-white">
          </div>
          <div class="form-control">
            <label class="label pb-0.5"><span class="label-text text-[10px] font-bold text-blue-700">Contact
                Name</span></label>
            <select id="em-tmpl-contact" class="select select-sm select-bordered w-full text-xs bg-white">
              <option value="">เลือกผู้ติดต่อ (Contact Name)...</option>
            </select>
          </div>
          <div class="form-control">
            <label class="label pb-0.5"><span class="label-text text-[10px] font-bold text-blue-700">Contact
                Number</span></label>
            <input type="text" id="em-tmpl-contactNum" class="input input-sm input-bordered w-full text-xs bg-white">
          </div>
          <div class="form-control">
            <label class="label pb-0.5"><span class="label-text text-[10px] font-bold text-blue-700">Site Contact
                Name</span></label>
            <select id="em-tmpl-siteName" class="select select-sm select-bordered w-full text-xs bg-white">
              <option value="">เลือกผู้ติดต่อหน้างาน (Site Contact Name)...</option>
            </select>
          </div>
          <div class="form-control">
            <label class="label pb-0.5"><span class="label-text text-[10px] font-bold text-blue-700">Site Contact
                Number</span></label>
            <input type="text" id="em-tmpl-siteNum" class="input input-sm input-bordered w-full text-xs bg-white">
          </div>
          <div class="form-control">
            <label class="label pb-0.5"><span class="label-text text-[10px] font-bold text-blue-700">Site
                Email</span></label>
            <input type="text" id="em-tmpl-siteEmail" class="input input-sm input-bordered w-full text-xs bg-white">
          </div>
          <div class="form-control col-span-2">
            <label class="label pb-0.5"><span class="label-text text-[10px] font-bold text-blue-700">Site
                Address</span></label>
            <input type="text" id="em-tmpl-siteAddr" class="input input-sm input-bordered w-full text-xs bg-white"
              placeholder="รายละเอียดที่อยู่...">
          </div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3 mb-3">
        <div class="form-control">
          <label class="label pb-1"><span class="label-text text-xs font-bold">Greeting (คำทักทาย)</span></label>
          <input type="text" id="em-tmpl-greeting" class="input input-sm input-bordered w-full text-xs"
            placeholder="คำทักทาย...">
        </div>
        <div class="form-control">
          <label class="label pb-1"><span class="label-text text-xs font-bold">ผลกระทบ (Impact)</span></label>
          <input type="text" id="em-tmpl-impact" class="input input-sm input-bordered w-full text-xs"
            placeholder="ระบุผลกระทบ...">
        </div>
      </div>

      <div class="modal-action mt-4">
        <button class="btn btn-sm btn-ghost"
          onclick="document.getElementById('modal-em-template').close()">ยกเลิก</button>
        <button class="btn btn-sm btn-primary" onclick="EmailSettings.saveTmplModal()">บันทึก</button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>
</div>

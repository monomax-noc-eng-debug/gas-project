<div id="page-settings-tags"
  class="page-section hidden w-full h-full relative bg-base-200 overflow-hidden flex flex-col p-3 gap-2">

  <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-xl shadow-sm border border-base-300 shrink-0">
    <div class="flex items-center gap-2">
      <div class="bg-sky-50 p-1.5 rounded-lg text-sky-500"><i class="fas fa-tags text-sm"></i></div>
      <div class="hidden sm:block">
        <h2 class="text-xs font-bold text-gray-800">จัดการแท็ก</h2>
      </div>
    </div>
    <div class="flex items-center gap-1.5 ml-auto">
      <button id="btn-refresh-settings-tags" onclick="TagSettings.loadData(true)"
        class="btn btn-xs btn-outline border-slate-300 text-slate-600 hover:bg-slate-100 hover:text-slate-800 hover:border-slate-400 gap-1.5 px-3">
        <span class="loading loading-spinner loading-xs text-slate-500"></span>
        <i class="fas fa-sync-alt text-[10px]"></i>
        <span class="hidden sm:inline text-[11px] font-semibold">โหลดใหม่</span>
      </button>
      <button onclick="TagSettings.openAdd()"
        class="btn btn-xs btn-primary text-white shadow-sm gap-1.5 px-3 hover:shadow-md">
        <i class="fas fa-plus text-[10px]"></i>
        <span class="hidden sm:inline text-[11px] font-semibold">เพิ่ม</span>
      </button>
      <button onclick="TagSettings.saveAll()"
        class="btn btn-xs btn-primary text-white shadow-sm gap-1.5 px-3 hover:shadow-md">
        <i class="fas fa-save text-[10px]"></i>
        <span class="hidden sm:inline text-[11px] font-semibold">บันทึก</span>
      </button>
    </div>
  </div>

  <!-- Tab Headers -->
  <div role="tablist" class="tabs tabs-boxed bg-white border border-base-200 shadow-sm w-fit p-1 shrink-0">
    <a role="tab" onclick="TagSettings.switchTab('handover')" data-tagtab="handover"
      class="tag-tab-btn tab tab-active text-xs font-bold gap-2 text-info px-4">
      <i class="fas fa-hashtag"></i> Handover Tags
      <span class="badge badge-info badge-sm font-mono" id="tag-cnt">0</span>
    </a>
    <a role="tab" onclick="TagSettings.switchTab('playbook')" data-tagtab="playbook"
      class="tag-tab-btn tab text-xs font-bold gap-2 text-emerald-600 px-4">
      <i class="fas fa-book"></i> Playbook Categories
      <span class="badge badge-success badge-sm font-mono text-white" id="pb-cat-cnt">0</span>
    </a>
  </div>

  <div class="flex-1 bg-white rounded-xl shadow-sm border border-base-200 flex flex-col overflow-hidden min-h-0">
    <div class="flex-1 overflow-y-auto">
      <table class="table table-sm w-full">
        <thead class="bg-base-100 sticky top-0 z-10">
          <tr>
            <th class="w-12 text-center text-[10px]">#</th>
            <th id="tag-th-name" class="text-[10px]">ชื่อแท็ก</th>
            <th class="w-20 text-center text-[10px]">จัดการ</th>
          </tr>
        </thead>
        <tbody id="tag-tbody"></tbody>
      </table>

      <div id="tag-loader" class="hidden flex-col w-full bg-white z-10">
        <div class="p-3 space-y-3 w-full">
          <div class="flex gap-4 w-full items-center">
            <div class="skeleton h-7 w-12 rounded-lg"></div>
            <div class="skeleton h-7 flex-1 rounded-lg"></div>
            <div class="skeleton h-7 w-20 rounded-lg"></div>
          </div>
          <div class="flex gap-4 w-full items-center">
            <div class="skeleton h-7 w-12 rounded-lg"></div>
            <div class="skeleton h-7 flex-1 rounded-lg"></div>
            <div class="skeleton h-7 w-20 rounded-lg"></div>
          </div>
          <div class="flex gap-4 w-full items-center">
            <div class="skeleton h-7 w-12 rounded-lg"></div>
            <div class="skeleton h-7 flex-1 rounded-lg"></div>
            <div class="skeleton h-7 w-20 rounded-lg"></div>
          </div>
          <div class="flex gap-4 w-full items-center">
            <div class="skeleton h-7 w-12 rounded-lg"></div>
            <div class="skeleton h-7 flex-1 rounded-lg"></div>
            <div class="skeleton h-7 w-20 rounded-lg"></div>
          </div>
        </div>
      </div>

      <div id="tag-empty" class="hidden text-center py-16 text-gray-300">
        <i class="fas fa-inbox text-4xl mb-3"></i>
        <p class="text-xs font-semibold">ยังไม่มีข้อมูล</p>
      </div>
    </div>

    <div class="p-2 px-4 border-t border-base-100 bg-base-50 flex items-center text-[10px] text-gray-400">
      <span id="tag-footer-hint"><i class="fas fa-info-circle mr-1"></i> สำหรับหน้าลงบันทึก Handover</span>
    </div>
  </div>

  <dialog id="modal-tag-item" class="modal">
    <div class="modal-box max-w-xs">
      <h3 class="font-bold text-base mb-4" id="tag-modal-title">เพิ่มแท็ก</h3>
      <input type="hidden" id="tag-edit-idx" value="-1">
      <input type="hidden" id="tag-edit-type" value="handover">
      <div class="form-control mb-3">
        <label class="label pb-1"><span class="label-text text-xs font-bold" id="tag-label-name">ชื่อแท็ก</span></label>
        <input type="text" id="tag-input-name" class="input input-sm input-bordered w-full" placeholder="กรอกชื่อ...">
      </div>
      <div class="modal-action mt-4">
        <button class="btn btn-sm btn-ghost" onclick="document.getElementById('modal-tag-item').close()">ยกเลิก</button>
        <button class="btn btn-sm btn-primary" onclick="TagSettings.saveModal()">บันทึก</button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>
</div>

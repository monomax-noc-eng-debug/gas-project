<div id="page-settings-tags"
  class="page-section hidden w-full h-full relative bg-base-200 overflow-hidden flex flex-col p-3 gap-2">

  <!-- Header -->
  <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-xl shadow-sm border border-base-300 shrink-0">
    <div class="flex items-center gap-2">
      <div class="bg-sky-50 p-1.5 rounded-lg text-sky-500"><i class="fas fa-tags text-sm"></i></div>
      <div class="hidden sm:block">
        <h2 class="text-xs font-bold text-gray-800">Handover Tags</h2>
      </div>
    </div>
    <div class="flex items-center gap-1 ml-auto">
      <button onclick="TagSettings.loadData(true)" class="btn btn-xs btn-ghost btn-circle" title="รีเฟรช"><i
          class="fas fa-sync-alt text-gray-400 text-[10px]"></i></button>
      <button onclick="TagSettings.openAdd()" class="btn btn-xs btn-accent text-white shadow-sm gap-1 px-3 h-7"><i
          class="fas fa-plus text-[10px]"></i> เพิ่ม</button>
      <button onclick="TagSettings.saveAll()" class="btn btn-xs btn-primary shadow-sm gap-1 px-3 h-7"><i
          class="fas fa-save text-[10px]"></i> บันทึก</button>
    </div>
  </div>

  <!-- Table Card -->
  <div class="flex-1 bg-white rounded-xl shadow-sm border border-base-200 flex flex-col overflow-hidden min-h-0">
    <div class="px-4 py-3 border-b border-base-100 flex justify-between items-center bg-sky-50/30 shrink-0">
      <h3 class="text-xs font-bold text-sky-700 uppercase flex items-center gap-2"><i class="fas fa-hashtag"></i>
        รายการแท็ก</h3>
      <span class="badge badge-info badge-outline badge-xs font-mono" id="tag-cnt">0</span>
    </div>
    <div class="flex-1 overflow-y-auto">
      <table class="table table-sm w-full">
        <thead class="bg-base-100 sticky top-0 z-10">
          <tr>
            <th class="w-12 text-center">#</th>
            <th>ชื่อแท็ก</th>
            <th class="w-28 text-center">จัดการ</th>
          </tr>
        </thead>
        <tbody id="tag-tbody"></tbody>
      </table>

      <div id="tag-loader" class="hidden flex-col w-full bg-white z-10">
        <div class="p-4 space-y-4 w-full">
          <div class="flex gap-4 w-full items-center">
            <div class="skeleton h-8 w-12 rounded-lg"></div>
            <div class="skeleton h-8 flex-1 rounded-lg"></div>
            <div class="skeleton h-8 w-28 rounded-lg"></div>
          </div>
          <div class="flex gap-4 w-full items-center">
            <div class="skeleton h-8 w-12 rounded-lg"></div>
            <div class="skeleton h-8 flex-1 rounded-lg"></div>
            <div class="skeleton h-8 w-28 rounded-lg"></div>
          </div>
          <div class="flex gap-4 w-full items-center">
            <div class="skeleton h-8 w-12 rounded-lg"></div>
            <div class="skeleton h-8 flex-1 rounded-lg"></div>
            <div class="skeleton h-8 w-28 rounded-lg"></div>
          </div>
          <div class="flex gap-4 w-full items-center">
            <div class="skeleton h-8 w-12 rounded-lg"></div>
            <div class="skeleton h-8 flex-1 rounded-lg"></div>
            <div class="skeleton h-8 w-28 rounded-lg"></div>
          </div>
        </div>
      </div>

      <div id="tag-empty" class="hidden text-center py-16 text-gray-300"><i class="fas fa-inbox text-4xl mb-3"></i>
        <p class="text-sm font-semibold">ยังไม่มีแท็ก</p>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <dialog id="modal-tag-item" class="modal">
    <div class="modal-box max-w-xs">
      <h3 class="font-bold text-base mb-4" id="tag-modal-title">เพิ่มแท็ก</h3>
      <input type="hidden" id="tag-edit-idx" value="-1">
      <div class="form-control mb-3">
        <label class="label pb-1"><span class="label-text text-xs font-bold">ชื่อแท็ก</span></label>
        <input type="text" id="tag-input-name" class="input input-sm input-bordered w-full"
          placeholder="เช่น Ticket, REQ, Routine...">
      </div>
      <div class="modal-action mt-4">
        <button class="btn btn-sm btn-ghost" onclick="document.getElementById('modal-tag-item').close()">ยกเลิก</button>
        <button class="btn btn-sm btn-primary" onclick="TagSettings.saveModal()">บันทึก</button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>
</div>

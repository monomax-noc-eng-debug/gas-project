<div id="page-settings-tags"
  class="page-section hidden w-full h-full relative bg-base-200/50 overflow-hidden flex flex-col p-4 gap-4">

  <!-- Header -->
  <div
    class="flex flex-col md:flex-row justify-between items-center gap-4 bg-white px-5 py-3 rounded-2xl shadow-sm border border-base-300 shrink-0">
    <div class="flex items-center gap-3 w-full md:w-auto">
      <div class="bg-sky-50 p-2.5 rounded-xl text-sky-500"><i class="fas fa-tags text-lg"></i></div>
      <div>
        <h2 class="text-base font-bold text-gray-800">แท็กส่งกะ (Handover Tags)</h2>
        <p class="text-[10px] text-gray-400 font-mono">SYS_Handover_Tags</p>
      </div>
    </div>
    <div class="flex items-center gap-2 w-full md:w-auto justify-end">
      <button onclick="TagSettings.loadData(true)" class="btn btn-sm btn-ghost btn-circle tooltip tooltip-bottom"
        data-tip="รีเฟรช"><i class="fas fa-sync-alt text-gray-400"></i></button>
      <button onclick="TagSettings.openAdd()" class="btn btn-sm btn-accent text-white shadow-sm gap-1 px-4"><i
          class="fas fa-plus text-xs"></i> เพิ่ม</button>
      <button onclick="TagSettings.saveAll()" class="btn btn-sm btn-primary shadow-sm gap-1 px-4"><i
          class="fas fa-save text-xs"></i> บันทึก</button>
    </div>
  </div>

  <!-- Table Card -->
  <div class="flex-1 bg-white rounded-2xl shadow-sm border border-base-200 flex flex-col overflow-hidden min-h-0">
    <div class="px-4 py-3 border-b border-base-100 flex justify-between items-center bg-sky-50/30 shrink-0">
      <h3 class="text-xs font-bold text-sky-700 uppercase flex items-center gap-2"><i class="fas fa-hashtag"></i>
        รายการแท็ก</h3>
      <span class="badge badge-info badge-outline badge-xs font-mono" id="tag-cnt">0</span>
    </div>
    <div class="flex-1 overflow-y-auto">
      <table class="table table-sm w-full">
        <thead class="bg-base-100 sticky top-0 z-10">
          <tr>
            <th class="w-12 text-center">#</th>
            <th>ชื่อแท็ก</th>
            <th class="w-28 text-center">จัดการ</th>
          </tr>
        </thead>
        <tbody id="tag-tbody"></tbody>
      </table>
      <div id="tag-empty" class="hidden text-center py-16 text-gray-300"><i class="fas fa-inbox text-4xl mb-3"></i>
        <p class="text-sm font-semibold">ยังไม่มีแท็ก</p>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <dialog id="modal-tag-item" class="modal">
    <div class="modal-box max-w-xs">
      <h3 class="font-bold text-base mb-4" id="tag-modal-title">เพิ่มแท็ก</h3>
      <input type="hidden" id="tag-edit-idx" value="-1">
      <div class="form-control mb-3">
        <label class="label pb-1"><span class="label-text text-xs font-bold">ชื่อแท็ก</span></label>
        <input type="text" id="tag-input-name" class="input input-sm input-bordered w-full"
          placeholder="เช่น Ticket, REQ, Routine...">
      </div>
      <div class="modal-action mt-4">
        <button class="btn btn-sm btn-ghost" onclick="document.getElementById('modal-tag-item').close()">ยกเลิก</button>
        <button class="btn btn-sm btn-primary" onclick="TagSettings.saveModal()">บันทึก</button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>
</div>

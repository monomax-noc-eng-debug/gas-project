<div id="page-settings-users"
  class="page-section hidden w-full h-full relative bg-base-200/50 overflow-hidden flex flex-col p-4 gap-4">

  <!-- Header -->
  <div
    class="flex flex-col md:flex-row justify-between items-center gap-4 bg-white px-5 py-3 rounded-2xl shadow-sm border border-base-300 shrink-0">
    <div class="flex items-center gap-3 w-full md:w-auto">
      <div class="bg-amber-50 p-2.5 rounded-xl text-amber-500"><i class="fas fa-users-cog text-lg"></i></div>
      <div>
        <h2 class="text-base font-bold text-gray-800">จัดการผู้ใช้งาน</h2>
        <p class="text-[10px] text-gray-400 font-mono">SYS_Users</p>
      </div>
    </div>
    <div class="flex items-center gap-2 w-full md:w-auto justify-end">
      <button onclick="UsrSettings.loadData(true)" class="btn btn-sm btn-ghost btn-circle tooltip tooltip-bottom"
        data-tip="รีเฟรช"><i class="fas fa-sync-alt text-gray-400"></i></button>
      <button onclick="UsrSettings.saveAll()" class="btn btn-sm btn-primary shadow-sm gap-1 px-4"><i
          class="fas fa-save text-xs"></i> บันทึก</button>
    </div>
  </div>

  <!-- Two-Column Tables -->
  <div class="flex-1 grid grid-cols-1 md:grid-cols-2 gap-4 overflow-hidden min-h-0">
    <!-- Staff / Leaders -->
    <div class="bg-white rounded-2xl shadow-sm border border-base-200 flex flex-col overflow-hidden">
      <div class="px-4 py-3 border-b border-base-100 flex justify-between items-center bg-indigo-50/50 shrink-0">
        <h3 class="text-xs font-bold text-indigo-700 uppercase flex items-center gap-2"><i class="fas fa-user-tie"></i>
          ผู้รับผิดชอบ (Leaders) <span class="badge badge-primary badge-outline badge-xs font-mono"
            id="usr-cnt-staff">0</span></h3>
        <button onclick="UsrSettings.openAdd('staff')" class="btn btn-xs btn-accent text-white gap-1"><i
            class="fas fa-plus text-[10px]"></i> เพิ่ม</button>
      </div>
      <div class="flex-1 overflow-y-auto">
        <table class="table table-sm w-full">
          <thead class="bg-base-100 sticky top-0">
            <tr>
              <th class="w-10 text-center">#</th>
              <th>ชื่อ</th>
              <th class="w-24 text-center">จัดการ</th>
            </tr>
          </thead>
          <tbody id="usr-tbody-staff"></tbody>
        </table>
        <div id="usr-empty-staff" class="hidden text-center py-10 text-gray-300"><i
            class="fas fa-user-slash text-2xl mb-2"></i>
          <p class="text-xs font-bold">ไม่มีข้อมูล</p>
        </div>
      </div>
    </div>

    <!-- Operators / Assignees -->
    <div class="bg-white rounded-2xl shadow-sm border border-base-200 flex flex-col overflow-hidden">
      <div class="px-4 py-3 border-b border-base-100 flex justify-between items-center bg-teal-50/50 shrink-0">
        <h3 class="text-xs font-bold text-teal-700 uppercase flex items-center gap-2"><i class="fas fa-users"></i>
          ผู้ปฏิบัติงาน (Operators) <span class="badge badge-accent badge-outline badge-xs font-mono"
            id="usr-cnt-assignees">0</span></h3>
        <button onclick="UsrSettings.openAdd('assignees')" class="btn btn-xs btn-accent text-white gap-1"><i
            class="fas fa-plus text-[10px]"></i> เพิ่ม</button>
      </div>
      <div class="flex-1 overflow-y-auto">
        <table class="table table-sm w-full">
          <thead class="bg-base-100 sticky top-0">
            <tr>
              <th class="w-10 text-center">#</th>
              <th>ชื่อ</th>
              <th class="w-24 text-center">จัดการ</th>
            </tr>
          </thead>
          <tbody id="usr-tbody-assignees"></tbody>
        </table>
        <div id="usr-empty-assignees" class="hidden text-center py-10 text-gray-300"><i
            class="fas fa-user-slash text-2xl mb-2"></i>
          <p class="text-xs font-bold">ไม่มีข้อมูล</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <dialog id="modal-usr-item" class="modal">
    <div class="modal-box max-w-xs">
      <h3 class="font-bold text-base mb-4" id="usr-modal-title">เพิ่มผู้ใช้งาน</h3>
      <input type="hidden" id="usr-edit-role" value="staff">
      <input type="hidden" id="usr-edit-index" value="-1">
      <div class="form-control mb-3">
        <label class="label pb-1"><span class="label-text text-xs font-bold">ชื่อ</span></label>
        <input type="text" id="usr-input-name" class="input input-sm input-bordered w-full" placeholder="กรอกชื่อ...">
      </div>
      <div class="modal-action mt-4">
        <button class="btn btn-sm btn-ghost" onclick="document.getElementById('modal-usr-item').close()">ยกเลิก</button>
        <button class="btn btn-sm btn-primary" onclick="UsrSettings.saveModal()">บันทึก</button>
      </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>
</div>

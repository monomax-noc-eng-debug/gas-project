    <script>
      /**
       * ฟังก์ชันสำหรับปิดหน้าต่างโหลดเต็มจอ
       * *ข้อควรระวัง: คุณต้องนำคำสั่ง hideGlobalLoader() ไปเรียกใช้ใน withSuccessHandler
       * ของการดึงข้อมูลก้อนแรกใน JS_App หรือ JS_Core
       */
      function hideGlobalLoader() {
        const loader = document.getElementById("global-page-loader");
        const mainApp = document.getElementById("main-app");

        if (loader && mainApp) {
          // 1. ทำให้ Loader โปร่งใส
          loader.classList.replace("opacity-100", "opacity-0");
          // 2. แสดง UI หลัก
          mainApp.classList.replace("opacity-0", "opacity-100");

          // 3. รอให้ Animation จบแล้วค่อยซ่อน Loader ทิ้งเพื่อไม่ให้ขวางการคลิก
          setTimeout(() => {
            loader.classList.add("hidden");
          }, 500);
        }
      }

      // [ตัวเลือกเสริม] ป้องกันกรณีเน็ตหลุดหรือโหลดนานเกิน 15 วินาที ให้บังคับเปิด UI เลย
      setTimeout(() => {
        if (
          !document
            .getElementById("global-page-loader")
            .classList.contains("hidden")
        ) {
          console.warn("Loader timeout fallback triggered.");
          hideGlobalLoader();
        }
      }, 15000);
    </script>

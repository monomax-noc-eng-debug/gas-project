<script>
    /**
   * ==========================================
   * MODULE: TICKET VIEW (UI Layer)
   * หน้าที่: จัดการ HTML, Render ตาราง, DaisyUI Components
   * ==========================================
   */
    const TicketView = (() => {
        const getEl = (id) => document.getElementById(id);

        // Helper: Universal Date Parser & Formatter (DD/MM/YY)
        const _formatDate = (val) => {
            if (!val) return '-';
            const strVal = String(val);

            // ถ้าเป็นรูปแบบ YYYY-MM-DD จาก Server
            if (strVal.match(/^\d{4}-\d{2}-\d{2}$/)) {
                const parts = strVal.split('-');
                return `${parts[2]}/${parts[1]}/${parts[0].slice(2)}`;
            }

            // ถ้าเป็นรูปแบบ ISO String (เช่น 2026-02-27T02:09:41.913Z)
            if (strVal.includes('T') && strVal.includes('Z')) {
                const datePart = strVal.split('T')[0];
                const parts = datePart.split('-');
                if (parts.length === 3) {
                    return `${parts[2]}/${parts[1]}/${parts[0].slice(2)}`;
                }
            }

            // ลองแปลงเป็น Date Object
            const d = new Date(val);
            if (!isNaN(d.getTime())) {
                return d.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: '2-digit' });
            }

            return val;
        };

        // Helper: Badge สถานะ (เพิ่ม complete/success)
        const _getStatusBadge = (status) => {
            const s = String(status || '').toLowerCase();
            let color = 'badge-ghost';

            if (s.includes('open')) color = 'badge-error gap-1 text-white';
            else if (s.includes('pending') || s.includes('wait')) color = 'badge-warning gap-1';
            else if (s.includes('resolved') || s.includes('fix') || s.includes('complete') || s.includes('success')) color = 'badge-success gap-1 text-white';
            else if (s.includes('close')) color = 'badge-neutral gap-1';
            else if (s.includes('draft')) color = 'badge-info gap-1 text-white';

            return `<div class="badge ${color} badge-sm font-medium shadow-sm">${status}</div>`;
        };

        return {
            renderTable: (data) => {
                const tbody = getEl('ticket-table-body');
                const empty = getEl('ticket-empty');

                if (!data || data.length === 0) {
                    if (empty) empty.classList.remove('hidden');
                    tbody.innerHTML = '';
                    return;
                }
                if (empty) empty.classList.add('hidden');

                const lastCreatedId = TicketManager.getLastCreatedId();

                tbody.innerHTML = data.map((row, i) => {
                    const id = row.ticketNumber;
                    const subject = row.subject || '(ไม่มีหัวข้อ)';
                    //const assign = row.assign || '-';
                    const resp = row.responsibility || '-';

                    const isNew = lastCreatedId && id === lastCreatedId && String(row.status || '').toLowerCase().includes('open');
                    const rowHighlight = isNew ? 'bg-primary/5 border-l-4 border-l-primary' : '';
                    const newBadge = isNew ? '<span class="badge badge-primary badge-xs text-[8px] h-3.5 px-1.5 shadow-sm ml-1 rounded-sm border-none font-bold">NEW</span>' : '';

                    let severityDot = '';
                    const sev = String(row.severity || '').toUpperCase();
                    if (sev.includes('P1') || sev.includes('URGENT') || sev.includes('CRITICAL')) {
                        severityDot = '<div class="w-2.5 h-2.5 rounded-full bg-error mx-auto tooltip" data-tip="Urgent (P1)"></div>';
                    } else if (sev.includes('P2') || sev.includes('HIGH')) {
                        severityDot = '<div class="w-2.5 h-2.5 rounded-full bg-error/70 mx-auto tooltip" data-tip="High (P2)"></div>';
                    } else if (sev.includes('P3') || sev.includes('MEDIUM')) {
                        severityDot = '<div class="w-2.5 h-2.5 rounded-full bg-warning mx-auto tooltip" data-tip="Medium (P3)"></div>';
                    } else {
                        severityDot = '<div class="w-2.5 h-2.5 rounded-full bg-success mx-auto opacity-40 tooltip" data-tip="Low (P4)"></div>';
                    }

                    return `
                <tr class="hover group cursor-pointer transition-colors border-b border-slate-100 last:border-none ${rowHighlight}" onclick="TicketManager.openModal('EDIT', '${id}')">
                    <td class="font-bold text-primary font-mono text-[11px] whitespace-nowrap align-middle">
                        ${id}
                        ${severityDot}
                    </td>
                    <td>
                        <div class="font-bold text-sm truncate max-w-[200px] md:max-w-xs xl:max-w-md text-slate-700 group-hover:text-primary transition-colors">${subject}</div>
                        <div class="text-[10px] text-slate-400 flex gap-1.5 items-center mt-1">
                            <i class="fas fa-tag opacity-50"></i>
                            <span class="bg-slate-100 px-1.5 py-0.5 rounded text-[9px]">${row.category || '-'}</span>
                            <span class="opacity-50">•</span>
                            <span class="truncate max-w-[120px]">${row.subCategory || '-'}</span>
                            ${newBadge}
                        </div>
                    </td>
                    <td class="text-center align-middle">
                        ${_getStatusBadge(row.status)}
                    </td>
                    <td class="text-xs opacity-70 font-mono whitespace-nowrap">
                        <div class="flex items-center gap-1.5">
                            <i class="far fa-calendar-alt opacity-50"></i>
                            ${_formatDate(row.date)}
                        </div>
                        <div class="text-[9px] opacity-60 mt-0.5">${row.time || ''}</div>
                    </td>
                    <td class="text-center">
                        <div class="flex justify-center gap-1.5">
                            <button onclick="event.stopPropagation(); TicketManager.openModal('EDIT', '${id}')" class="btn btn-square btn-xs btn-ghost bg-white shadow-sm border border-slate-200 text-slate-400 hover:text-primary hover:border-primary/30 transition-all tooltip tooltip-left" data-tip="รายละเอียด">
                                <i class="fas fa-eye text-[10px]"></i>
                            </button>
                            <button onclick="event.stopPropagation(); TicketManager.openModal('EDIT', '${id}')" class="btn btn-square btn-xs btn-ghost bg-white shadow-sm border border-slate-200 text-slate-400 hover:text-indigo-500 hover:border-indigo-500/30 transition-all tooltip tooltip-left hidden sm:flex" data-tip="แก้ไข">
                                <i class="fas fa-pencil-alt text-[10px]"></i>
                            </button>
                            <button onclick="event.stopPropagation(); TicketManager.deleteTicket('${id}')" class="btn btn-square btn-xs btn-ghost bg-white shadow-sm border border-slate-200 text-slate-400 hover:text-red-500 hover:border-red-500/30 transition-all tooltip tooltip-left hidden sm:flex" data-tip="ลบ">
                                <i class="fas fa-trash-alt text-[10px]"></i>
                            </button>
                        </div>
                    </td>
                </tr>
                `;
                }).join('');
            },

            renderEmailImportTable: (list) => {
                const tbody = getEl('email-import-body');
                if (!tbody) return;

                if (list.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-slate-400">ไม่พบอีเมลใหม่</td></tr>`;
                    return;
                }

                tbody.innerHTML = list.map((item, index) => {
                    let badge = '', rowClass = '', disabled = '';
                    if (item.status === 'DUPLICATE') {
                        badge = '<span class="badge badge-warning badge-xs gap-1"><i class="fas fa-exclamation-triangle"></i> ซ้ำ</span>';
                        rowClass = 'bg-warning/5 opacity-60';
                        disabled = 'disabled';
                    } else if (item.status === 'NO_SVR') {
                        badge = '<span class="badge badge-error badge-xs gap-1"><i class="fas fa-times-circle"></i> ไม่มี SVR</span>';
                        rowClass = 'bg-error/5';
                    } else {
                        badge = '<span class="badge badge-success badge-xs gap-1"><i class="fas fa-check"></i> ใหม่</span>';
                        rowClass = 'hover:bg-base-100';
                    }

                    // ใช้ _formatDate ที่ปรับปรุงแล้ว
                    return `
                <tr class="${rowClass}">
                    <th>
                        <label>
                            <input type="checkbox" class="checkbox checkbox-xs checkbox-primary chk-email-import" value="${index}" ${disabled} />
                        </label>
                    </th>
                    <td>${badge}</td>
                    <td>
                        <div class="font-bold text-xs truncate max-w-[250px]" title="${item.subject}">
                            ${item.subject}
                        </div>
                        <div class="text-[10px] opacity-50 truncate max-w-[200px]">${item.snippet || ''}</div>
                    </td>
                    <td class="text-xs">
                        <div class="truncate max-w-[120px]" title="${item.from}">${item.from}</div>
                    </td>
                    <td class="text-xs font-mono opacity-70 whitespace-nowrap">
                        ${_formatDate(item.date)}
                    </td>
                </tr>
                `;
                }).join('');
            },

            updateStats: (data) => {
                let s = { total: 0, open: 0, pending: 0, resolved: 0, incident: 0, request: 0 };

                data.forEach(r => {
                    s.total++;
                    const st = String(r.status || '').toLowerCase();
                    const ty = String(r.type || '').toLowerCase();

                    if (st.includes('open') || st.includes('draft')) s.open++;
                    else if (st.includes('pending') || st.includes('wait')) s.pending++;
                    else if (st.includes('resolved') || st.includes('fix') || st.includes('complete') || st.includes('success')) s.resolved++;

                    if (ty.includes('incident') || ty.includes('แจ้งซ่อม')) s.incident++;
                    else if (ty.includes('request') || ty.includes('คำร้อง') || ty.includes('service')) s.request++;
                });

                const setTxt = (id, val) => { const el = getEl(id); if (el) el.innerText = val.toLocaleString(); };
                setTxt('stat-total', s.total);
                setTxt('stat-open', s.open);
                setTxt('stat-pending', s.pending);
                setTxt('stat-resolved', s.resolved);
                setTxt('stat-incident', s.incident);
                setTxt('stat-request', s.request);
            },

            populateSelect: (id, list, placeholder = 'เลือก...') => {
                const el = getEl(id);
                if (!el) return;
                const cur = el.value;
                el.innerHTML = `<option value="">${placeholder}</option>` + list.map(i => `<option value="${i}">${i}</option>`).join('');
                if (cur) el.value = cur;
            },

            populateSelectObj: (id, listObj, placeholder = 'เลือก...') => {
                const el = getEl(id);
                if (!el) return;
                el.innerHTML = `<option value="">${placeholder}</option>` + listObj.map((d, i) => `<option value="${d.id || i}">${d.name}</option>`).join('');
            },

            switchTab: (index) => {
                const content1 = getEl('tab-content-1');
                const content4 = getEl('tab-content-4');
                const btn1 = getEl('tab-btn-detail');
                const btn4 = getEl('tab-btn-email');

                if (content1 && content4) {
                    if (index === 1) {
                        content1.classList.remove('hidden');
                        content4.classList.add('hidden');
                        if (btn1) { btn1.classList.remove('bg-transparent', 'text-slate-500'); btn1.classList.add('bg-white', 'shadow-sm', 'text-primary'); }
                        if (btn4) { btn4.classList.add('bg-transparent', 'text-slate-500'); btn4.classList.remove('bg-white', 'shadow-sm', 'text-primary'); }
                    } else if (index === 4) {
                        content1.classList.add('hidden');
                        content4.classList.remove('hidden');
                        if (btn1) { btn1.classList.add('bg-transparent', 'text-slate-500'); btn1.classList.remove('bg-white', 'shadow-sm', 'text-primary'); }
                        if (btn4) { btn4.classList.remove('bg-transparent', 'text-slate-500'); btn4.classList.add('bg-white', 'shadow-sm', 'text-primary'); }
                    }
                }
            },

            renderAssigneeTags: (assignees) => {
                const container = getEl('assignee-tags-container');
                if (!container) return;
                container.innerHTML = assignees.map((name, i) => `
                <div class="badge badge-outline gap-2 bg-white p-3 h-auto">
                    <span class="text-xs font-medium">${name}</span>
                    <i class="fas fa-times cursor-pointer hover:text-red-500 transition-colors" onclick="TicketManager.removeAssignee(${i})"></i>
                </div>
            `).join('');
            },

            renderPagination: (totalItems, itemsPerPage, currentPage) => {
                const infoMsg = document.getElementById('ticket-pagination-info');
                const controls = document.getElementById('ticket-pagination-controls');
                if (!infoMsg || !controls) return;

                const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
                const start = totalItems === 0 ? 0 : (currentPage - 1) * itemsPerPage + 1;
                const end = Math.min(currentPage * itemsPerPage, totalItems);

                infoMsg.innerText = `แสดง ${start}-${end} จาก ${totalItems} รายการ`;

                let buttonsHTML = '';

                // Prev button
                buttonsHTML += `
                <button class="join-item btn btn-xs bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 ${currentPage === 1 ? 'btn-disabled bg-slate-50 text-slate-300' : ''}" 
                        onclick="TicketManager.changePage(${currentPage - 1})">
                    <i class="fas fa-chevron-left text-[9px]"></i>
                </button>`;

                // Generate page numbers
                let startPage = Math.max(1, currentPage - 2);
                let endPage = Math.min(totalPages, currentPage + 2);

                if (startPage > 1) {
                    buttonsHTML += `<button class="join-item btn btn-xs bg-white border border-slate-200 text-slate-600 hover:bg-slate-50" onclick="TicketManager.changePage(1)">1</button>`;
                    if (startPage > 2) buttonsHTML += `<button class="join-item btn btn-xs bg-white border border-slate-200 text-slate-400 btn-disabled">...</button>`;
                }

                for (let i = startPage; i <= endPage; i++) {
                    const activeClass = i === currentPage ? 'btn-primary text-white border-primary' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50';
                    buttonsHTML += `<button class="join-item btn btn-xs ${activeClass}" onclick="TicketManager.changePage(${i})">${i}</button>`;
                }

                if (endPage < totalPages) {
                    if (endPage < totalPages - 1) buttonsHTML += `<button class="join-item btn btn-xs bg-white border border-slate-200 text-slate-400 btn-disabled">...</button>`;
                    buttonsHTML += `<button class="join-item btn btn-xs bg-white border border-slate-200 text-slate-600 hover:bg-slate-50" onclick="TicketManager.changePage(${totalPages})">${totalPages}</button>`;
                }

                // Next button
                buttonsHTML += `
                <button class="join-item btn btn-xs bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 ${currentPage === totalPages ? 'btn-disabled bg-slate-50 text-slate-300' : ''}" 
                        onclick="TicketManager.changePage(${currentPage + 1})">
                    <i class="fas fa-chevron-right text-[9px]"></i>
                </button>`;

                controls.innerHTML = buttonsHTML;
            }
        };
    })();
</script>

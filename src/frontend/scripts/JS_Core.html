<script>
  // ----------------------------------------------------------------------
  // 1. ROUTER: Page Switching with Lifecycle Hooks
  // ----------------------------------------------------------------------
  var Router = {
    activePage: null,
    _controllers: {},
    _previousPage: null,

    register: function (pageId, controller) {
      this._controllers[pageId] = controller;
      console.log("✅ Router: Registered controller for", pageId);
    },

    /**
     * ตรวจสอบความพร้อมของหน้าก่อนเปลี่ยนหน้า
     * @returns {Object} { isReady: boolean, missing: string[] }
     */
    checkPageIntegrity: function (pageId) {
      var issues = [];
      
      // 1. ตรวจสอบว่ามี HTML Element หรือไม่
      var target = document.getElementById(pageId);
      if (!target) {
        issues.push("❌ HTML element not found: #" + pageId);
      }
      
      // 2. ตรวจสอบว่ามี Controller register หรือไม่
      if (!this._controllers[pageId]) {
        issues.push("⚠️ Controller not registered for: " + pageId);
      }
      
      // 3. ตรวจสอบว่า Controller มี onShow method หรือไม่
      if (this._controllers[pageId] && typeof this._controllers[pageId].onShow !== "function") {
        issues.push("⚠️ Controller missing onShow() method: " + pageId);
      }
      
      return {
        isReady: issues.length === 0,
        missing: issues
      };
    },

    navigateTo: function (pageId) {
      console.log("🔄 Router: Navigating to", pageId);
      
      // ✨ Integrity Check
      var integrity = this.checkPageIntegrity(pageId);
      if (!integrity.isReady) {
        console.error("🚨 Page Integrity Check Failed:", pageId);
        integrity.missing.forEach(function(issue) {
          console.error(issue);
        });
        
        // แสดง Toast แจ้งเตือนผู้ใช้
        if (typeof UIManager !== "undefined") {
          UIManager.showToast("ไม่สามารถเปิดหน้านี้ได้ กรุณาติดต่อผู้ดูแลระบบ", "error");
        }
        
        // Fallback ไป Dashboard ถ้าไม่ใช่ Dashboard อยู่แล้ว
        if (pageId !== 'page-dashboard') {
          console.warn("⚠️ Falling back to Dashboard");
          this.navigateTo('page-dashboard');
        }
        return;
      }

      var target = document.getElementById(pageId);
      if (this.activePage === pageId) return;

      this._previousPage = this.activePage;
      if (this._previousPage && this._controllers[this._previousPage]) {
        var prevCtrl = this._controllers[this._previousPage];
        if (typeof prevCtrl.onHide === "function") {
          try { 
            prevCtrl.onHide(); 
          } catch (e) { 
            console.error("❌ Router: onHide error for", this._previousPage, e); 
          }
        }
      }

      // Hide all page sections to prevent overlap
      var sections = document.querySelectorAll(".page-section");
      for (var i = 0; i < sections.length; i++) {
        sections[i].classList.add("hidden");
        sections[i].classList.remove("fade-in");
      }

      // Show target page
      target.classList.remove("hidden");
      target.classList.add("fade-in");
      this.activePage = pageId;
      localStorage.setItem("gas_last_page", pageId);

      // Update Sidebar state
      var links = document.querySelectorAll("aside a[data-target]");
      for (var i = 0; i < links.length; i++) {
        var link = links[i];
        link.classList.remove("active", "bg-primary", "text-white");
        if (link.dataset.target === pageId) {
          link.classList.add("active", "bg-primary", "text-white");
          var titleEl = document.getElementById("header-title");
          if (titleEl) {
            var span = link.querySelector('span');
            titleEl.innerText = span ? span.innerText.trim() : link.innerText.trim();
          }
          if (typeof closeDrawerOnMobile === 'function') closeDrawerOnMobile();
        }
      }

      if (this._controllers[pageId]) {
        var ctrl = this._controllers[pageId];
        if (typeof ctrl.onShow === "function") {
          try { 
            ctrl.onShow(); 
            console.log("✅ Router: onShow executed for", pageId);
          } catch (e) { 
            console.error("❌ Router: onShow error for", pageId, e);
            // แสดง Error ให้ผู้ใช้เห็น
            if (typeof UIManager !== "undefined") {
              UIManager.showToast("เกิดข้อผิดพลาดในการโหลดหน้า: " + e.message, "error");
            }
          }
        }
      }

      setTimeout(function () {
        document.dispatchEvent(new CustomEvent("page-change", { detail: { pageId: pageId } }));
      }, 50);
    },

    /**
     * ตรวจสอบความพร้อมของทุกหน้าในระบบ (สำหรับ Debug)
     */
    diagnoseAll: function () {
      console.log("🔍 Router Diagnostic Report:");
      var allPages = document.querySelectorAll(".page-section");
      var report = [];
      
      allPages.forEach(function(page) {
        var pageId = page.id;
        var integrity = Router.checkPageIntegrity(pageId);
        report.push({
          pageId: pageId,
          status: integrity.isReady ? "✅ OK" : "❌ FAILED",
          issues: integrity.missing
        });
      });
      
      console.table(report);
      return report;
    }
  };

  /** Global helper function */
  function changePage(pageId) {
    Router.navigateTo(pageId);
  }

  // ----------------------------------------------------------------------
  // 2. SERVER
  // ----------------------------------------------------------------------
  var Server = {
    call: function (target) {
      var args = Array.prototype.slice.call(arguments, 1);
      return new Promise(function (resolve, reject) {
        if (typeof google === "undefined" || !google.script) {
          console.error("Server: google.script not found");
          reject(new Error("google.script not found"));
          return;
        }

        var funcName = target;
        var options = { silent: false, loadingMsg: null, retries: 2 };
        var useApiHandler = false;

        if (typeof target === "object" && target !== null) {
          funcName = target.func;
          if (target.silent) options.silent = true;
          if (target.loadingMsg) options.loadingMsg = target.loadingMsg;
          if (target.retries !== undefined) options.retries = target.retries;
          useApiHandler = true;
        }

        if (!options.silent) UIManager.showLoading(options.loadingMsg);

        const attempt = function (currentTry) {
          var runner = google.script.run
            .withSuccessHandler(function (res) {
              if (!options.silent) UIManager.hideLoading();
              try {
                var data = typeof res === "string" ? JSON.parse(res) : res;
                resolve(data);
              } catch (e) {
                resolve(res);
              }
            })
            .withFailureHandler(function (err) {
              if (currentTry < options.retries) {
                console.warn("Retrying... (" + (currentTry + 1) + "/" + options.retries + ")");
                setTimeout(function () { attempt(currentTry + 1); }, 1500);
              } else {
                if (!options.silent) UIManager.hideLoading();
                console.error("Server Error:", err);
                if (typeof UIManager !== "undefined") UIManager.showToast(err.message, "error");
                reject(err);
              }
            });

          if (useApiHandler) {
            runner.apiHandler({ func: funcName, data: args[0] });
          } else {
            runner[funcName].apply(runner, args);
          }
        };

        attempt(0);
      });
    },
  };

  // ----------------------------------------------------------------------
  // 3. UI MANAGER (Fixed: Bottom-Right & High Z-Index)
  // ----------------------------------------------------------------------
  const UIManager = {
    showToast: function (msg, type) {
      type = type || "info";

      // Use SweetAlert2 for robust, high-z-index toasts
      if (typeof Swal !== "undefined") {
        const Toast = Swal.mixin({
          toast: true,
          position: "bottom-end",
          showConfirmButton: false,
          timer: 3000,
          timerProgressBar: true,
          didOpen: (toast) => {
            toast.onmouseenter = Swal.stopTimer;
            toast.onmouseleave = Swal.resumeTimer;
            // Force container z-index again just in case
            const container = Swal.getContainer();
            if (container) container.style.zIndex = "2147483647";
          },
        });

        Toast.fire({
          icon: type,
          title: msg,
        });
      } else {
        // Fallback (Rare case)
        console.warn("Swal not found, simple alert:", msg);
        alert(msg);
      }
    },

    showLoading: function (msg) {
      if (document.getElementById("global-loading")) return;
      var d = document.createElement("dialog");
      d.id = "global-loading";
      d.className = "modal";
      // ให้ Loading อยู่รองลงมาจาก Toast เล็กน้อย
      d.style.zIndex = "2147483646";
      d.innerHTML =
        '<div class="modal-box bg-transparent shadow-none flex flex-col items-center justify-center overflow-hidden">' +
        '<span class="loading loading-spinner loading-lg text-primary"></span>' +
        (msg
          ? '<p class="mt-2 text-white font-bold drop-shadow-md text-sm">' +
          msg +
          "</p>"
          : "") +
        "</div>";
      document.body.appendChild(d);
      d.showModal();
    },

    hideLoading: function () {
      var d = document.getElementById("global-loading");
      if (d) {
        if (typeof d.close === "function") d.close();
        d.remove();
      }
    },

    confirm: function (msg) {
      return new Promise(function (resolve) {
        if (typeof Swal !== "undefined") {
          Swal.fire({
            title: "Are you sure?",
            text: msg,
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#d33",
            cancelButtonColor: "#3085d6",
            confirmButtonText: "Yes",
            didOpen: function () {
              // Force SweetAlert to stay above normal Modals
              var container = Swal.getContainer();
              if (container) container.style.zIndex = "100000";
            },
          }).then(function (result) {
            resolve(result.isConfirmed);
          });
        } else {
          var res = confirm(msg);
          resolve(res);
        }
      });
    },
  };

  // ----------------------------------------------------------------------
  // 4. STORE
  // ----------------------------------------------------------------------
  const Store = {
    state: { currentUser: null, settings: {}, isAppLoaded: false },
    init: function () {
      var self = this;
      // Init user settings from GAS
      return Server.call({ func: "getUserSettings", silent: true })
        .then(function (res) {
          if (res) {
            self.state.currentUser = res.profile;
            self.state.settings = res;
          }
        })
        .catch(function (err) {
          console.error("Store Init Error:", err);
        });
    },
  };
</script>

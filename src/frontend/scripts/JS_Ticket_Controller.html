<script>
  /**
   * ==========================================
   * MODULE: TICKET CONTROLLER (Logic Layer)
   * หน้าที่: ควบคุมการทำงานทั้งหมด เชื่อมต่อ Service และ View
   * ==========================================
   */
  const TicketManager = (() => {
    // --- State Variables ---
    let _tickets = [];
    let _filteredTickets = []; // for pagination
    let _currentPage = 1;
    let _itemsPerPage = 15;
    let _config = {};
    let _profiles = { email: [], site: [], drafts: [] };
    let _currentAssignees = [];
    let _tempEmails = []; // เก็บอีเมลที่ดึงมาพักไว้ก่อนบันทึก
    let _pickers = {}; // Store Flatpickr instances
    let _isLoaded = false; // Cache Flag
    let _lastCreatedTicketId = null; // ✨ NEW: เก็บ ID ของ Ticket ที่เพิ่งสร้างล่าสุด
    let _routineProfiles = []; // ✨ NEW: เก็บข้อมูล Routine Profiles

    // --- Helpers ---
    const getEl = (id) => document.getElementById(id);

    // Debounce: ป้องกันการเรียกฟังก์ชันรัวๆ
    const debounce = (func, wait) => {
      let timeout;
      return function (...args) {
        const context = this;
        clearTimeout(timeout);
        timeout = setTimeout(() => func.apply(context, args), wait);
      };
    };

    return {
      /**
       * 11. Sorting logic
       */
      sortTickets: (data) => {
        if (!data || !Array.isArray(data)) return [];
        return [...data].sort((a, b) => {
          // ✨ NEW: ให้ Ticket ที่เพิ่งสร้างล่าสุดอยู่บนสุดเสมอ
          if (_lastCreatedTicketId) {
            if (a.ticketNumber === _lastCreatedTicketId) return -1;
            if (b.ticketNumber === _lastCreatedTicketId) return 1;
          }

          // ฟังก์ชันช่วยแปลงวันที่เป็น Timestamp เพื่อการเปรียบเทียบ
          const getTs = (val) => {
            if (!val) return 0;
            const d = new Date(val);
            return isNaN(d.getTime()) ? 0 : d.getTime();
          };

          const tsA = getTs(a.createdDate || a.date);
          const tsB = getTs(b.createdDate || b.date);

          if (tsB !== tsA) return tsB - tsA;

          // ถ้าวันที่เท่ากัน ให้เรียงตาม Ticket ID (เลขมากสุดขึ้นก่อน)
          const idA = String(a.ticketNumber || "");
          const idB = String(b.ticketNumber || "");
          return idB.localeCompare(idA, undefined, { numeric: true });
        });
      },

      getIsLoaded: () => _isLoaded,
      getLastCreatedId: () => _lastCreatedTicketId,

      /**
       * 1. Initialization
       */
      init: function () {
        console.log("🚀 Ticket Controller Initialized");
        if (typeof Router !== "undefined") {
          Router.register("page-ticket", this);
        }
        // เริ่มต้นระบบฟัง Event (Live Preview)
        TicketManager.setupPreviewListeners();
        TicketManager.initPickers();
      },

      initPickers: () => {
        // Standard Date Picker (Replaced with Native Inputs)
      },

      onShow: () => {
        console.log('📄 TicketManager: onShow');
        try {
          TicketManager.loadData(false);
          TicketManager.loadRoutineProfiles(); // โหลด Profile ทุกครั้งที่เปิดหน้า
        } catch (e) {
          console.error('❌ TicketManager: onShow error', e);
          if (typeof UIManager !== 'undefined') {
            UIManager.showToast('เกิดข้อผิดพลาดในการโหลดหน้า Ticket: ' + e.message, 'error');
          }
        }
      },

      // ============================================================
      //  Parsing Helper
      // ============================================================
      smartParseDate: (val) => {
        if (!val) return { date: "", time: "" };
        try {
          let d = new Date(val);
          // Regex for D/M/YYYY or DD/MM/YYYY with comma or space (e.g. "15/2/2026, 20:02:17")
          const dmyMatch = String(val).match(
            /^(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})(?:,\s*|\s+)(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?/,
          );
          if (dmyMatch) {
            const [_, day, month, year, hh, mm] = dmyMatch;
            // Construct ISO string to ensure correct parsing
            d = new Date(
              `${year}-${month.padStart(2, "0")}-${day.padStart(2, "0")}T${hh.padStart(2, "0")}:${mm.padStart(2, "0")}:00`,
            );
          }

          if (isNaN(d.getTime())) return { date: "", time: "" };

          const yyyy = d.getFullYear();
          const mo = String(d.getMonth() + 1).padStart(2, "0");
          const da = String(d.getDate()).padStart(2, "0");
          const ho = String(d.getHours()).padStart(2, "0");
          const mi = String(d.getMinutes()).padStart(2, "0");

          return {
            date: `${yyyy}-${mo}-${da}`,
            time: `${ho}:${mi}`,
          };
        } catch (e) {
          return { date: "", time: "" };
        }
      },

      /**
       * 2. Load Data (ดึงข้อมูลทั้งหมดเมื่อเปิดหน้า)
       */
      loadData: (force = false) => {
        if (!force && _isLoaded) {
          console.log("🚀 Ticket Cache Hit");
          return;
        }

        const btn = getEl("btn-refresh-ticket");
        const loader = getEl("ticket-loader");
        const empty = getEl("ticket-empty");

        if (btn) {
          btn.classList.add("is-loading");
          btn.disabled = true;
        }
        if (loader) loader.classList.remove("hidden");
        if (empty) empty.classList.add("hidden"); // Hide empty state while loading

        Promise.all([
          TicketService.getAllTickets(),
          TicketService.getAppSettings(),
        ])
          .then(([resTickets, resConfig]) => {
            // 2.1 Config & Dropdowns
            if (resConfig.success) {
              _config = resConfig.data || {};
              TicketView.populateSelect("sel-ticket-type", _config.types || []);
              TicketView.populateSelect("sel-ticket-status", _config.statuses || []);
              TicketView.populateSelect("sel-ticket-severity", _config.severities || []);
              TicketView.populateSelect("sel-ticket-category", Object.keys(_config.categories || {}));

              // Sync Filter Selects
              TicketView.populateSelect("filter-status", _config.statuses || [], "ทุกสถานะ");
              TicketView.populateSelect("filter-type", _config.types || [], "ทุกประเภท");
              TicketView.populateSelect("filter-severity", _config.severities || [], "ทุกระดับ");

              if (_config.staff && _config.staff.length > 0) {
                TicketView.populateSelect("sel-ticket-resp", _config.staff, "เลือกหัวหน้าทีม...");
              } else {
                TicketView.populateSelect("sel-ticket-resp", [], "เลือกหัวหน้าทีม...");
              }

              if (_config.assignees && _config.assignees.length > 0) {
                TicketView.populateSelect("sel-ticket-assign-picker", _config.assignees, "+ เพิ่มผู้ปฏิบัติงาน");
              } else {
                TicketView.populateSelect("sel-ticket-assign-picker", [], "+ เพิ่มผู้ปฏิบัติงาน");
              }

              // 2.2 Profiles (Email/Site/Drafts)
              _profiles.email = _config.emailProfiles || [];
              _profiles.site = _config.emailDrafts || [];
              _profiles.drafts = _config.mailDrafts || [];
            } else {
              UIManager.showToast("โหลดตั้งค่าไม่สำเร็จ: " + resConfig.message, "error");
            }

            TicketView.populateSelectObj(
              "sel-email-profile",
              _profiles.email,
              "-- โหลดรายชื่อผู้รับ --",
            );
            TicketView.populateSelectObj(
              "sel-email-draft",
              _profiles.site,
              "-- โหลด Template ข้อมูล --",
            );
            TicketView.populateSelectObj(
              "sel-mail-draft",
              _profiles.drafts,
              "-- โหลด Draft ที่บันทึก --",
            );

            // 2.3 Tickets Table
            if (resTickets.success) {
              _tickets = TicketManager.sortTickets(resTickets.data || []);
              _filteredTickets = [..._tickets];
              _currentPage = 1;
              TicketManager.renderCurrentPage();
              TicketView.updateStats(_tickets);
              _isLoaded = true; // Mark as loaded
            } else {
              UIManager.showToast(
                "โหลดข้อมูลไม่สำเร็จ: " + resTickets.message,
                "error",
              );
            }
          })
          .catch((err) => {
            console.error(err);
            UIManager.showToast("เกิดข้อผิดพลาดในการเชื่อมต่อ", "error");
          })
          .finally(() => {
            if (btn) {
              btn.classList.remove("is-loading");
              btn.disabled = false;
            }
            if (loader) loader.classList.add("hidden");
          });
      },

      sortTickets: (data) => {
        return data.sort((a, b) => {
          const dtA = (a.date || "0000-00-00") + (a.time || "00:00");
          const dtB = (b.date || "0000-00-00") + (b.time || "00:00");
          if (dtA !== dtB) return dtB.localeCompare(dtA);
          return String(b.ticketNumber || "").localeCompare(
            String(a.ticketNumber || ""),
          );
        });
      },

      // ============================================================
      //  3. EMAIL IMPORT LOGIC
      // ============================================================

      manualFetchEmail: () => {
        UIManager.showLoading("สแกนหาอีเมล...");

        TicketService.fetchEmailPreviews()
          .then((res) => {
            UIManager.hideLoading();

            if (!res.success || !res.items || res.items.length === 0) {
              Swal.fire({
                icon: "info",
                title: "ไม่พบอีเมล",
                text: "ไม่มีรายการใหม่ใน Inbox",
                timer: 2000,
                showConfirmButton: false,
              });
              return;
            }

            _tempEmails = res.items;
            const processedList = [];

            _tempEmails.forEach((email) => {
              const subject = (email.subject || "").trim();
              const subjectUpper = subject.toUpperCase();

              if (email.labels && Array.isArray(email.labels)) {
                const isComplete = email.labels.some((l) =>
                  l.toLowerCase().includes("complete"),
                );
                if (isComplete) return;
              }

              const hasMonomax =
                subjectUpper.includes("MONO MAX") ||
                subjectUpper.includes("MONOMAX");
              const hasSVR = subjectUpper.includes("SVR");

              if (!hasMonomax && !hasSVR) return;

              let status = "NEW";
              let potentialId = null;
              const idMatch = subject.match(/SVR-?\d+/i);

              if (idMatch) {
                potentialId = idMatch[0].toUpperCase();
                const exists = _tickets.find(
                  (t) =>
                    (t.ticketNumber &&
                      t.ticketNumber.toUpperCase() === potentialId) ||
                    (t.subject &&
                      t.subject.toUpperCase().includes(potentialId)),
                );

                if (exists) {
                  status = "DUPLICATE";
                } else {
                  status = "NEW";
                }
              } else {
                status = "NO_SVR";
              }

              processedList.push({ ...email, status, potentialId });
            });

            if (processedList.length === 0) {
              Swal.fire({
                icon: "warning",
                title: "ไม่พบรายการใหม่",
                text: "อีเมลที่มีอาจจะ Complete ไปแล้ว หรือไม่เกี่ยวข้อง",
              });
              return;
            }

            TicketView.renderEmailImportTable(processedList);
            getEl("modal-import-email").showModal();
          })
          .catch((err) => {
            console.error(err);
            UIManager.hideLoading();
            UIManager.showToast("ดึงข้อมูลอีเมลล้มเหลว", "error");
          });
      },

      toggleAllEmails: (checkbox) => {
        const boxes = document.querySelectorAll(".chk-email-import");
        boxes.forEach((box) => {
          if (!box.disabled) box.checked = checkbox.checked;
        });
      },

      confirmImportEmails: () => {
        const checkboxes = document.querySelectorAll(
          ".chk-email-import:checked",
        );
        if (checkboxes.length === 0) {
          UIManager.showToast("กรุณาเลือกรายการที่จะบันทึก", "warning");
          return;
        }

        const selectedSubjects = [];
        checkboxes.forEach((box) => {
          const row = box.closest("tr");
          const subjDiv = row.querySelector("td:nth-child(3) div");
          if (subjDiv)
            selectedSubjects.push(
              subjDiv.getAttribute("title") || subjDiv.innerText.trim(),
            );
        });

        const selectedEmails = _tempEmails.filter((e) =>
          selectedSubjects.includes(e.subject),
        );

        UIManager.showLoading(`กำลังบันทึก ${selectedEmails.length} รายการ...`);

        TicketService.importEmails(selectedEmails).then((res) => {
          UIManager.hideLoading();
          if (res.success) {
            getEl("modal-import-email").close();
            Swal.fire({
              icon: "success",
              title: "บันทึกสำเร็จ!",
              text: `นำเข้าข้อมูลเรียบร้อย ${res.count} รายการ`,
              timer: 2000,
              showConfirmButton: false,
            });
            TicketManager.loadData(true);
          } else {
            UIManager.showToast("บันทึกไม่สำเร็จ: " + res.message, "error");
          }
        });
      },

      // ============================================================
      //  4. STANDARD ACTIONS (Create/Edit/Save)
      // ============================================================

      openModal: (mode, id = null) => {
        // Switch from modal to drawer toggle
        const drawerToggle = getEl("drawer-ticket-toggle");
        const title = getEl("ticket-modal-title");
        const idInput = getEl("inp-ticket-id");
        const btnSave = getEl("btn-save-ticket");
        const btnDraft = getEl("btn-save-draft");

        getEl("form-ticket").reset();
        _currentAssignees = [];
        TicketView.renderAssigneeTags([]);

        if (getEl("chk-show-greeting"))
          getEl("chk-show-greeting").checked = true;
        if (getEl("chk-show-note")) getEl("chk-show-note").checked = true;

        if (mode === "CREATE") {
          title.innerText = "สร้าง Ticket ใหม่";
          TicketView.switchTab(1);

          idInput.value = "";
          idInput.placeholder = "Auto Gen";

          if (btnSave) btnSave.classList.remove("hidden");
          if (btnDraft) btnDraft.classList.add("hidden");

          // ✨ NEW: ตั้งค่าวันที่ปัจจุบัน (เวลาไทย)
          const now = new Date();
          const tzOffset = 7 * 60 * 60 * 1000; // +7 Hours for Thailand
          const localNow = new Date(now.getTime() + tzOffset);
          const dateStr = localNow.toISOString().split("T")[0];

          getEl("inp-ticket-date").value = dateStr;

          const hh = String(now.getHours()).padStart(2, "0");
          const mm = String(now.getMinutes()).padStart(2, "0");
          const timeStr = `${hh}:${mm}`;

          getEl("inp-ticket-time").value = timeStr;
          getEl("sel-ticket-status").value = "Open";
          TicketManager.handleCategoryChange();

          // ✨ NEW: Auto-Load Routine Profile if exists
          const autoProfile = _routineProfiles.find(p => p.isAutoLoad);
          if (autoProfile) {
            console.log("🪄 Auto-loading routine profile:", autoProfile.name);
            TicketManager.applyRoutineProfile(_routineProfiles.indexOf(autoProfile), true);
          }

          // ✨ เพิ่มโค้ดนี้เพื่อซ่อนกล่องแสกนทุกครั้งที่เปิดฟอร์ม
        const svrContainer = getEl("svr-scan-results");
        if (svrContainer) {
          svrContainer.classList.add("hidden");
          svrContainer.classList.remove("flex");
        }

          const btnEmailTab = getEl("tab-btn-email");
          if (btnEmailTab) btnEmailTab.classList.add("hidden");

          const idDisplay = getEl("ticket-modal-id-display");
          if (idDisplay) idDisplay.innerText = "AUTO GENERATED";

          const btnEditIdTitle = getEl("btn-edit-ticket-id-title");
          if (btnEditIdTitle) btnEditIdTitle.classList.add("hidden");
        } else {
          const row = _tickets.find((t) => t.ticketNumber == id);
          if (!row) {
            UIManager.showToast("ไม่พบข้อมูล Ticket", "error");
            return;
          }

          const setVal = (k, v) => {
            const el = getEl(k);
            if (el) el.value = v || "";
          };

          setVal("inp-ticket-id", row.ticketNumber);

          const parsed = TicketManager.smartParseDate(row.date);
          const dDate = parsed.date;
          const dTime = row.time || parsed.time || "00:00";

          getEl("inp-ticket-date").value = dDate;
          getEl("inp-ticket-time").value = dTime;

          setVal("inp-ticket-subject", row.subject);
          setVal("txt-ticket-detail", row.detail);

          setVal("sel-ticket-type", row.type);
          setVal("sel-ticket-status", row.status);
          setVal("sel-ticket-severity", row.severity);
          setVal("sel-ticket-category", row.category);

          TicketManager.handleCategoryChange(row.subCategory);

          setVal("txt-ticket-action", row.action);
          setVal("txt-ticket-resolved-detail", row.resolvedDetail);
          setVal("sel-ticket-resp", row.responsibility);

          if (row.assign && row.assign !== "-") {
            _currentAssignees = row.assign
              .split(",")
              .map((s) => s.trim())
              .filter((s) => s);
            TicketView.renderAssigneeTags(_currentAssignees);
          }

          if (mode === "EMAIL") {
            title.innerText = "ส่งอีเมล: " + id;
            TicketView.switchTab(4);
            if (btnSave) btnSave.classList.add("hidden");
            if (btnDraft) btnDraft.classList.remove("hidden");
            setTimeout(() => TicketManager.updateEmailPreview(), 100);
          } else {
            title.innerText = "แก้ไข Ticket: " + id;
            TicketView.switchTab(1);
            if (btnSave) btnSave.classList.remove("hidden");
            if (btnDraft) btnDraft.classList.add("hidden");
          }

          const btnEmailTab = getEl("tab-btn-email");
          if (btnEmailTab) btnEmailTab.classList.remove("hidden");

          const btnEditIdTitle = getEl("btn-edit-ticket-id-title");
          if (btnEditIdTitle && mode !== "EMAIL") {
            btnEditIdTitle.classList.remove("hidden");
          } else if (btnEditIdTitle) {
            btnEditIdTitle.classList.add("hidden");
          }

          const idDisplay = getEl("ticket-modal-id-display");
          if (idDisplay) idDisplay.innerText = id;
        }

        const inlineGroup = getEl("inline-edit-group");
        if (inlineGroup) {
          inlineGroup.classList.remove("flex");
          inlineGroup.classList.add("hidden");
        }
        if (getEl("ticket-id-display-container")) {
          getEl("ticket-id-display-container").classList.remove("hidden");
          getEl("ticket-id-display-container").classList.add("flex");
        }

        drawerToggle.checked = true;
      },

      showInlineEditId: () => {
        const currentId = getEl("inp-ticket-id").value;
        if (!currentId) return;

        getEl("ticket-id-display-container").classList.add("hidden");
        getEl("ticket-id-display-container").classList.remove("flex");

        const inlineGroup = getEl("inline-edit-group");
        inlineGroup.classList.remove("hidden");
        inlineGroup.classList.add("flex");

        const inp = getEl("inp-inline-ticket-id");
        inp.value = currentId;
        inp.focus();
      },

      cancelInlineTicketId: () => {
        const inlineGroup = getEl("inline-edit-group");
        inlineGroup.classList.remove("flex");
        inlineGroup.classList.add("hidden");

        const displayContainer = getEl("ticket-id-display-container");
        displayContainer.classList.remove("hidden");
        displayContainer.classList.add("flex");
      },

      saveInlineTicketId: () => {
        const currentId = getEl("inp-ticket-id").value;
        const newId = getEl("inp-inline-ticket-id").value.trim().toUpperCase();

        if (!newId) {
          UIManager.showToast("กรุณาระบุ Ticket ID", "warning");
          return;
        }

        if (newId === currentId) {
          TicketManager.cancelInlineTicketId();
          return;
        }

        UIManager.showLoading("กำลังเปลี่ยน Ticket ID...");
        Server.call({ func: "updateTicketIdOnly" }, { oldId: currentId, newId: newId })
          .then(res => {
            UIManager.hideLoading();
            if (res.success) {
              getEl("inp-ticket-id").value = newId;
              getEl("ticket-modal-id-display").innerText = newId;
              getEl("ticket-modal-title").innerText = "แก้ไข Ticket: " + newId;
              UIManager.showToast("เปลี่ยน ID สำเร็จ", "success");
              TicketManager.cancelInlineTicketId();
              TicketManager.loadData(true);
            } else {
              UIManager.showToast("ไม่สามารถเปลี่ยนได้: " + res.message, "error");
            }
          }).catch(err => {
            UIManager.hideLoading();
            UIManager.showToast("เกิดข้อผิดพลาดในการเชื่อมต่อ", "error");
          });
      },

      // ============================================================
      // ✨ ฟีเจอร์: Scan & Link SVR Manual (อัปเกรดระบบเช็คซ้ำ)
      // ============================================================
      scanSvrFromEmail: () => {
        const container = getEl("svr-scan-results");
        const listEl = getEl("svr-scan-list");
        
        if (!container || !listEl) return;
        
        UIManager.showLoading("กำลังค้นหาอีเมลล่าสุด...");
        
        TicketService.fetchEmailPreviews().then((res) => {
          UIManager.hideLoading();
          
          if (!res.success || !res.items || res.items.length === 0) {
             UIManager.showToast("ไม่พบอีเมลใหม่ใน Inbox", "warning");
             return;
          }
          
          // กรองเอาเฉพาะอีเมลที่มีรหัส SVR
          const svrItems = res.items.filter(item => item.id);
          
          if (svrItems.length === 0) {
             UIManager.showToast("ไม่พบรหัส SVR ในหัวข้ออีเมล", "warning");
             return;
          }
          
          // ดึง ID ที่กำลังใส่อยู่ในฟอร์มปัจจุบัน (เผื่อเปิดมาดูเฉยๆ จะได้รู้ว่าอันนี้คือใบนี้)
          const currentInputId = getEl("inp-ticket-id").value;

          // สร้างรายการให้คลิกเลือก โดยเช็คสถานะซ้ำซ้อน
          listEl.innerHTML = svrItems.map(item => {
            const safeSubject = TicketManager.escapeHTML(item.subject).replace(/'/g, "\\'");
            
            // 🔍 ลอจิกสำคัญ: ตรวจสอบว่า SVR นี้มีอยู่ใน _tickets (ฐานข้อมูล) หรือยัง
            const isExists = _tickets.some(t => t.ticketNumber === item.id);
            const isCurrent = currentInputId === item.id; // เช็คว่าเป็นอันที่กำลังใส่อยู่ในฟอร์มไหม

            if (isCurrent) {

              return `

                  </div>
                  <span class="text-[10px] sm:text-xs text-gray-400 truncate w-full mt-1">${TicketManager.escapeHTML(item.subject)}</span>
                </div>
              `;

              // 🟢 สถานะ: ว่าง! (เป็นปุ่มให้กดเลือกได้)
              return `
                <button type="button" onclick="TicketManager.selectSvrFromScan('${item.id}', '${safeSubject}')" 
                  class="flex flex-col text-left bg-white p-2.5 rounded-lg border border-blue-200 hover:border-blue-400 hover:bg-blue-50 hover:shadow-sm transition-all group shrink-0">
                  <div class="flex justify-between items-center w-full">

      selectSvrFromScan: (svrId, subject) => {
        if (!svrId) return;
        
        const mode = getEl("ticket-modal-title").innerText.includes("สร้าง") ? "CREATE" : "EDIT";
        const container = getEl("svr-scan-results");
        
        if (mode === "CREATE") {
          // โหมด CREATE: แค่แทนค่าลงไปในฟอร์ม ยังไม่ได้บันทึกลง Database
          getEl("inp-ticket-id").value = svrId;
          getEl("ticket-modal-id-display").innerText = svrId;
          
          // โบนัส: ถ้าช่อง Subject ว่าง ให้เอาหัวข้ออีเมลมาใส่ให้อัตโนมัติ
          const subjEl = getEl("inp-ticket-subject");
          if (subjEl && !subjEl.value) {
            subjEl.value = subject;
          }
          
          UIManager.showToast(`นำ ${svrId} ใส่ฟอร์มแล้ว (รอคุณกดบันทึก)`, "success");
          if (container) {
            container.classList.add("hidden");
            container.classList.remove("flex");
          }
          
        } else {
          // โหมด EDIT: มี Ticket อยู่แล้ว ต้องยิง API ผูก ID เข้ากับ Database
          const currentId = getEl("inp-ticket-id").value;
          if (currentId === svrId) {
             UIManager.showToast("ID นี้ผูกกับ Ticket ปัจจุบันอยู่แล้ว", "info");
             return;
          }
          
          UIManager.showLoading(`กำลังผูก ID เป็น ${svrId}...`);
          Server.call({ func: "updateTicketIdOnly", retryable: false }, { oldId: currentId, newId: svrId })
            .then(res => {
              UIManager.hideLoading();
              if (res.success) {
                getEl("inp-ticket-id").value = svrId;
                getEl("ticket-modal-id-display").innerText = svrId;
                getEl("ticket-modal-title").innerText = "แก้ไข Ticket: " + svrId;
                
                UIManager.showToast("ผูก SVR เข้ากับระบบสำเร็จ!", "success");
                TicketManager.loadData(true); // โหลดตารางหลักใหม่
                
                if (container) {
                  container.classList.add("hidden");
                  container.classList.remove("flex");
                }
              } else {
                UIManager.showToast("ไม่สามารถผูก ID ได้: " + res.message, "error");
              }
            }).catch(err => {
              UIManager.hideLoading();
              UIManager.showToast("เกิดข้อผิดพลาดในการเชื่อมต่อ", "error");
            });
        }
      },

      saveTicketOnly: () => {
        const form = getEl("form-ticket");
        if (!form.checkValidity()) {
          TicketView.switchTab(1);
          form.reportValidity();
          return;
        }

        UIManager.showLoading("กำลังบันทึก...");

        const autoSubj = getEl("auto-subject-text");
        if (autoSubj && autoSubj.innerText && autoSubj.innerText !== "...") {
          getEl("inp-ticket-subject").value = autoSubj.innerText;
        }

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        data.assignee = _currentAssignees.join(", ");

        // The ID uses the native form data since it's stored in inp-ticket-id

        const isUpdate = !!data.id;

        TicketService.saveTicket(data, isUpdate)
          .then((res) => {
            UIManager.hideLoading();
            if (res.success) {
              if (!isUpdate && res.data && res.data.id) {
                _lastCreatedTicketId = res.data.id;
              }
              UIManager.showToast("บันทึกข้อมูลสำเร็จ", "success");
              getEl("drawer-ticket-toggle").checked = false;
              TicketManager.loadData(true);
            } else {
              UIManager.showToast("Error: " + res.message, "error");
            }
          })
          .catch((err) => {
            UIManager.hideLoading();
            UIManager.showToast("Connection Error", "error");
          });
      },

        const form = getEl("form-ticket");
        if (!form.checkValidity()) {
          TicketView.switchTab(1);
          form.reportValidity();
          return;
        }

        UIManager.showLoading("กำลังบันทึกและสร้าง Draft...");

        const ticketData = Object.fromEntries(formData.entries());
        ticketData.assignee = _currentAssignees.join(", ");

          subject: emailSubject,

        // Map ข้อมูลลงฟอร์ม
        const setVal = (id, val) => {
          const el = getEl(id);
          if (el) el.value = val || "";

        setVal("txt-ticket-detail", data.detail);
        setVal("sel-ticket-status", data.status);
        setVal("sel-ticket-type", data.type);
        setVal("sel-ticket-severity", data.severity);
        setVal("sel-ticket-category", data.category);

        // โหลด Sub-Category
        TicketManager.handleCategoryChange();
        setVal("sel-ticket-subcategory", data.subCategory);

        setVal("sel-ticket-resp", data.responsibility);
        setVal("txt-ticket-action", data.action);
        setVal("txt-ticket-resolved-detail", data.resolvedDetail);
        setVal("txt-ticket-remark", data.remark);

        // จัดการ Assignees
        if (data.assignee) {
          _currentAssignees = data.assignee.split(", ").filter(n => n.trim() !== "");
          TicketView.renderAssigneeTags(_currentAssignees);
        }

        if (!isAuto) {
          UIManager.showToast(`โหลด Profile '${profile.name}' แล้ว`, "success");
        }

        // ✨ ปิด dropdown โดยการเอา Focus ออกจากธาตุที่กำลัง Active

      deleteTicket: (id) => {
        Swal.fire({
          title: "ยืนยันการลบ?",
          text: `ต้องการลบ Ticket ${id} ใช่หรือไม่?`,
          icon: "warning",
          showCancelButton: true,
          confirmButtonText: "ลบข้อมูล",
          cancelButtonText: "ยกเลิก",
        }).then((result) => {
          if (result.isConfirmed) {
            UIManager.showLoading("กำลังลบ...");
            TicketService.deleteTicket(id).then((res) => {
              UIManager.hideLoading();
              if (res.success) {
                UIManager.showToast("ลบข้อมูลสำเร็จ", "success");
                TicketManager.loadData(true);
              } else {
                UIManager.showToast("ลบไม่สำเร็จ: " + res.message, "error");
              }
            });
          }
        });

      // ============================================================
      //  5. UI INTERACTION HELPERS
      // ============================================================

      // ✨ ฟังก์ชันทำความสะอาดข้อมูลเพื่อป้องกัน XSS
      escapeHTML: (str) => {
        if (!str) return "";
        return String(str).replace(
          /[&<>'"]/g,
          (tag) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              "'": "&#39;",
              '"': "&quot;",
            })[tag] || tag,
        );
      },

      handleCategoryChange: (selectedSub = null) => {
        const cat = getEl("sel-ticket-category").value;
        const subEl = getEl("sel-ticket-subcategory");
        if (!subEl) return;

        if (cat && _config.categories && _config.categories[cat]) {
          const subs = _config.categories[cat];
          subEl.innerHTML =
            '<option value="">เลือก...</option>' +
            subs.map((s) => `<option value="${s}">${s}</option>`).join("");

          if (selectedSub) {
            subEl.value = selectedSub;
          }
        } else {
          subEl.innerHTML = '<option value="">-</option>';
        }
        setTimeout(() => TicketManager.updateEmailPreview(), 50);
      },

      addAssigneeTag: (val) => {
        if (val && !_currentAssignees.includes(val)) {
          _currentAssignees.push(val);
          TicketView.renderAssigneeTags(_currentAssignees);
        }
        getEl("sel-ticket-assign-picker").value = "";
      },

      removeAssignee: (index) => {
        _currentAssignees.splice(index, 1);
        TicketView.renderAssigneeTags(_currentAssignees);
      },

      filterData: () => {
        const term = getEl("ticket-search").value.toLowerCase();
        const fStatus = getEl("filter-status").value;
        const fType = getEl("filter-type").value;
        const fSeverity = getEl("filter-severity").value;

        _filteredTickets = _tickets.filter((t) => {
          const id = String(t.ticketNumber || "").toLowerCase();
          const subj = String(t.subject || "").toLowerCase();
          const status = String(t.status || "");
          const type = String(t.type || "");
          const severity = String(t.severity || "");

          // 1. Text Search (ID or Subject)
          const matchText = id.includes(term) || subj.includes(term);

          // 2. Dropdown Filters
          const matchStatus = !fStatus || status === fStatus;
          const matchType = !fType || type === fType;
          const matchSeverity = !fSeverity || severity === fSeverity;

          return matchText && matchStatus && matchType && matchSeverity;
        });
        _currentPage = 1;
        TicketManager.renderCurrentPage();
      },

      changePage: (page) => {
        _currentPage = page;
        TicketManager.renderCurrentPage();
      },

      renderCurrentPage: () => {
        const start = (_currentPage - 1) * _itemsPerPage;
        const end = start + _itemsPerPage;
        const pageData = _filteredTickets.slice(start, end);
        TicketView.renderTable(pageData);
        if (typeof TicketView.renderPagination === "function") {
          TicketView.renderPagination(_filteredTickets.length, _itemsPerPage, _currentPage);
        }
      },

      // ============================================================
      //  6. EMAIL PROFILE & PREVIEW LOGIC
      // ============================================================

      setupPreviewListeners: () => {
        const debouncedUpdate = debounce(
          () => TicketManager.updateEmailPreview(),
          300,
        );

        // ✨ ใช้ Event Delegation จับที่ฟอร์มตัวแม่ตัวเดียว ลดการใช้หน่วยความจำ
        const form = getEl("form-ticket");
        if (form) {
          form.addEventListener("input", debouncedUpdate);
          form.addEventListener("change", debouncedUpdate);
        }
      },

      updateEmailPreview: () => {
        const subj = TicketEmail.generateSubject();
        const previewSubj = getEl("preview-subject");
        const autoSubj = getEl("auto-subject-text");
        const autoSubj2 = getEl("auto-subject-text-2");

        if (previewSubj) previewSubj.innerText = subj;
        if (autoSubj) autoSubj.innerText = subj;
        if (autoSubj2) autoSubj2.innerText = subj;

        const data = TicketEmail.collectData();

        // ✨ ป้องกัน XSS โดยการ Escape ข้อมูลที่ผู้ใช้พิมพ์ก่อนนำไปวาด HTML
        if (data.detail) data.detail = TicketManager.escapeHTML(data.detail);
        if (data.action) data.action = TicketManager.escapeHTML(data.action);

        const html = TicketEmail.renderPreview(data);
        const body = getEl("preview-body-html");
        if (body) body.innerHTML = html;

        const to = getEl("preview-to");
        if (to) to.innerText = data.to || "-";
      },

      saveCurrentDraft: () => {
        const modal = getEl("modal-save-draft");
        const inp = getEl("inp-draft-name-save");
        if (modal && inp) {
          inp.value = "";
          modal.showModal();
        } else {
          const name = prompt("ตั้งชื่อ Draft Template:");
          if (name) TicketManager.confirmSaveDraft(name);
        }
      },

      confirmSaveDraft: (nameOverride = null) => {
        const inp = getEl("inp-draft-name-save");
        const name = nameOverride || (inp ? inp.value : null);

        if (!name) {
          UIManager.showToast("กรุณาใส่ชื่อ Template", "warning");
          return;
        }

        const currentData = TicketEmail.collectData();
        const newDraft = { name: name, ...currentData };

        _profiles.drafts.push(newDraft);

        const payload = {
          ..._config,
          emailProfiles: _profiles.email,
          emailDrafts: _profiles.site,
          mailDrafts: _profiles.drafts
        };

        TicketService.saveDraftsList(payload).then((res) => {
          if (res.success) {
            UIManager.showToast("บันทึก Template สำเร็จ", "success");
            TicketView.populateSelectObj(
              "sel-mail-draft",
              _profiles.drafts,
              "-- โหลด Draft ที่บันทึก --",
            );
            const modal = getEl("modal-save-draft");
            if (modal) modal.close();
          } else {
            UIManager.showToast("บันทึกไม่สำเร็จ", "error");
            _profiles.drafts.pop();
          }
        });
      },
    };
  })();
</script>

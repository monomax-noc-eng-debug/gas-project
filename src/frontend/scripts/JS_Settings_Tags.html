<script>
  window.TagSettings = (() => {
    let _full = {};
    let _tags = [];
    let _loaded = false;
    const el = id => document.getElementById(id);

    function _render() {
      const tbody = el('tag-tbody');
      const empty = el('tag-empty');
      const cnt = el('tag-cnt');
      if (cnt) cnt.innerText = _tags.length;
      if (!tbody) return;

      tbody.innerHTML = _tags.length === 0 ? '' : _tags.map((tag, i) => `
      <tr class="hover:bg-base-50 group">
        <td class="text-center text-xs text-gray-400 font-mono">${i + 1}</td>
        <td class="text-sm font-medium text-gray-700 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-warning/60 shrink-0"></span>${tag}</td>
        <td class="text-center">
          <div class="flex justify-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <button onclick="TagSettings.openEdit(${i})" class="btn btn-ghost btn-xs btn-square text-blue-400"><i class="fas fa-pencil-alt text-[10px]"></i></button>
            <button onclick="TagSettings.removeItem(${i})" class="btn btn-ghost btn-xs btn-square text-red-400"><i class="fas fa-trash text-[10px]"></i></button>
          </div>
        </td>
      </tr>`).join('');
      if (empty) empty.classList.toggle('hidden', _tags.length > 0);
    }

    return {
      init() {
        if (typeof Router !== "undefined") {
          Router.register("page-settings-tags", this);
        }
      },
      onShow() { 
        console.log('📄 TagSettings: onShow');
        try {
          if (!_loaded) this.loadData();
        } catch (e) {
          console.error('❌ TagSettings: onShow error', e);
          if (typeof UIManager !== 'undefined') {
            UIManager.showToast('เกิดข้อผิดพลาดในการโหลดการตั้งค่า Tag: ' + e.message, 'error');
          }
        }
      },

      loadData(force) {
        let btnRefresh = el('btn-refresh-settings-tags');
        if (btnRefresh) btnRefresh.classList.add('is-loading');
        const tbody = el('tag-tbody');
        const empty = el('tag-empty');
        const loader = el('tag-loader');
        if (tbody) tbody.innerHTML = '';
        if (loader) loader.classList.remove('hidden');
        if (empty) empty.classList.add('hidden');
        Server.call({ func: "apiGetAllSettings", silent: true })
          .then(r => {
            if (r.success && r.data) {
              _full = r.data;
              _tags = r.data.handoverTags || [];
              _loaded = true;
              _render();
              if (force) UIManager.showToast("โหลดสำเร็จ", "success");
            }
          })
          .catch(() => UIManager.showToast("Load Error", "error"))
          .finally(() => {
            let btnRefresh = el('btn-refresh-settings-tags');
            if (btnRefresh) btnRefresh.classList.remove('is-loading');
            if (loader) loader.classList.add('hidden');
          });
      },

      openAdd() {
        el('tag-edit-idx').value = '-1';
        el('tag-input-name').value = '';
        el('tag-modal-title').innerText = 'เพิ่มแท็ก';
        el('modal-tag-item').showModal();
      },

      openEdit(i) {
        el('tag-edit-idx').value = i;
        el('tag-input-name').value = _tags[i] || '';
        el('tag-modal-title').innerText = 'แก้ไขแท็ก';
        el('modal-tag-item').showModal();
      },

      saveModal() {
        const val = el('tag-input-name').value.trim();
        if (!val) return UIManager.showToast("กรุณากรอกชื่อแท็ก", "warning");
        const idx = parseInt(el('tag-edit-idx').value);
        if (idx >= 0) { _tags[idx] = val; }
        else { if (_tags.includes(val)) return UIManager.showToast("มีแท็กนี้อยู่แล้ว", "warning"); _tags.push(val); }
        el('modal-tag-item').close();
        _render();
      },

      removeItem(i) { _tags.splice(i, 1); _render(); },

      saveAll() {
        UIManager.showLoading("กำลังบันทึก...");
        const payload = { ..._full, handoverTags: _tags };
        Server.call({ func: "apiSaveAllSettings", silent: true }, payload)
          .then(r => { if (r.success) UIManager.showToast("บันทึกแท็กสำเร็จ", "success"); else UIManager.showToast(r.message || "Error", "error"); })
          .catch(() => UIManager.showToast("Connection Error", "error"))
          .finally(() => UIManager.hideLoading());
      }
    };
  })();
</script>

<script>
  /**
   * JS_Report.html
   * Version: Final Fix (Added Paste Fix, Safe Image Compression)
   */
  window.ReportManager = (function () {
    // --- State Variables ---
    var _files = { startMono: [], stopMono: [], startAis: [], stopAis: [] };
    var _autoStartMonoUrls = [];
    var _autoStopMonoUrls = [];
    var _autoStartAisUrls = [];
    var _autoStopAisUrls = [];
    var _isCustomReporter = false;
    var _picker = null;
    var _isLoading = false;
    var _isHandoverLoaded = false;
    var _isDataLoaded = false;
    var _lastFetchedDate = null;
    var _isReportersLoaded = false;
    
    // ✨ [เพิ่มตัวแปร] จับเวลาป้องกันการ Paste รูปเบิ้ล
    var _lastPasteTime = 0;

    // --- Helpers ---
    var el = function (id) {
      return document.getElementById(id);
    };
    var show = function (id, visible) {
      var e = el(id);
      if (e) e.classList.toggle("hidden", !visible);
    };

    var formatDriveUrl = function (url) {
      if (!url) return "";
      if (url.startsWith("data:")) return url;
      try {
        var id = null;
        if (url.indexOf("/d/") !== -1) id = url.match(/\/d\/(.+?)(\/|$)/)[1];
        else if (url.indexOf("id=") !== -1) id = url.match(/id=([^&]+)/)[1];
        return id
          ? "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000"
          : url;
      } catch (e) {
        return url;
      }
    };

    // 🧠 Smart Date Parser (Safe Version)
    var smartParse = function (val) {
      if (!val) return { date: "", display: "" };
      let d = null;
      try {
        if (val instanceof Date) {
          d = val;
        } else if (typeof val === "string") {
          const s = val.trim();
          const matchDMY = s.match(
            /^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})(?:\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?/,
          );
          if (matchDMY) {
            d = new Date(
              parseInt(matchDMY[3]),
              parseInt(matchDMY[2]) - 1,
              parseInt(matchDMY[1]),
              parseInt(matchDMY[4] || 0),
              parseInt(matchDMY[5] || 0),
              parseInt(matchDMY[6] || 0),
            );
          } else {
            const tryD = new Date(s);
            if (!isNaN(tryD.getTime())) d = tryD;
          }
        }
      } catch (e) {
        console.warn("Date parse error", e);
      }

      if (d && !isNaN(d.getTime())) {
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        return {
          date: `${yyyy}-${mm}-${dd}`,
          display: `${dd}/${mm}/${yyyy}`,
          nativeObj: d,
        };
      }
      return { date: "", display: val || "-", nativeObj: null };
    };

    return {
      _autoStartMonoUrls: _autoStartMonoUrls,
      _autoStopMonoUrls: _autoStopMonoUrls,
      _autoStartAisUrls: _autoStartAisUrls,
      _autoStopAisUrls: _autoStopAisUrls,

      init: function () {
        if (typeof Router !== 'undefined') {
          Router.register('page-report', this);
        }
      },

      // ✨ [แก้ไข] รวบ onShow 2 อันที่ซ้ำกันให้เหลืออันเดียว
      onShow: function () {
        console.log('📄 ReportManager: onShow');
        try {
          this.onPageShow();
          if (!_isDataLoaded) {
            this.autoFetchAll(true);
            _isDataLoaded = true;
          }
        } catch (e) {
          console.error('❌ ReportManager: onShow error', e);
          if (typeof UIManager !== 'undefined') {
            UIManager.showToast('เกิดข้อผิดพลาดในการโหลดหน้ารายงาน: ' + e.message, 'error');
          }
        }
      },

      openDatePicker: function () {
        if (!_picker) this.onPageShow();
        if (_picker) _picker.show();
      },

      onPageShow: function () {
        if (!_picker) {
          var input = el("inputDate");
          if (input) {
            var today = new Date();
            var yyyy = today.getFullYear();
            var mm = String(today.getMonth() + 1).padStart(2, "0");
            var dd = String(today.getDate()).padStart(2, "0");
            input.value = `${yyyy}-${mm}-${dd}`;

            _picker = new Pikaday({
              field: input,
              format: "YYYY-MM-DD",
              toString(date, format) {
                const day = String(date.getDate()).padStart(2, "0");
                const month = String(date.getMonth() + 1).padStart(2, "0");
                const year = date.getFullYear();
                return `${year}-${month}-${day}`;
              },
              yearRange: [2020, 2030],
              onSelect: function () {
                if (!_isLoading) ReportManager.autoFetchAll();
              },
            });
            // เอา setTimeout autoFetchAll ตรงนี้ออก เพราะใน onShow สั่งโหลดอยู่แล้ว (ลดโหลดเบิ้ล)
          }
        }
        this.fetchReporters();
        setTimeout(() => {
          if (this.setupPasteHandlers) this.setupPasteHandlers();
          this.setTransferMode('handover');
        }, 1000);
      },

      autoFetchAll: function (force = false) {
        if (_isLoading) return;
        var dateVal = el("inputDate").value;
        if (!dateVal) return;

        if (!force && _isDataLoaded && _lastFetchedDate === dateVal) {
          console.log("🚀 Report Cache Hit");
          return;
        }

        _isDataLoaded = true;
        _lastFetchedDate = dateVal;

        var self = this;
        self._setLoading(true);

        if (el("verification-tbody")) el("verification-tbody").innerHTML = "";
        if (el("disp-ticket-tbody")) el("disp-ticket-tbody").innerHTML = "";

        Promise.all([
          self.fetchTickets(),
          self.fetchMatches(force),
          self.fetchStartImages(),
          (function () { if (force) _isHandoverLoaded = false; return self.loadHandoverTopics(force); })()
        ])
          .then(function () {
            if (typeof UIManager !== "undefined")
              UIManager.showToast(
                force ? "บังคับดึงข้อมูลใหม่สำเร็จ" : "อัปเดตข้อมูลเรียบร้อย",
                "success",
              );
          })
          .catch(function (err) {
            console.error("Fetch Error:", err);
            if (typeof UIManager !== "undefined")
              UIManager.showToast("เกิดข้อผิดพลาดในการโหลดข้อมูล", "error");
          })
          .finally(function () {
            self._setLoading(false);
          });
      },

      _setLoading: function (loading) {
        _isLoading = loading;
        var btn = el("btn-refresh-report");
        var input = el("inputDate");
        if (input) input.disabled = loading;
        if (btn) {
          btn.disabled = loading;
          if (loading) btn.classList.add("is-loading");
          else btn.classList.remove("is-loading");
        }
      },

      fetchTickets: function () {
        var selectedDate = el("inputDate").value;
        var tbody = el("disp-ticket-tbody") || el("ticket-table-body");
        if (!tbody) return Promise.resolve();

        show("loader-ticket", true);
        show("empty-ticket", false);
        tbody.innerHTML = "";

        return Server.call({ func: "getTickets", silent: true })
          .then(function (res) {
            if (res && res.success) {
              var allTickets = res.data || [];
              let stats = {
                newToday: 0,
                closedToday: 0,
                pending: 0,
                filteredCount: 0,
              };
              let listForTable = [];

              allTickets.forEach((r) => {
                const createdObj = smartParse(r.date);
                const resolvedObj = smartParse(r.resolvedDate);
                const status = String(r.status || "").toLowerCase();
                const isClosed =
                  status.includes("close") ||
                  status.includes("resolved") ||
                  status.includes("fix");

                if (createdObj.date === selectedDate) stats.newToday++;

                if (isClosed) {
                  if (resolvedObj.date === selectedDate) stats.closedToday++;
                  else if (
                    !resolvedObj.date &&
                    createdObj.date === selectedDate
                  )
                    stats.closedToday++;
                } else {
                  stats.pending++;
                }

                let showRow = false;
                let tag = "";

                if (createdObj.date === selectedDate) {
                  showRow = true;
                  tag = "NEW";
                } else if (
                  isClosed &&
                  (resolvedObj.date === selectedDate ||
                    (!resolvedObj.date && createdObj.date === selectedDate))
                ) {
                  showRow = true;
                  tag = "RESOLVED";
                } else if (!isClosed) {
                  showRow = true;
                  tag = "BACKLOG";
                }

                const ticketDate = createdObj.nativeObj || new Date(r.date);
                const selectedDateObj = new Date(selectedDate);
                const yesterdayObj = new Date(selectedDate);
                yesterdayObj.setDate(yesterdayObj.getDate() - 1);

                const isSameDay = (d1, d2) =>
                  d1.getFullYear() === d2.getFullYear() &&
                  d1.getMonth() === d2.getMonth() &&
                  d1.getDate() === d2.getDate();

                let dateDisplay = createdObj.display;
                if (!isNaN(ticketDate.getTime())) {
                  const hh = String(ticketDate.getHours()).padStart(2, "0");
                  const mm = String(ticketDate.getMinutes()).padStart(2, "0");

                  if (isSameDay(ticketDate, selectedDateObj))
                    dateDisplay = `<span class="text-blue-600 font-bold">(วันนี้) ${hh}:${mm}</span>`;
                  else if (isSameDay(ticketDate, yesterdayObj))
                    dateDisplay = `<span class="text-gray-500">(เมื่อวาน) ${hh}:${mm}</span>`;
                  else dateDisplay = `${createdObj.display} ${hh}:${mm}`;
                }

                if (showRow) {
                  stats.filteredCount++;
                  listForTable.push({
                    id: r.ticketNumber,
                    dateDisplay: dateDisplay,
                    status: r.status || "-",
                    subject: r.subject || "-",
                    tag: tag,
                    sortKey: tag === "NEW" ? 3 : tag === "RESOLVED" ? 2 : 1,
                  });
                }
              });

              if (el("disp-ticket-total"))
                el("disp-ticket-total").innerText = stats.filteredCount || 0;
              if (el("disp-ticket-new"))
                el("disp-ticket-new").innerText = stats.newToday || 0;
              if (el("disp-ticket-resolved"))
                el("disp-ticket-resolved").innerText = stats.closedToday || 0;
              if (el("disp-ticket-backlog"))
                el("disp-ticket-backlog").innerText = stats.pending || 0;

              if (el("ticketSummary"))
                el("ticketSummary").value =
                  `งานเข้าใหม่: ${stats.newToday}, ปิดได้: ${stats.closedToday}, งานค้าง: ${stats.pending}`;

              listForTable.sort(
                (a, b) =>
                  b.sortKey - a.sortKey ||
                  String(b.id).localeCompare(String(a.id)),
              );

              if (listForTable.length > 0) {
                tbody.innerHTML = listForTable
                  .map(function (t) {
                    var st = String(t.status || "").toLowerCase();
                    var badgeClass =
                      "badge-ghost bg-gray-100 text-gray-500 border-none";
                    if (st.includes("open"))
                      badgeClass = "badge-error text-white shadow-sm";
                    else if (st.includes("pending") || st.includes("wait"))
                      badgeClass = "badge-warning text-white shadow-sm";
                    else if (st.includes("resolved") || st.includes("close"))
                      badgeClass = "badge-success text-white shadow-sm";

                    var miniTag = "";
                    if (t.tag === "NEW")
                      miniTag =
                        '<span class="text-[9px] text-blue-500 font-bold ml-1 tracking-tighter">งานเข้าใหม่</span>';
                    else if (t.tag === "RESOLVED")
                      miniTag =
                        '<span class="text-[9px] text-green-500 font-bold ml-1 tracking-tighter">ปิดได้</span>';
                    else if (t.tag === "BACKLOG")
                      miniTag =
                        '<span class="text-[9px] text-gray-400 font-bold ml-1 tracking-tighter">งานค้าง</span>';

                    return `<tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors h-[48px]">
                                                <td class="font-mono font-bold text-center text-[10px] text-gray-400 py-2 border-r border-gray-50 truncate max-w-[80px]" title="${t.id}">${t.id}</td>
                                                <td class="text-center p-1 border-r border-gray-50">
                                                    <div class="flex flex-col items-center justify-center">
                                                        <span class="badge ${badgeClass} badge-xs font-bold uppercase scale-90 h-4 px-1">${t.status}</span>
                                                        ${miniTag}
                                                    </div>
                                                </td>
                                                <td class="p-1.5 overflow-hidden">
                                                    <div class="text-[10px] text-gray-700 font-medium truncate w-full" title="${t.subject}">${t.subject}</div>
                                                    <div class="text-[9px] text-gray-400 mt-0.5 font-mono leading-none">${t.dateDisplay}</div>
                                                </td>
                                            </tr>`;
                  })
                  .join("");
              } else {
                show("empty-ticket", true);
              }
            }
          })
          .catch(function (err) {
            console.error("Ticket Load Error", err);
            show("empty-ticket", true);
          })
          .finally(() => show("loader-ticket", false));
      },

      fetchMatches: function () {
        var dateVal = el("inputDate").value;
        show("verify-loader", true);
        el("verification-tbody").innerHTML = "";

        return Server.call(
          { func: "getVerificationReport", silent: true },
          dateVal,
        )
          .then((res) => {
            if (res && res.success) {
              // --- จัดการข้อมูลสรุปลีก ---
              var summaryText = "";
              var breakdownHtml = "";
              if (res.data && res.data.summary) {
                for (var league in res.data.summary) {
                  summaryText += `${league}: ${res.data.summary[league]}\n`;
                  breakdownHtml += `<div class="badge badge-ghost badge-sm text-[10px] gap-1 whitespace-nowrap border-slate-200">${league}: <span class="font-bold text-slate-700">${res.data.summary[league]}</span></div>`;
                }
              }
              if (el("matchSummary"))
                el("matchSummary").value = summaryText || "ไม่มีรายการแข่งขัน";
              if (el("league-breakdown"))
                el("league-breakdown").innerHTML = breakdownHtml;

              // --- จัดการข้อมูลตาราง ---
              if (el("matchTotalValue"))
                el("matchTotalValue").value = res.data.stats.totalMatches;
              if (el("disp-match-total"))
                el("disp-match-total").innerText =
                  res.data.stats.totalMatches + " คู่";

              var list = res.data.list || [];
              var endedCount = list.filter(
                (item) => item.dashboard && item.dashboard.stopImg,
              ).length;
              if (el("matchEndedValue"))
                el("matchEndedValue").value = endedCount;

              if (list.length === 0) {
                show("verify-empty", true);
              } else {
                show("verify-empty", false);
                var html = "";
                var currentGroup = "";

                var fmtTime = function (t) {
                  if (!t) return "-";
                  var str = String(t);
                  if (str.indexOf("T") !== -1) return str.split("T")[1].substring(0, 5);
                  return str.substring(0, 5);
                };

                list.forEach((item) => {
                  var db = item.dashboard || {};
                  var isToday = db.date === dateVal;
                  var groupKey = isToday ? "today" : "yesterday";

                  if (groupKey !== currentGroup) {
                    currentGroup = groupKey;
                    var label = isToday
                      ? `<span class="text-blue-600 flex items-center gap-1"><i class="fas fa-sun text-yellow-500"></i> หลังเที่ยงคืน (วันนี้)</span>`
                      : `<span class="text-gray-500 flex items-center gap-1"><i class="fas fa-moon text-indigo-400"></i> ก่อนเที่ยงคืน (เมื่อวาน)</span>`;
                    html += `<tr class="bg-gray-50/80 border-b border-gray-200"><td colspan="9" class="px-3 py-1.5 font-bold text-[10px] uppercase">${label}</td></tr>`;
                  }

                  var matchTime = fmtTime(db.time);
                  var planTime = "-";
                  if (matchTime && matchTime !== "-") {
                    var parts = matchTime.split(":");
                    var h = parseInt(parts[0], 10) - 2;
                    if (h < 0) h += 24;
                    planTime = String(h).padStart(2, "0") + ":" + parts[1];
                  }

                  var isMatched = item.status === "MATCHED";
                  var statusWidget = isMatched
                    ? '<div class="flex justify-center"><i class="fas fa-check-circle text-emerald-500 text-[14px]"></i></div>'
                    : '<div class="flex justify-center"><span class="text-[8px] font-bold text-slate-300 uppercase tracking-tight">NOC OPEN</span></div>';

                  var imgBtn = (url, color) => {
                    var firstUrl = Array.isArray(url) ? (url.length > 0 ? url[0] : null) : url;
                    return firstUrl
                      ? `<a href="${formatDriveUrl(firstUrl)}" target="_blank" class="flex items-center justify-center w-6 h-6 rounded-md bg-${color}/10 hover:bg-${color}/20 text-${color} transition-colors mx-auto"><i class="fas fa-image text-[10px]"></i></a>`
                      : `<span class="text-gray-200 text-[10px]">-</span>`;
                  };

                  html += `<tr class="border-b border-gray-100 hover:bg-white transition-colors h-[48px]">
                            <td class="text-center font-mono text-[10px] text-slate-800 font-bold border-r border-gray-50">${matchTime}</td>
                            <td class="text-center font-mono text-[10px] text-red-500 font-bold border-r border-gray-50 bg-red-50/20">${planTime}</td>
                            <td class="p-1 border-r border-gray-50 overflow-hidden">
                                <div class="text-[10px] text-gray-500 leading-none mb-0.5 truncate">${db.league || "-"}</div>
                                <div class="font-bold text-slate-700 text-[11px] truncate" title="${db.home} v ${db.away}">${db.home} v ${db.away}</div>
                            </td>
                            <td class="text-center border-r border-gray-50 px-1">
                                <div class="badge badge-ghost badge-xs font-mono text-[8px] w-full truncate border-none bg-gray-100" title="${db.channel || "-"}">${db.channel || "-"}</div>
                            </td>
                            <td class="text-center p-0 border-r border-gray-50">${imgBtn(db.start_mono, "primary")}</td>
                            <td class="text-center p-0 border-r border-gray-50">${imgBtn(db.start_ais, "success")}</td>
                            <td class="text-center p-0 border-r border-gray-50">${imgBtn(db.stop_mono, "error")}</td>
                            <td class="text-center p-0 border-r border-gray-50">${imgBtn(db.stop_ais, "warning")}</td>
                            <td class="text-center bg-slate-50/30">${statusWidget}</td>
                          </tr>`;
                });
                el("verification-tbody").innerHTML = html;
              }
            } else {
              if (typeof UIManager !== "undefined")
                UIManager.showToast(
                  res.error || "โหลดข้อมูล Match ล้มเหลว",
                  "error",
                );
            }
          })
          .catch((err) => {
            console.error("Fetch Matches Error:", err);
          })
          .finally(() => show("verify-loader", false));
      },

      fetchStartImages: function () {
        var dateVal = el("inputDate").value;
        const types = ['startMono', 'stopMono', 'startAis', 'stopAis'];

        types.forEach(type => {
          const listEl = el(`auto-${type.replace(/([A-Z])/g, '-$1').toLowerCase()}-list`);
          if (listEl) listEl.innerHTML = "";
          show(`auto-${type.replace(/([A-Z])/g, '-$1').toLowerCase()}-images`, false);
        });

        _autoStartMonoUrls.length = 0;
        _autoStopMonoUrls.length = 0;
        _autoStartAisUrls.length = 0;
        _autoStopAisUrls.length = 0;

        return Server.call(
          { func: "getDailyProofImages", silent: true },
          dateVal,
        ).then((res) => {
          if (res.success) {
            const mapping = [
              { key: 'startMono', list: 'auto-start-mono-list', urls: _autoStartMonoUrls, container: 'auto-start-mono-images' },
              { key: 'stopMono', list: 'auto-stop-mono-list', urls: _autoStopMonoUrls, container: 'auto-stop-mono-images' },
              { key: 'startAis', list: 'auto-start-ais-list', urls: _autoStartAisUrls, container: 'auto-start-ais-images' },
              { key: 'stopAis', list: 'auto-stop-ais-list', urls: _autoStopAisUrls, container: 'auto-stop-ais-images' }
            ];

            mapping.forEach(m => {
              var images = res.data[m.key] || [];
              if (images.length > 0) {
                show(m.container, true);
                images.forEach((img) => {
                  if (m.urls.indexOf(img.url) === -1) {
                    m.urls.push(img.url);
                  }
                  ReportManager._renderAutoImage(img, el(m.list), m.urls);
                });
              }
            });
            ReportManager.updateImageCounts();
            ReportManager._updateStartStatus();
          }
        });
      },

      fetchReporters: function () {
        if (_isReportersLoaded) return;
        Server.call({ func: "apiGetAllSettings", silent: true }).then(
          function (res) {
            _isReportersLoaded = true;
            if (res && res.success && res.data && res.data.staff) {
              var select = el("reporterSelect");
              if (!select) return;
              var currentVal = select.value;
              var html = '<option value="">-- เลือก --</option>';
              res.data.staff.forEach(function (name) {
                html += `<option value="${name}">${name}</option>`;
              });
              html += '<option value="OTHER">อื่นๆ</option>';
              select.innerHTML = html;
              if (currentVal) select.value = currentVal;
            }
          },
        );
      },

      _updateStartStatus: function () {
        var hasStartMono = _autoStartMonoUrls.length > 0 || (_files.startMono && _files.startMono.length > 0);
        var sStartMono = el("statusStartMono");
        if (sStartMono) {
          if (hasStartMono) sStartMono.value = "เรียบร้อย";
          else if (sStartMono.value === "เรียบร้อย") sStartMono.value = "ไม่มี";
          ReportManager.toggleStartMonoArea(sStartMono.value);
        }

        var hasStopMono = _autoStopMonoUrls.length > 0 || (_files.stopMono && _files.stopMono.length > 0);
        var sStopMono = el("statusStopMono");
        if (sStopMono) {
          if (hasStopMono) sStopMono.value = "เรียบร้อย";
          else if (sStopMono.value === "เรียบร้อย") sStopMono.value = "ไม่มี";
          ReportManager.toggleStopMonoArea(sStopMono.value);
        }

        var hasStartAis = _autoStartAisUrls.length > 0 || (_files.startAis && _files.startAis.length > 0);
        var sStartAis = el("statusStartAis");
        if (sStartAis) {
          if (hasStartAis) sStartAis.value = "เรียบร้อย";
          else if (sStartAis.value === "เรียบร้อย") sStartAis.value = "ไม่มี";
          ReportManager.toggleStartAisArea(sStartAis.value);
        }

        var hasStopAis = _autoStopAisUrls.length > 0 || (_files.stopAis && _files.stopAis.length > 0);
        var sStopAis = el("statusStopAis");
        if (sStopAis) {
          if (hasStopAis) sStopAis.value = "เรียบร้อย";
          else if (sStopAis.value === "เรียบร้อย") sStopAis.value = "ไม่มี";
          ReportManager.toggleStopAisArea(sStopAis.value);
        }
      },

      _renderAutoImage: function (img, container, urlArray) {
        var isSelected = urlArray.indexOf(img.url) !== -1;
        var div = document.createElement("div");
        div.className =
          "relative flex-shrink-0 w-24 h-16 border rounded overflow-hidden cursor-pointer group transition-all hover:border-primary hover:shadow-sm " +
          (isSelected ? "ring-2 ring-green-500 border-green-400" : "border-slate-200");

                         <div class="absolute bottom-0 left-0 right-0 bg-black/40 text-[7px] text-white truncate px-1 py-0.5 leading-none font-mono text-center">${img.label}</div>`;

          _files[type] = _files[type].concat(Array.from(input.files));

        }
      },

      renderFileList: function (type) {
        var previewbox = el("preview-" + type);
        var placeholder = el("placeholder-" + type);
        if (!previewbox) return;
        var files = _files[type];

        if (files.length === 0) {
          previewbox.innerHTML = "";
          if (placeholder) placeholder.classList.remove("hidden");
        } else {
          if (placeholder) placeholder.classList.add("hidden");
          var html = "";
          files.forEach((file, idx) => {
            var url = URL.createObjectURL(file);
            html += `
              <div class="relative flex-shrink-0 w-32 h-16 rounded overflow-hidden border border-slate-200 shadow-sm group">
                <img src="${url}" class="w-full h-full object-cover">
                <button type="button" onclick="event.stopPropagation(); ReportManager.removeFile('${type}', ${idx})" class="absolute top-0 right-0 w-5 h-5 bg-red-500/90 hover:bg-red-600 text-white flex items-center justify-center text-[9px] z-10 shadow-sm"><i class="fas fa-times"></i></button>
              </div>`;
          });
          previewbox.innerHTML = html;
        }
      },

      removeFile: function (type, index) {
        _files[type].splice(index, 1);
        this.renderFileList(type);
        this._updateStartStatus();
      },

      submitForm: function (mode) {
        var reporter = _isCustomReporter
          ? el("reporterOther").value
          : el("reporterSelect").value;
        if (!reporter)
          return UIManager.showToast("ระบุชื่อผู้รายงาน", "warning");

        var hasStopMono = _autoStopMonoUrls.length > 0 || (_files.stopMono && _files.stopMono.length > 0);

        if (!hasStopMono) {
          return UIManager.showToast(
            "กรุณาใส่รูปหลักฐาน Stop Mono เป็นหลัก (เลือกจาก Dashboard หรืออัปโหลดใหม่)",
            "warning",
          );
        }

        var btn = el("btn-submit-report");
        btn.disabled = true;
        el("spin-btn-send").classList.remove("hidden");

        var formData = {
          date: el("inputDate").value,
          reporter: reporter,
          shift: el("shiftSelect").value,
          chatTarget: el("chatTargetSelect").value,
          ticketSummary: el("ticketSummary").value,
          matchSummary: el("matchSummary").value,
          matchTotal: el("matchTotalValue").value,
          matchEnded: el("matchEndedValue").value,
          transferReport: ReportManager.getTransferValue(),
          statusMono: el("statusStopMono") ? el("statusStopMono").value : "ไม่มี",
          statusAis: el("statusStopAis") ? el("statusStopAis").value : "ไม่มี",
          statusStart: el("statusStartMono") ? el("statusStartMono").value : "ไม่มี",
          statusStartMono: el("statusStartMono") ? el("statusStartMono").value : "ไม่มี",
          statusStopMono: el("statusStopMono") ? el("statusStopMono").value : "ไม่มี",
          statusStartAis: el("statusStartAis") ? el("statusStartAis").value : "ไม่มี",
          statusStopAis: el("statusStopAis") ? el("statusStopAis").value : "ไม่มี",
          ticketStats: {
            total: el("disp-ticket-total") ? el("disp-ticket-total").innerText : "0",
            new: el("disp-ticket-new") ? el("disp-ticket-new").innerText : "0",
            open: el("disp-ticket-backlog") ? el("disp-ticket-backlog").innerText : "0",
            pending: 0,
            resolved: el("disp-ticket-resolved") ? el("disp-ticket-resolved").innerText : "0",
            closed: 0,
            backlog: el("disp-ticket-backlog") ? el("disp-ticket-backlog").innerText : "0"
          },
          proofImages: {},
          autoStartMonoUrls: _autoStartMonoUrls,
          autoStopMonoUrls: _autoStopMonoUrls,
          autoStartAisUrls: _autoStartAisUrls,
          autoStopAisUrls: _autoStopAisUrls,
          isDraft: mode === "preview",
        };

        var compress = (file) =>
          new Promise((res) => {
            if (!file.type.match(/image.*/)) return res(null);
            var r = new FileReader();
            r.onload = (e) => {
              var i = new Image();
              i.onload = () => {
                var c = document.createElement("canvas");
                var ctx = c.getContext("2d");
                var m = 1000,
                  w = i.width,
                  h = i.height;
                if (w > h && w > m) {
                  h *= m / w;
                  w = m;
                } else if (h > m) {
                  w *= m / h;
                  h = m;
                }
                c.width = w;
                c.height = h;
                ctx.drawImage(i, 0, 0, w, h);
                res(c.toDataURL("image/jpeg", 0.8).split(",")[1]);
              };
              i.onerror = () => res(null);
              i.src = e.target.result;
            };
            r.onerror = () => res(null);
            r.readAsDataURL(file);
          });

        (async () => {
          try {
            if (mode !== "preview") {
              const types = ['startMono', 'stopMono', 'startAis', 'stopAis'];
              for (const t of types) {
                const files = _files[t] || [];
                if (files.length > 0) {
                  formData.proofImages[t] = (await Promise.all(files.map(compress))).filter(Boolean);
                }
              }
            }

            var res = await Server.call(
              { func: "processShiftReport" },
              formData,
            );

            if (res && res.success) {
              if (res.isPreview) {
                el("chatPreviewText").innerText = res.chatPreview;
                el("preview_modal").showModal();
              } else {
                Swal.fire({
                  icon: "success",
                  title: "บันทึกสำเร็จ",
                  text: "ระบบได้ส่งรายงานเรียบร้อยแล้ว",
                  timer: 1500,
                  showConfirmButton: false,
                }).then(() => {
                  var today = new Date();
                  var yyyy = today.getFullYear();
                  var mm = String(today.getMonth() + 1).padStart(2, "0");
                  var dd = String(today.getDate()).padStart(2, "0");
                  if (el("inputDate")) {
                    el("inputDate").value = `${yyyy}-${mm}-${dd}`;
                    if (typeof _picker !== "undefined") _picker.setDate(today);
                  }

                  if (el("transferReport")) el("transferReport").value = "";
                  if (el("statusMono")) el("statusMono").value = "เรียบร้อย";
                  if (el("statusAis")) el("statusAis").value = "ไม่มี";
                  if (el("statusStart")) el("statusStart").value = "ไม่มี";

                  _files = { startMono: [], stopMono: [], startAis: [], stopAis: [] };
                  _autoStartMonoUrls = [];
                  _autoStopMonoUrls = [];
                  _autoStartAisUrls = [];
                  _autoStopAisUrls = [];

                  ReportManager.renderFileList("startMono");
                  ReportManager.renderFileList("stopMono");
                  ReportManager.renderFileList("startAis");
                  ReportManager.renderFileList("stopAis");

                  ['start-mono', 'stop-mono', 'start-ais', 'stop-ais'].forEach(t => {
                    if (el(`auto-${t}-list`)) el(`auto-${t}-list`).innerHTML = "";
                    show(`auto-${t}-images`, false);
                  });

                  if (typeof ReportManager.updateImageCounts === "function")
                    ReportManager.updateImageCounts();
                  if (el("preview_modal")) el("preview_modal").close();
                  ReportManager.autoFetchAll();
                });
              }
            } else
              UIManager.showToast(res ? res.error : "Unknown Error", "error");
          } catch (e) {
            UIManager.showToast(e.message, "error");
          } finally {
            btn.disabled = false;
            el("spin-btn-send").classList.add("hidden");
          }
        })();
      },

      loadHandoverTopics: function (force = false) {
        if (!force && _isHandoverLoaded) {
          console.log("🚚 Handover Cache Hit");
          return Promise.resolve();
        }

        var loader = el('transfer-handover-loader');
        var list = el('transfer-handover-list');
        var empty = el('transfer-handover-empty');

        if (loader) loader.classList.remove('hidden');
        if (list) list.innerHTML = '';
        if (empty) empty.classList.add('hidden');
        this._handoverChecked = [];

        return Server.call({ func: "getHandovers", silent: true })
          .then((res) => {
            if (loader) loader.classList.add('hidden');
            if (res && res.success) {
              var items = res.data.items || [];
              var pending = items.filter((i) => String(i.status || '').trim() !== 'Succeed');

              if (pending.length === 0) {
                if (list) list.classList.add('hidden');
                if (empty) empty.classList.remove('hidden');
                return;
              }

              if (list) list.classList.remove('hidden');
              if (empty) empty.classList.add('hidden');

              var html = '';
              pending.forEach((item) => {
                var statusIcon = '<i class="fas fa-circle-notch text-amber-500 text-[10px]"></i>';
                var tagsHtml = '';
                if (Array.isArray(item.tags) && item.tags.length > 0) {
                  tagsHtml = item.tags.map(t => `<span class="text-[9px] font-medium text-gray-500 border border-gray-200 bg-white px-1 py-0.5 rounded">${t}</span>`).join(' ');
                }
                var dateStr = '';
                try { dateStr = new Date(item.timestamp).toLocaleDateString('th-TH', { day: '2-digit', month: 'short' }); } catch (e) { }

                html += `<label class="flex items-start gap-2 p-2 rounded-lg border border-gray-100 hover:bg-gray-50 cursor-pointer transition-colors">
                  <input type="checkbox" class="checkbox checkbox-xs checkbox-primary mt-0.5 shrink-0" value="${(item.topic || '').replace(/"/g, '&quot;')}" onchange="ReportManager.toggleHandoverItem(this)">
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-1.5">
                      ${statusIcon}<span class="text-xs font-semibold text-gray-800 truncate">${item.topic || '-'}</span>
                    </div>
                    <div class="flex items-center gap-1.5 mt-1 flex-wrap">
                      <span class="text-[9px] text-gray-400">${item.creator || ''}</span>
                      ${dateStr ? `<span class="text-[9px] text-gray-300">${dateStr}</span>` : ''}
                      ${tagsHtml ? `<span class="text-gray-200">|</span>${tagsHtml}` : ''}
                    </div>
                  </div>
                </label>`;
              });
              if (list) list.innerHTML = html;
            } else {
              if (list) list.classList.add('hidden');
              if (empty) empty.classList.remove('hidden');
            }
            _isHandoverLoaded = true;
          })
          .catch((err) => {
            console.error("Handover Load Error", err);
            if (empty) empty.classList.remove('hidden');
          })
          .finally(() => {
            if (loader) loader.classList.add('hidden');
          });
      },

      toggleHandoverItem: function (checkbox) {
        var val = checkbox.value;
        if (checkbox.checked) {
          if (this._handoverChecked.indexOf(val) === -1) this._handoverChecked.push(val);
        } else {
          var idx = this._handoverChecked.indexOf(val);
          if (idx > -1) this._handoverChecked.splice(idx, 1);
        }
      },

      getTransferValue: function () {
        if (this._transferMode === 'handover' && this._handoverChecked.length > 0) {
          return this._handoverChecked.map(function (t, i) { return (i + 1) + '. ' + t; }).join('\n');
        }
        return el("transferReport") ? el("transferReport").value : '';
      },

      // ✨ [แก้ไข] เพิ่มระบบ Debounce ป้องกันรูปเบิ้ล
      handlePasteEvent: function (e, type) {
        // ป้องกันการทำงานซ้ำซ้อนภายใน 300ms
        var now = Date.now();
        if (now - _lastPasteTime < 300) {
          e.preventDefault();
          return;
        }
        _lastPasteTime = now;

        var clipboardData = (e.clipboardData || (e.originalEvent && e.originalEvent.clipboardData));
        if (!clipboardData) return;
        
        var items = clipboardData.items;
        for (var i = 0; i < items.length; i++) {
          if (items[i].type.indexOf("image") !== -1) {
            var blob = items[i].getAsFile();
            if (!_files[type]) _files[type] = [];
            _files[type].push(blob);
            this.renderFileList(type);
            this._updateStartStatus();
            if (typeof UIManager !== "undefined")
              UIManager.showToast("วางรูปเรียบร้อย ✅", "success");
              
            e.preventDefault();
            e.stopImmediatePropagation(); // หยุดไม่ให้ Event กระจายไปทำงานตัวอื่นที่ซ้อนกัน
            return;
          }
        }
      },

      setupPasteHandlers: function () {
        ["startMono", "stopMono", "startAis", "stopAis"].forEach((type) => {
          var dashType = type.replace(/([A-Z])/g, '-$1').toLowerCase();
          var dz = el("dropzone-" + dashType);
          if (dz && !dz.hasAttribute("data-listening")) {
            dz.setAttribute("tabindex", "0");
            dz.addEventListener("paste", (e) => this.handlePasteEvent(e, type));
            dz.setAttribute("data-listening", "true");
          }
        });
      },
    };
  })();

  if (window.ReportManager) {
    window.ReportManager.init();
  }
</script>

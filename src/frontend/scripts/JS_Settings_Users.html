<script>
  window.UsrSettings = (() => {
    let _full = {};
    let _staff = []; let _assignees = []; let _loaded = false;
    const el = id => document.getElementById(id);

    function _render(listName) {
      const items = listName === 'staff' ? _staff : _assignees;
      const tbody = el('usr-tbody-' + listName);
      const empty = el('usr-empty-' + listName);
      const cnt = el('usr-cnt-' + listName);
      if (cnt) cnt.innerText = items.length;
      if (!tbody) return;

      tbody.innerHTML = items.length === 0 ? '' : items.map((user, i) => `
      <tr class="hover:bg-base-50 group">
        <td class="text-center text-xs text-gray-400 font-mono">${i + 1}</td>
        <td class="text-sm font-medium text-gray-700">${typeof user === 'object' ? user.name : user}</td>
        <td class="text-sm text-gray-500">${typeof user === 'object' ? (user.engName || '-') : '-'}</td>
        <td class="text-center">
          <div class="flex justify-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
            <button onclick="UsrSettings.openEdit('${listName}',${i})" class="btn btn-ghost btn-xs btn-square text-blue-400"><i class="fas fa-pencil-alt text-[10px]"></i></button>
            <button onclick="UsrSettings.removeItem('${listName}',${i})" class="btn btn-ghost btn-xs btn-square text-red-400"><i class="fas fa-trash text-[10px]"></i></button>
          </div>
        </td>
      </tr>`).join('');
      if (empty) empty.classList.toggle('hidden', items.length > 0);
    }

    return {
      init() {
        if (typeof Router !== "undefined") {
          Router.register("page-settings-users", this);
        }
      },
      onShow() { 
        console.log('📄 UsrSettings: onShow');
        try {
          if (!_loaded) this.loadData();
        } catch (e) {
          console.error('❌ UsrSettings: onShow error', e);
          if (typeof UIManager !== 'undefined') {
            UIManager.showToast('เกิดข้อผิดพลาดในการโหลดการตั้งค่าผู้ใช้: ' + e.message, 'error');
          }
        }
      },

      loadData(force) {
        let btnRefresh = el('btn-refresh-settings-users');
        if (btnRefresh) btnRefresh.classList.add('is-loading');
        ['staff', 'assignees'].forEach(n => {
          const t = el('usr-tbody-' + n);
          const e = el('usr-empty-' + n);
          const l = el('usr-loader-' + n);
          if (t) t.innerHTML = '';
          if (l) l.classList.remove('hidden');
          if (e) e.classList.add('hidden');
        });
        Server.call({ func: "apiGetAllSettings", silent: true })
          .then(r => {
            if (r.success && r.data) {
              _full = r.data;
              const allUsers = r.data.staffUsers || [];
              if (allUsers.length > 0) {
                _staff = allUsers.filter(u => u.role === 'Responsibility' || String(u.role).toLowerCase().includes('leader'));
                _assignees = allUsers.filter(u => u.role === 'Operator' || String(u.role).toLowerCase().includes('assignee'));
              } else {
                _staff = (r.data.staff || []).map(n => ({ name: n, engName: '', role: 'Responsibility' }));
                _assignees = (r.data.assignees || []).map(n => ({ name: n, engName: '', role: 'Operator' }));
              }
              _loaded = true;
              _render('staff'); _render('assignees');
              if (force) UIManager.showToast("โหลดสำเร็จ", "success");
            }
          })
          .catch(() => UIManager.showToast("Load Error", "error"))
          .finally(() => {
            let btnRefresh = el('btn-refresh-settings-users');
            if (btnRefresh) btnRefresh.classList.remove('is-loading');
            ['staff', 'assignees'].forEach(n => { const l = el('usr-loader-' + n); if (l) l.classList.add('hidden'); });
          });
      },

      openAdd(role) {
        el('usr-edit-role').value = role;
        el('usr-edit-index').value = '-1';
        el('usr-input-name').value = '';
        el('usr-input-engname').value = '';
        el('usr-modal-title').innerText = role === 'staff' ? 'เพิ่มผู้รับผิดชอบ' : 'เพิ่มผู้ปฏิบัติงาน';
        el('modal-usr-item').showModal();
      },

      openEdit(role, i) {
        const items = role === 'staff' ? _staff : _assignees;
        const item = items[i];
        el('usr-edit-role').value = role;
        el('usr-edit-index').value = i;
        if (typeof item === 'object') {
          el('usr-input-name').value = item.name || '';
          el('usr-input-engname').value = item.engName || '';
        } else {
          el('usr-input-name').value = item || '';
          el('usr-input-engname').value = '';
        }
        el('usr-modal-title').innerText = 'แก้ไขชื่อ';
        el('modal-usr-item').showModal();
      },

      saveModal() {
        const name = el('usr-input-name').value.trim();
        const engName = el('usr-input-engname').value.trim();
        if (!name) return UIManager.showToast("กรุณากรอกชื่อ", "warning");
        const role = el('usr-edit-role').value;
        const idx = parseInt(el('usr-edit-index').value);
        const arr = role === 'staff' ? _staff : _assignees;
        const objRole = role === 'staff' ? 'Responsibility' : 'Operator';
        const obj = { name: name, engName: engName, role: objRole };

        if (idx >= 0) {
          arr[idx] = obj;
        } else {
          if (arr.find(u => (typeof u === 'object' ? u.name : u) === name)) return UIManager.showToast("มีชื่อนี้แล้ว", "warning");
          arr.push(obj);
        }

        el('modal-usr-item').close();
        _render(role);
      },

      removeItem(role, i) {
        (role === 'staff' ? _staff : _assignees).splice(i, 1);
        _render(role);
      },

      saveAll() {
        UIManager.showLoading("กำลังบันทึก...");
        // Re-construct staffUsers list
        const staffUsers = [..._staff, ..._assignees];
        const payload = { ..._full, staffUsers: staffUsers, staff: _staff.map(u => u.name), assignees: _assignees.map(u => u.name) };
        Server.call({ func: "apiSaveAllSettings", silent: true }, payload)
          .then(r => { if (r.success) UIManager.showToast("บันทึกสำเร็จ", "success"); else UIManager.showToast(r.message || "Error", "error"); })
          .catch(() => UIManager.showToast("Connection Error", "error"))
          .finally(() => UIManager.hideLoading());
      }
    };
  })();
</script>

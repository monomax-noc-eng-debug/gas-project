<script>
  const savedLastPage = localStorage.getItem("gas_last_page");
  let isAppReady = false;

  document.addEventListener("DOMContentLoaded", async () => {
    Logger.log("🚀 App Starting...");

    // 1. Sidebar Links
    document.querySelectorAll("aside a[data-target]").forEach((el) => {
      el.addEventListener("click", (e) => {
        e.preventDefault();
        const target = el.dataset.target;
        Router.navigateTo(target);

        const drawer = document.getElementById("my-drawer");
        if (drawer) drawer.checked = false;
      });
    });

    // 2. จับ Event เปลี่ยนหน้า
    document.addEventListener("page-change", (e) => {
      if (isAppReady && e.detail && e.detail.pageId) {
        localStorage.setItem("gas_last_page", e.detail.pageId);
      }
    });

    // 3. Initialize Controllers & Managers
    try {
      if (typeof Dashboard !== 'undefined' && Dashboard.init) Dashboard.init();
      if (typeof ReportManager !== 'undefined' && ReportManager.init) ReportManager.init();
      if (typeof HandoverManager !== 'undefined' && HandoverManager.init) HandoverManager.init();
      if (typeof TicketManager !== 'undefined' && TicketManager.init) TicketManager.init();

      // ✨ เพิ่มการ Initialze PlaybookManager สำหรับหน้า Service Playbook ✨
      if (typeof PlaybookManager !== 'undefined' && PlaybookManager.init) PlaybookManager.init();

      if (typeof EmailFetchManager !== 'undefined' && EmailFetchManager.init) EmailFetchManager.init();
      if (typeof EmailSendManager !== 'undefined' && EmailSendManager.init) EmailSendManager.init();
      if (typeof SysSettings !== 'undefined' && SysSettings.init) SysSettings.init();
      if (typeof ChecklistSettings !== 'undefined' && ChecklistSettings.init) ChecklistSettings.init();
      if (typeof UsrSettings !== 'undefined' && UsrSettings.init) UsrSettings.init();
      if (typeof EmailSettings !== 'undefined' && EmailSettings.init) EmailSettings.init();
      if (typeof TagSettings !== 'undefined' && TagSettings.init) TagSettings.init();
      if (typeof HistoryManager !== 'undefined' && HistoryManager.init) HistoryManager.init();

      if (typeof Store !== "undefined" && Store.init) {
        // รอจนกว่าจะดึงข้อมูล User Settings จาก GAS สำเร็จ
        await Store.init();
      }

      if (
        savedLastPage &&
        savedLastPage !== "undefined" &&
        document.getElementById(savedLastPage)
      ) {
        Router.navigateTo(savedLastPage);
      } else {
        Router.navigateTo("page-dashboard");
      }
    } catch (e) {
      console.error("App Init Failed", e);
      Router.navigateTo("page-dashboard");
    } finally {
      isAppReady = true;
      Logger.log("✅ App is fully ready.");

      // ✨ ปิด Global Loader (ที่ฝังไว้ใน HTML) เมื่อข้อมูลจากหลังบ้านโหลดเสร็จ
      if (typeof hideGlobalLoader === 'function') {
        hideGlobalLoader();
      }
    }
  });
</script>

<script>
  /**
   * SERVICE LAYER
   * หน้าที่: ติดต่อ Server, ดึงข้อมูล, บันทึกข้อมูล
   * อัปเดต: นำระบบ Retry มาใช้กับฝั่ง Read Operations
   */
  const TicketService = (() => {
    return {
      // --- Config & Profiles ---
      // ปลอดภัยที่จะ Retry ได้ 2 รอบ หากเน็ตหลุดระหว่างโหลดหน้า
      getConfig: () =>
        Server.call({ func: "getTicketConfig", silent: true, retries: 2 }),
      getEmailProfiles: () =>
        Server.call({ func: "getEmailProfiles", silent: true, retries: 2 }),
      getSiteProfiles: () =>
        Server.call({ func: "getEmailDrafts", silent: true, retries: 2 }), // Site Info
      getMailDrafts: () =>
        Server.call({ func: "getMailDrafts", silent: true, retries: 2 }), // Saved Drafts

      // --- Ticket Operations ---
      getAllTickets: () =>
        Server.call({ func: "getTickets", silent: true, retries: 2 }),

      saveTicket: (data, isUpdate) => {
        const func = isUpdate ? "updateTicket" : "createTicket";
        // การบันทึก/แก้ไข ไม่ใส่ retries เพื่อป้องกันบันทึกข้อมูลเบิ้ล
        return Server.call({ func: func, silent: false }, data);
      },

      saveAndDraft: (ticketData, emailData) => {
        return Server.call(
          { func: "createTicketAndDraft", silent: false },
          { ticket: ticketData, email: emailData },
        );
      },

      deleteTicket: (id) =>
        Server.call({ func: "deleteTicket", silent: false }, id),

      // --- Email Sync ---
      fetchEmailPreviews: () =>
        Server.call({ func: "getEmailPreviews", silent: true, retries: 2 }),
      importEmails: (payloads) =>
        Server.call({ func: "saveBatchTickets", silent: true }, payloads),

      // --- Saved Drafts ---
      saveDraftsList: (drafts) =>
        Server.call({ func: "saveMailDrafts", silent: true }, drafts),
    };
  })();
</script>

<script>
  let currentTeamMembers = [];
  let handoverItems = [];
  let filteredItems = []; // for pagination
  let _hoCurrentPage = 1;
  let _hoItemsPerPage = 15;
  let handoverTags = [];
  let handoverTypes = [];
  let selectedHandoverId = null;
  let selectedFormTags = [];
  let _isHandoverDataLoaded = false;

  window.HandoverManager = (function () {
    return {
      init: function () {
        if (typeof Router !== 'undefined') {
          Router.register('page-handover', this);
        }
      },
      onShow: function () {
        console.log('📄 HandoverManager: onShow');
        try {
          loadHandovers();
        } catch (e) {
          console.error('❌ HandoverManager: onShow error', e);
          if (typeof UIManager !== 'undefined') {
            UIManager.showToast('เกิดข้อผิดพลาดในการโหลดหน้าส่งกะ: ' + e.message, 'error');
          }
        }
      }
    };
  })();

  // ==================== [ระบบโหลดข้อมูล & Filter] ====================
  function loadHandoversWithBtn() {
    const btn = document.getElementById('btn-load-handovers');
    if (btn) btn.classList.add('is-loading');
    _isHandoverDataLoaded = false; // Force refresh
    loadHandovers(false, function () {
      if (btn) btn.classList.remove('is-loading');
      UIManager.showToast("อัปเดตข้อมูลส่งกะแล้ว", "success");
    });
  }

  function loadHandovers(keepSelection = false, callback = null) {
    if (_isHandoverDataLoaded) {
      console.log("🚚 Handover Cache Hit");
      if (callback) callback();
      filterHandovers(keepSelection);
      return;
    }

    const listContainer = document.getElementById('ho_list_container');
    if (!callback && listContainer) {
      let skeletonHtml = '';
      for (let i = 0; i < 6; i++) {
        skeletonHtml += `
          <tr class="bg-white">
            <td class="text-xs opacity-70 font-mono text-center py-4"><div class="skeleton h-3 w-16 mx-auto rounded bg-gray-200"></div></td>
            <td class="font-bold text-[11px]"><div class="skeleton h-3 w-12 rounded bg-gray-200"></div></td>
            <td><div class="skeleton h-3 w-full max-w-[200px] rounded bg-gray-200"></div></td>
            <td><div class="skeleton h-3 w-16 rounded bg-gray-200"></div></td>
            <td><div class="skeleton h-3 w-20 rounded bg-gray-200"></div></td>
            <td class="font-medium text-[11px]"><div class="skeleton h-3 w-16 rounded bg-gray-200"></div></td>
            <td class="text-center align-middle"><div class="skeleton h-4 w-16 mx-auto rounded bg-gray-200"></div></td>
            <td class="text-center"><div class="skeleton h-6 w-6 mx-auto rounded bg-gray-200"></div></td>
          </tr>`;
      }
      listContainer.innerHTML = skeletonHtml;
    }

    google.script.run
      .withSuccessHandler(function (res) {
        if (callback) callback();
        try {
          const response = typeof res === 'string' ? JSON.parse(res) : res;
          if (response.success) {
            _isHandoverDataLoaded = true;
            currentTeamMembers = response.data.team || [];
            handoverTags = response.data.tags || [];
            handoverTypes = response.data.types || [];
            handoverItems = response.data.items || [];
            filteredItems = [...handoverItems];
            updateTagsDropdown(handoverTags);
            updateTypeDropdown(handoverTypes);
            populateCreatorDropdown();
            filterHandovers(keepSelection);
          }
        } catch (e) { console.error(e); }
      })
      .apiHandler({ func: "getHandovers", data: null });
  }

  let searchTimeout;
  function filterHandovers(keepSelection = true) {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      const searchInput = document.getElementById('ho_search_input');
      const statusFilter = document.getElementById('ho_status_filter');
      const typeFilter = document.getElementById('ho_type_filter');
      const tagFilter = document.getElementById('ho_tag_filter');
      const searchText = searchInput ? searchInput.value.toLowerCase().trim() : '';
      const statusVal = statusFilter ? statusFilter.value : 'all';
      const typeVal = typeFilter ? typeFilter.value : 'all';
      const tagVal = tagFilter ? tagFilter.value : 'all';

      filteredItems = handoverItems.filter(item => {
        let textMatched = true;
        if (searchText !== '') {
          const topicMatch = (item.topic || '').toLowerCase().includes(searchText);
          let tagMatch = false;
          if (Array.isArray(item.tags)) tagMatch = item.tags.some(t => t.toLowerCase().includes(searchText));
          textMatched = topicMatch || tagMatch;
        }
        let statusMatched = true;
        if (statusVal === 'pending') statusMatched = item.status !== 'Succeed';
        if (statusVal === 'succeed') statusMatched = item.status === 'Succeed';

        let typeMatched = true;
        if (typeVal !== 'all') typeMatched = item.type === typeVal;

        let tagMatched = true;
        if (tagVal !== 'all') tagMatched = Array.isArray(item.tags) && item.tags.includes(tagVal);

        return textMatched && statusMatched && typeMatched && tagMatched;
      });
      _hoCurrentPage = 1;
      renderHandoverCurrentPage();

      if (filteredItems.length === 0) {
        showEmptyState();
      } else {
        document.getElementById('ho_empty_state').classList.add('hidden');
        if (keepSelection && selectedHandoverId && filteredItems.find(i => i.id === selectedHandoverId)) {
          selectHandover(selectedHandoverId);
        }
      }
    }, 200);
  }

  function changeHandoverPage(page) {
    _hoCurrentPage = page;
    renderHandoverCurrentPage();
  }

  function renderHandoverCurrentPage() {
    const start = (_hoCurrentPage - 1) * _hoItemsPerPage;
    const end = start + _hoItemsPerPage;
    const pageData = filteredItems.slice(start, end);
    renderHandoverTable(pageData);
    renderHandoverPagination(filteredItems.length, _hoItemsPerPage, _hoCurrentPage);
  }

  function updateTagsDropdown(tags) {
    const select = document.getElementById('ho_tags_select');
    const filter = document.getElementById('ho_tag_filter');
    if (select) {
      select.innerHTML = '<option value="" disabled selected>-- เลือก Tag --</option>';
      tags.forEach(tag => select.innerHTML += `<option value="${tag}">${tag}</option>`);
    }
    if (filter) {
      filter.innerHTML = '<option value="all">ทุก Tag</option>';
      tags.forEach(tag => filter.innerHTML += `<option value="${tag}">${tag}</option>`);
    }
  }

  function updateTypeDropdown(types) {
    const select = document.getElementById('ho_type_select');
    const filter = document.getElementById('ho_type_filter');
    if (select) {
      select.innerHTML = '<option value="">-- ไม่ระบุ --</option>';
      types.forEach(type => select.innerHTML += `<option value="${type}">${type}</option>`);
    }
    if (filter) {
      filter.innerHTML = '<option value="all">ทุกประเภท</option>';
      types.forEach(type => filter.innerHTML += `<option value="${type}">${type}</option>`);
    }
  }

  function populateCreatorDropdown() {
    const select = document.getElementById('ho_creator_select');
    if (!select) return;
    select.innerHTML = '<option value="Unknown">-- เลือกผู้รายงาน --</option>';

    // กรองเฉพาะผู้ที่มีบทบาท 'Responsibility' เหมือนกับปุ่มรับทราบ
    const targetMembers = currentTeamMembers.filter(m =>
      m.role && String(m.role).toLowerCase().includes("responsibility")
    );

    targetMembers.forEach(m => {
      const name = typeof m === 'object' ? m.name : m;
      select.innerHTML += `<option value="${name}">${name}</option>`;
    });
  }

  function addSelectedTag() {
    const select = document.getElementById('ho_tags_select');
    const val = select.value;
    if (val && !selectedFormTags.includes(val)) {
      selectedFormTags.push(val);
      renderFormTagsUI();
    }
    select.value = "";
  }

  function removeSelectedTag(val) {
    selectedFormTags = selectedFormTags.filter(t => t !== val);
    renderFormTagsUI();
  }

  function renderFormTagsUI() {
    const container = document.getElementById('ho_selected_tags_container');
    if (!container) return;
    if (selectedFormTags.length === 0) {
      container.innerHTML = '';
      return;
    }
    container.innerHTML = selectedFormTags.map(t => `
      <span class="badge badge-primary badge-sm font-bold flex items-center gap-1 shadow-sm">
        ${t} <i class="fas fa-times cursor-pointer hover:text-white" onclick="removeSelectedTag('${t}')"></i>
      </span>
    `).join('');
  }

  function addDynamicRow(containerId, placeholderStr, type = 'textarea', valueStr = '') {
    const container = document.getElementById(containerId);
    if (!container) return;
    const rowId = `row_${Math.random().toString(36).substr(2, 9)}`;
    let inputHTML = (type === 'textarea')
      ? `<textarea class="textarea textarea-bordered w-full min-h-[60px] text-xs bg-slate-50 focus:bg-white focus:outline-primary leading-relaxed rounded-lg" placeholder="${placeholderStr}">${valueStr}</textarea>`
      : `<input type="text" class="input input-sm input-bordered w-full text-xs bg-slate-50 focus:bg-white focus:outline-primary rounded-lg" placeholder="${placeholderStr}" value="${valueStr}" />`;
    const html = `
      <div id="${rowId}" class="flex gap-2 items-start relative group">
        <div class="flex-1">${inputHTML}</div>
        <button type="button" class="btn btn-sm btn-square btn-ghost text-red-400 hover:text-red-600 hover:bg-red-50 rounded-lg" onclick="document.getElementById('${rowId}').remove()" title="ลบข้อมูลนี้"><i class="fas fa-trash-alt"></i></button>
      </div>`;
    container.insertAdjacentHTML('beforeend', html);
  }

  function addDynamicContactRow(containerId, placeholderStr, valueObj = { type: 'phone', val: '' }) {
    const container = document.getElementById(containerId);
    if (!container) return;
    const rowId = `row_${Math.random().toString(36).substr(2, 9)}`;
    let type = 'phone';
    let val = '';
    if (typeof valueObj === 'string') {
      val = valueObj;
    } else if (valueObj) {
      type = valueObj.type || 'phone';
      val = valueObj.val || '';
    }
    const html = `
      <div id="${rowId}" class="flex gap-2 items-center relative group contact-row">
        <select class="select select-sm select-bordered bg-slate-50 focus:bg-white text-xs w-28 contact-type">
           <option value="phone" ${type === 'phone' ? 'selected' : ''}>📞 โทรศัพท์</option>
           <option value="email" ${type === 'email' ? 'selected' : ''}>✉️ อีเมล</option>
        </select>
        <div class="flex-1"><input type="text" class="input input-sm input-bordered w-full text-xs bg-slate-50 focus:bg-white rounded-lg contact-val" placeholder="${placeholderStr}" value="${val}" /></div>
        <button type="button" class="btn btn-sm btn-square btn-ghost text-red-400 hover:bg-red-50 rounded-lg" onclick="document.getElementById('${rowId}').remove()"><i class="fas fa-trash-alt"></i></button>
      </div>`;
    container.insertAdjacentHTML('beforeend', html);
  }

  function getDynamicValues(containerId) {
    const container = document.getElementById(containerId);
    if (!container) return '[]';
    const values = [];
    container.querySelectorAll('input, textarea').forEach(input => {
      if (input.value.trim() !== '') values.push(input.value.trim());
    });
    return JSON.stringify(values);
  }

  function getDynamicContactValues(containerId) {
    const container = document.getElementById(containerId);
    if (!container) return '[]';
    const values = [];
    container.querySelectorAll('.contact-row').forEach(row => {
      const type = row.querySelector('.contact-type').value;
      const val = row.querySelector('.contact-val').value.trim();
      if (val !== '') values.push({ type, val });
    });
    return JSON.stringify(values);
  }

  function renderDynamicValues(containerId, jsonStr, placeholderStr, type) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = '';
    let values = [];
    try {
      const parsed = JSON.parse(jsonStr);
      values = Array.isArray(parsed) ? parsed : [jsonStr];
    } catch (e) {
      if (jsonStr && jsonStr.trim() !== '') values = [jsonStr];
    }
    if (values.length === 0) {
      addDynamicRow(containerId, placeholderStr, type);
    } else {
      values.forEach(val => addDynamicRow(containerId, placeholderStr, type, val));
    }
  }

  function renderDynamicContactValues(containerId, jsonStr, placeholderStr) {
    const container = document.getElementById(containerId);
    if (!container) return;
    container.innerHTML = '';
    let values = [];
    try {
      const parsed = JSON.parse(jsonStr);
      values = Array.isArray(parsed) ? parsed : [jsonStr];
    } catch (e) {
      if (jsonStr && jsonStr.trim() !== '') values = [jsonStr];
    }
    if (values.length === 0) {
      addDynamicContactRow(containerId, placeholderStr);
    } else {
      values.forEach(val => addDynamicContactRow(containerId, placeholderStr, val));
    }
  }

  function renderHandoverTable(items) {
    const container = document.getElementById('ho_list_container');
    if (!container) return;

    const emptyState = document.getElementById('ho_empty_state');
    if (items.length === 0) {
      container.innerHTML = `<tr><td colspan="8" class="text-center py-10 text-xs text-gray-400 font-medium whitespace-nowrap">ไม่พบข้อมูลรายงานสำหรับกะนี้</td></tr>`;
      if (emptyState) emptyState.classList.remove('hidden');
      _hoItemsPerPage = 15; // Reset just in case
      return;
    }
    if (emptyState) emptyState.classList.add('hidden');

    let html = '';
    items.forEach(item => {
      const isSelected = selectedHandoverId === item.id;
      const rowClass = isSelected ? "bg-slate-50 border-primary/20" : "hover bg-white";
      const statusBadge = item.status === 'Succeed' ? '<div class="badge badge-success gap-1 text-white border-0 shadow-sm badge-sm text-[10px]"><i class="fas fa-check"></i> เสร็จสิ้น</div>' : '<div class="badge badge-warning gap-1 text-amber-800 border-0 shadow-sm badge-sm text-[10px]"><i class="fas fa-hourglass-half"></i> รอดำเนินการ</div>';

      const dt = new Date(item.timestamp);
      const dateStr = dt.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: '2-digit' });
      const timeStr = dt.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
      const typeBadge = item.type ? `<span class="bg-blue-50 text-blue-600 font-bold px-1.5 py-0.5 rounded text-[9px] border border-blue-200">${item.type}</span>` : '';

      let tagsHtml = '';
      if (Array.isArray(item.tags) && item.tags.length > 0) {
        tagsHtml = item.tags.slice(0, 2).map(t => `<span class="bg-slate-100 text-slate-500 font-medium px-1.5 py-0.5 rounded text-[9px]">${t}</span>`).join('');
        if (item.tags.length > 2) tagsHtml += `<span class="text-[9px] font-medium text-slate-400 ml-0.5">+${item.tags.length - 2}</span>`;
      }

      html += `
        <tr class="${rowClass} cursor-pointer transition-colors border-b border-slate-100 last:border-none group" onclick="selectHandover('${item.id}')">
            <td class="text-xs opacity-70 font-mono whitespace-nowrap text-center">
                <div class="flex flex-col items-center">
                    <span class="flex items-center gap-1.5"><i class="far fa-calendar-alt opacity-50"></i> ${dateStr}</span>
                    <span class="text-[9px] opacity-60 mt-0.5">${timeStr}</span>
                </div>
            </td>
            <td class="font-bold text-[11px] whitespace-nowrap">
                <div class="flex items-center gap-1.5">
                    ${item.shift === 'Day' ? '<i class="fas fa-sun text-amber-500 text-[10px]"></i>' : '<i class="fas fa-moon text-indigo-500 text-[10px]"></i>'} 
                    ${item.shift}
                </div>
            </td>
            <td>
                <div class="font-bold text-[13px] truncate max-w-[150px] md:max-w-[200px] xl:max-w-[250px] text-slate-700 group-hover:text-primary transition-colors">${item.topic || '-'}</div>
            </td>
            <td class="whitespace-nowrap">
                ${typeBadge}
            </td>
            <td>
                <div class="flex flex-wrap items-center gap-1">
                    ${tagsHtml}
                </div>
            </td>
            <td class="text-[11px] font-medium text-slate-600 whitespace-nowrap">
                <div class="flex items-center gap-1.5">
                    <i class="fas fa-user-circle text-slate-400 text-[10px]"></i> ${item.creator || '-'}
                </div>
            </td>
            <td class="text-center align-middle">
                ${statusBadge}
            </td>
            <td class="text-center">
                <div class="flex justify-center gap-1.5">
                    <button class="btn btn-square btn-xs btn-ghost bg-white shadow-sm border border-slate-200 text-slate-400 hover:text-primary hover:border-primary/30 transition-all tooltip tooltip-left" 
                            data-tip="ดูรายละเอียด"
                            onclick="event.stopPropagation(); selectHandover('${item.id}')">
                        <i class="fas fa-eye text-[10px]"></i>
                    </button>
                    <button class="btn btn-square btn-xs btn-ghost bg-white shadow-sm border border-slate-200 text-slate-400 hover:text-amber-500 hover:border-amber-500/30 transition-all tooltip tooltip-left" 
                            data-tip="แก้ไข"
                            onclick="event.stopPropagation(); openEditDrawer('${item.id}')">
                        <i class="fas fa-pen text-[10px]"></i>
                    </button>
                </div>
            </td>
        </tr>
      `;
    });
    container.innerHTML = html;
  }

  function renderHandoverPagination(totalItems, itemsPerPage, currentPage) {
    const infoMsg = document.getElementById('ho-pagination-info');
    const controls = document.getElementById('ho-pagination-controls');
    if (!infoMsg || !controls) return;

    const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
    const start = totalItems === 0 ? 0 : (currentPage - 1) * itemsPerPage + 1;
    const end = Math.min(currentPage * itemsPerPage, totalItems);

    infoMsg.innerText = `แสดง ${start}-${end} จาก ${totalItems} รายการ`;

    let buttonsHTML = '';

    // Prev button
    buttonsHTML += `
    <button class="join-item btn btn-xs bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 ${currentPage === 1 ? 'btn-disabled bg-slate-50 text-slate-300' : ''}" 
            onclick="changeHandoverPage(${currentPage - 1})">
        <i class="fas fa-chevron-left text-[9px]"></i>
    </button>`;

    // Generate page numbers
    let startPage = Math.max(1, currentPage - 2);
    let endPage = Math.min(totalPages, currentPage + 2);

    if (startPage > 1) {
      buttonsHTML += `<button class="join-item btn btn-xs bg-white border border-slate-200 text-slate-600 hover:bg-slate-50" onclick="changeHandoverPage(1)">1</button>`;
      if (startPage > 2) buttonsHTML += `<button class="join-item btn btn-xs bg-white border border-slate-200 text-slate-400 btn-disabled">...</button>`;
    }

    for (let i = startPage; i <= endPage; i++) {
      const activeClass = i === currentPage ? 'btn-primary text-white border-primary' : 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50';
      buttonsHTML += `<button class="join-item btn btn-xs ${activeClass}" onclick="changeHandoverPage(${i})">${i}</button>`;
    }

    if (endPage < totalPages) {
      if (endPage < totalPages - 1) buttonsHTML += `<button class="join-item btn btn-xs bg-white border border-slate-200 text-slate-400 btn-disabled">...</button>`;
      buttonsHTML += `<button class="join-item btn btn-xs bg-white border border-slate-200 text-slate-600 hover:bg-slate-50" onclick="changeHandoverPage(${totalPages})">${totalPages}</button>`;
    }

    // Next button
    buttonsHTML += `
    <button class="join-item btn btn-xs bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 ${currentPage === totalPages ? 'btn-disabled bg-slate-50 text-slate-300' : ''}" 
            onclick="changeHandoverPage(${currentPage + 1})">
        <i class="fas fa-chevron-right text-[9px]"></i>
    </button>`;

    controls.innerHTML = buttonsHTML;
  }

  function showEmptyState() {
    selectedHandoverId = null;
    const checkbox = document.getElementById('drawer-handover-toggle');
    if (checkbox) checkbox.checked = false;

    document.getElementById('ho_empty_state').classList.remove('hidden');
    document.getElementById('ho_skeleton_state').classList.add('hidden');
    const detailContent = document.getElementById('ho_detail_content');
    detailContent.classList.add('hidden');
    detailContent.classList.remove('flex');

    document.querySelectorAll('#ho_list_container > tr').forEach(row => {
      row.classList.remove('bg-slate-50', 'border-primary/20');
      row.classList.add('hover', 'bg-white');
    });
  }

  function selectHandover(id) {
    selectedHandoverId = id;

    const checkbox = document.getElementById('drawer-handover-toggle');
    if (checkbox) checkbox.checked = true;

    document.querySelectorAll('#ho_list_container > tr').forEach(row => {
      row.classList.remove('bg-slate-50', 'border-primary/20');
      row.classList.add('hover', 'bg-white');
    });

    // The rendered row id is implicit we need to find it by rebuilding it or finding by row onclick
    // but the original code didn't set ID on tr. Let's add an explicit ID to tr if possible, but
    // since we can't we'll just re-render the list or find by href. Wait, `renderHandoverTable` didn't set ID for tr!
    // I should fix `renderHandoverTable` to set ID on tr or we can just renderHandoverCurrentPage.
    // Let's call renderHandoverCurrentPage to update the selected row visually
    renderHandoverCurrentPage();

    document.getElementById('ho_empty_state').classList.add('hidden');
    document.getElementById('ho_skeleton_state').classList.add('hidden');

    // Switch to Detail View
    const detailContent = document.getElementById('ho_detail_content');
    const detailActions = document.getElementById('ho_detail_actions');
    const formContent = document.getElementById('ho_form_content');
    const formActions = document.getElementById('ho_form_actions');

    if (detailContent) { detailContent.classList.remove('hidden'); detailContent.classList.add('flex'); }
    if (detailActions) { detailActions.classList.remove('hidden'); detailActions.classList.add('flex'); }
    if (formContent) { formContent.classList.add('hidden'); formContent.classList.remove('flex'); }
    if (formActions) { formActions.classList.add('hidden'); formActions.classList.remove('flex'); }

    const item = handoverItems.find(i => i.id === id);
    if (item) renderDetailData(item);
  }

  function showRightSkeleton() {
    document.getElementById('ho_empty_state').classList.add('hidden');
    document.getElementById('ho_skeleton_state').classList.remove('hidden');
    const detailContent = document.getElementById('ho_detail_content');
    detailContent.classList.add('hidden');
    detailContent.classList.remove('flex');
    const wrap = document.getElementById('ho_detail_wrapper');
    if (window.innerWidth < 1024) {
      wrap.classList.remove('hidden');
      wrap.classList.add('flex', 'absolute', 'inset-0', 'z-50', 'bg-base-200', 'p-4');
    } else {
      wrap.classList.remove('hidden');
      wrap.classList.add('flex');
    }
  }

  function closeDetail() { showEmptyState(); }

  function renderDetailData(item) {
    const subtitleEl = document.getElementById('ho_drawer_subtitle');
    if (subtitleEl) subtitleEl.innerText = 'ID: ' + item.id;

    document.getElementById('ho_detail_topic').innerText = item.topic || '-';
    document.getElementById('ho_detail_time_text').innerText = new Date(item.timestamp).toLocaleString('th-TH', { dateStyle: 'short', timeStyle: 'short' });
    document.getElementById('ho_detail_creator_text').innerText = item.creator || 'Unknown';
    const statusEl = document.getElementById('ho_detail_status');
    if (item.status === 'Succeed') {
      statusEl.className = 'text-[11px] font-bold border border-emerald-200 text-emerald-700 bg-emerald-50 px-2.5 py-1 rounded-lg flex items-center gap-1.5 shadow-sm transition-all';
      statusEl.innerHTML = '<i class="fas fa-check-circle text-emerald-500"></i> เสร็จสิ้น';
    } else {
      statusEl.className = 'text-[11px] font-bold border border-amber-200 text-amber-700 bg-amber-50 px-2.5 py-1 rounded-lg flex items-center gap-1.5 shadow-sm transition-all';
      statusEl.innerHTML = '<i class="fas fa-clock text-amber-500"></i> รอดำเนินการ';
    }

    const shiftIcon = item.shift === 'Day' ? '<i class="fas fa-sun text-amber-500"></i>' : '<i class="fas fa-moon text-indigo-500"></i>';
    const shiftEl = document.getElementById('ho_detail_shift');
    shiftEl.innerHTML = `${shiftIcon} <span class="ml-1.5">${item.shift || '-'} Shift</span>`;
    shiftEl.className = 'text-[11px] font-bold text-slate-600 bg-slate-100/80 px-2.5 py-1 rounded-lg border border-slate-200 flex items-center shadow-sm';

    const typeEl = document.getElementById('ho_detail_type');
    if (item.type) {
      typeEl.innerHTML = item.type;
      typeEl.className = 'text-[11px] font-bold text-blue-600 bg-blue-50 border border-blue-200 px-2.5 py-1 rounded-lg shadow-sm';
      typeEl.classList.remove('hidden');
    } else {
      typeEl.innerHTML = '';
      typeEl.classList.add('hidden');
    }

    const tagsContainer = document.getElementById('ho_detail_tags_container');
    tagsContainer.innerHTML = (Array.isArray(item.tags) && item.tags.length > 0)
      ? item.tags.map(t => `<span class="text-[11px] font-bold text-slate-500 bg-white border border-slate-200 px-2.5 py-1 rounded-lg shadow-sm">${t}</span>`).join('')
      : '';
    let detailsArr = [];
    try { detailsArr = JSON.parse(item.detail); } catch (e) { detailsArr = [item.detail]; }
    const timelineContainer = document.getElementById('ho_detail_timeline');
    timelineContainer.innerHTML = (Array.isArray(detailsArr) && detailsArr.length > 0)
      ? detailsArr.map((txt, idx) => {
        const numberBadge = detailsArr.length > 1
          ? `<div class="w-5 h-5 rounded-md bg-gray-100 text-gray-500 font-semibold flex items-center justify-center shrink-0 mt-0.5 text-[11px] border border-gray-200/50">${idx + 1}</div>`
          : '';
        return `
            <div class="flex gap-3 items-start pb-3">
                ${numberBadge}
                <div class="text-[13px] text-gray-700 leading-relaxed w-full whitespace-pre-line pt-0.5">${txt.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>
            </div>`;
      }).join('')
      : '<span class="text-sm text-gray-400 italic">- ไม่มีข้อมูล -</span>';
    let contactsArr = [];
    try { contactsArr = JSON.parse(item.contact); } catch (e) { contactsArr = [item.contact]; }
    const contactWrap = document.getElementById('ho_detail_contact_wrap');
    const contactGrid = document.getElementById('ho_detail_contact_grid');
    if (Array.isArray(contactsArr) && contactsArr.length > 0 && contactsArr[0] && (typeof contactsArr[0] !== 'string' || contactsArr[0].trim() !== '')) {
      contactWrap.classList.remove('hidden');
      contactGrid.innerHTML = contactsArr.map(c => {
        let type = 'phone';
        let val = '';
        if (typeof c === 'string') {
          val = c;
        } else if (c && c.val) {
          type = c.type;
          val = c.val;
        } else { return ''; }
        if (val.trim() === '') return '';
        const icon = type === 'email' ? '<i class="fas fa-envelope text-gray-400 text-[10px]"></i>' : '<i class="fas fa-phone text-gray-400 text-[10px]"></i>';
        return `<div class="flex items-center gap-2 py-2 px-3 bg-gray-50 rounded-lg border border-gray-100">
            ${icon}
            <p class="text-[13px] font-medium text-gray-700">${val.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</p>
        </div>`;
      }).join('');
    } else { contactWrap.classList.add('hidden'); }
    renderAcknowledgeSection(item);
    const btnResolve = document.getElementById('btn_quick_resolve');
    if (btnResolve) {
      if (item.status !== 'Succeed') { btnResolve.classList.remove('hidden'); btnResolve.classList.add('flex'); }
      else { btnResolve.classList.add('hidden'); btnResolve.classList.remove('flex'); }
    }
  }

  function renderAcknowledgeSection(item) {
    const container = document.getElementById('ho_ack_container');
    if (!currentTeamMembers || currentTeamMembers.length === 0) {
      container.innerHTML = `<div class="col-span-full text-[10px] text-error">ไม่พบข้อมูลทีม</div>`;
      return;
    }

    // Filter by role: 'Responsibility'
    const targetMembers = currentTeamMembers.filter(m =>
      m.role && String(m.role).toLowerCase().includes("responsibility")
    );

    if (targetMembers.length === 0) {
      container.innerHTML = `<div class="col-span-full text-[10px] text-slate-400">ไม่มีรายชื่อผู้รับผิดชอบ</div>`;
      return;
    }

    const acknowledged = item.acknowledged || {};

    container.innerHTML = targetMembers.map(member => {
      const fullName = (member.name || "").trim();
      const shortName = fullName.split(' ')[0];

      // Robust matching: find key that matches trimmed fullName
      let ackTime = null;
      const matchingKey = Object.keys(acknowledged).find(k => k.trim() === fullName);
      if (matchingKey) ackTime = acknowledged[matchingKey];

      return ackTime ? `
        <button onclick="ackHandover('${item.id}', '${fullName}', this)" class="btn btn-sm h-auto py-2 px-3 flex items-center justify-start gap-2 w-full bg-emerald-50/50 border-emerald-100 hover:bg-red-50 hover:border-red-100 group text-left rounded-lg transition-colors shadow-none font-sans">
          <span class="group-hover:hidden flex items-center justify-center shrink-0 w-4 h-4"><i class="fas fa-check-circle text-emerald-500 text-sm"></i></span>
          <span class="hidden group-hover:flex items-center justify-center shrink-0 w-4 h-4"><i class="fas fa-times-circle text-red-400 text-sm"></i></span>
          <div class="flex flex-col leading-tight">
            <span class="text-xs font-semibold text-emerald-700 group-hover:text-red-600">${shortName}</span>
            <span class="text-[10px] text-emerald-600/70 font-medium">${ackTime}</span>
          </div>
        </button>` : `
        <button onclick="ackHandover('${item.id}', '${fullName}', this)" class="btn btn-sm h-auto py-2 px-3 flex items-center justify-start gap-2 w-full bg-white border-gray-200 hover:bg-gray-50 text-left rounded-lg transition-colors shadow-none font-sans">
          <div class="w-4 h-4 rounded-full border border-dashed border-gray-300 flex items-center justify-center shrink-0"><i class="fas fa-user text-gray-300 text-[8px]"></i></div>
          <div class="flex flex-col leading-tight"><span class="text-xs font-semibold text-gray-600">${shortName}</span><span class="text-[10px] text-gray-400 font-medium">รอรับทราบ</span></div>
        </button>`;
    }).join('');
  }

  let isAcknowledging = false;
  function ackHandover(id, name, btnObj) {
    if (isAcknowledging) return;
    isAcknowledging = true;
    const container = document.getElementById('ho_ack_container');
    if (container) {
      container.querySelectorAll('button').forEach(b => { if (b !== btnObj) { b.disabled = true; b.classList.add('opacity-50', 'cursor-not-allowed'); } });
    }
    let originalHtml = btnObj ? btnObj.innerHTML : '';
    if (btnObj) btnObj.innerHTML = '<div class="flex items-center justify-center w-full py-0.5"><span class="loading loading-spinner loading-sm text-primary"></span></div>';
    google.script.run
      .withSuccessHandler(function (res) {
        isAcknowledging = false;
        try {
          const response = typeof res === 'string' ? JSON.parse(res) : res;
          const data = response.data || {};
          const success = response.success;

          if (success) {
            const msg = data.message || "ดำเนินการเรียบร้อย";
            Swal.mixin({
              toast: true,
              position: 'bottom-end',
              showConfirmButton: false,
              timer: 2000
            }).fire({ icon: 'success', title: msg });

            // อัปเดตข้อมูลในฝั่ง Client ทันทีโดยไม่ต้องโหลดใหม่ทั้งหมด
            const itemIdx = handoverItems.findIndex(i => i.id === id);
            if (itemIdx !== -1) {
              handoverItems[itemIdx].acknowledged = data.acknowledged;
              handoverItems[itemIdx].status = data.status;

              // อัปเดตข้อมูลใน filteredItems ด้วย (เนื่องจากเป็น reference หรืออาศัย id เดียวกัน)
              const filteredItem = filteredItems.find(i => i.id === id);
              if (filteredItem) {
                filteredItem.acknowledged = data.acknowledged;
                filteredItem.status = data.status;
              }

              // สั่ง Render ใหม่เฉพาะจุด
              renderHandoverCurrentPage();
              renderDetailData(handoverItems[itemIdx]);
            }

            // เนื่องจาก render จะสร้างปุ่มใหม่ทั้งหมด จึงไม่ต้องปลดล็อกปุ่มเดิมด้วยตนเอง
          } else {
            Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: response.error || "ไม่สามารถบันทึกได้" });
            if (btnObj) btnObj.innerHTML = originalHtml;
            if (container) {
              container.querySelectorAll('button').forEach(b => {
                b.disabled = false;
                b.classList.remove('opacity-50', 'cursor-not-allowed');
              });
            }
          }
        } catch (e) {
          console.error("Parse error:", e);
          Swal.fire({ icon: 'error', title: 'Error', text: 'เกิดข้อผิดพลาดในการรับข้อมูลจากเซิร์ฟเวอร์' });
          if (btnObj) btnObj.innerHTML = originalHtml;
        }
      })
      .withFailureHandler(function (err) {
        isAcknowledging = false;
        Swal.mixin({ toast: true, position: 'bottom-end', showConfirmButton: false, timer: 1500 }).fire({ icon: 'error', title: 'เกิดข้อผิดพลาด' });
        if (btnObj) btnObj.innerHTML = originalHtml;
        if (container) { container.querySelectorAll('button').forEach(b => { b.disabled = false; b.classList.remove('opacity-50', 'cursor-not-allowed'); }); }
      })
      .apiHandler({ func: "acknowledgeHandover", data: { id: id, name: name } });
  }

  function openCreateDrawer() {
    selectedHandoverId = null;
    renderHandoverCurrentPage();
    document.getElementById('ho_edit_id').value = '';
    document.getElementById('ho_topic').value = '';
    document.getElementById('ho_type_select').value = '';
    selectedFormTags = [];
    document.getElementById('ho_tags_select').value = "";
    renderFormTagsUI();
    renderDynamicValues('dynamic_detail_container', '[]', 'ระบุรายละเอียดหรือสิ่งที่ต้องทำ...', 'textarea');
    renderDynamicContactValues('dynamic_contact_container', '[]', 'ชื่อ - เบอร์โทร');
    let currentUser = (typeof Store !== "undefined" && Store.state && Store.state.currentUser) ? Store.state.currentUser.userName || "" : "";
    const creatorSelect = document.getElementById('ho_creator_select');
    for (let i = 0; i < creatorSelect.options.length; i++) { if (creatorSelect.options[i].value === currentUser) { creatorSelect.selectedIndex = i; break; } }

    // Default Time & Date
    const nowLocal = new Date();
    // Use tz offset trick to format properly for inputs without it converting back to UTC causing off-by-1-day
    // For simplicity, building manually to local date
    const yyyy = nowLocal.getFullYear();
    const mm = String(nowLocal.getMonth() + 1).padStart(2, '0');
    const dd = String(nowLocal.getDate()).padStart(2, '0');
    document.getElementById('ho_date_input').value = `${yyyy}-${mm}-${dd}`;
    document.getElementById('ho_time_input').value = String(nowLocal.getHours()).padStart(2, '0') + ":" + String(nowLocal.getMinutes()).padStart(2, '0');
    document.getElementById('ho_modal_shift_select').value = "Auto";

    document.getElementById('ho_modal_time_controls').classList.add('hidden');
    document.getElementById('ho_auto_time_display').classList.remove('hidden');

    document.getElementById('ho_form_content').classList.remove('hidden');
    document.getElementById('ho_form_content').classList.add('flex');
    document.getElementById('ho_form_actions').classList.remove('hidden');
    document.getElementById('ho_form_actions').classList.add('flex');

    document.getElementById('ho_detail_content').classList.add('hidden');
    document.getElementById('ho_detail_content').classList.remove('flex');
    document.getElementById('ho_detail_actions').classList.add('hidden');
    document.getElementById('ho_detail_actions').classList.remove('flex');

    document.getElementById('ho_drawer_icon_container').className = "w-8 h-8 rounded-lg bg-primary/10 text-primary flex items-center justify-center font-bold";
    document.getElementById('ho_drawer_icon').className = "fas fa-plus-circle text-sm";
    document.getElementById('ho_drawer_title').innerText = "สร้างรายการส่งกะ";
    document.getElementById('ho_drawer_subtitle').innerText = "กรอกรายละเอียด";

    // Open Drawer
    document.getElementById('drawer-handover-toggle').checked = true;
  }

  function openEditDrawer(id) {
    if (id) {
      selectedHandoverId = id;
      renderHandoverCurrentPage();
    }
    if (!selectedHandoverId) return;
    const item = handoverItems.find(i => i.id === selectedHandoverId);
    if (!item) return;
    document.getElementById('ho_edit_id').value = item.id;
    document.getElementById('ho_topic').value = item.topic;
    document.getElementById('ho_type_select').value = item.type || "";
    selectedFormTags = Array.isArray(item.tags) ? [...item.tags] : [];

    // Check if the Drawer has a custom Drawer edit modal toggler
    const detailWrap = document.getElementById('ho_detail_wrapper');
    if (detailWrap && !detailWrap.classList.contains('hidden')) {
      // It's open from drawer, it will continue normally overriding UI components inside general modal
    }

    renderFormTagsUI();
    renderDynamicValues('dynamic_detail_container', item.detail, 'ระบุรายละเอียดหรือสิ่งที่ต้องทำ...', 'textarea');
    renderDynamicContactValues('dynamic_contact_container', item.contact, 'ชื่อ - เบอร์โทร');
    document.getElementById('ho_creator_select').value = item.creator || "Unknown";

    // Set time/date
    const itemDate = new Date(item.timestamp);
    if (!isNaN(itemDate)) {
      const yyyy = itemDate.getFullYear();
      const mm = String(itemDate.getMonth() + 1).padStart(2, '0');
      const dd = String(itemDate.getDate()).padStart(2, '0');
      document.getElementById('ho_date_input').value = `${yyyy}-${mm}-${dd}`;
      document.getElementById('ho_time_input').value = String(itemDate.getHours()).padStart(2, '0') + ":" + String(itemDate.getMinutes()).padStart(2, '0');
    }
    document.getElementById('ho_modal_shift_select').value = item.shift || 'Auto';

    document.getElementById('ho_modal_time_controls').classList.remove('hidden');
    document.getElementById('ho_auto_time_display').classList.add('hidden');

    document.getElementById('ho_form_content').classList.remove('hidden');
    document.getElementById('ho_form_content').classList.add('flex');
    document.getElementById('ho_form_actions').classList.remove('hidden');
    document.getElementById('ho_form_actions').classList.add('flex');

    document.getElementById('ho_detail_content').classList.add('hidden');
    document.getElementById('ho_detail_content').classList.remove('flex');
    document.getElementById('ho_detail_actions').classList.add('hidden');
    document.getElementById('ho_detail_actions').classList.remove('flex');

    document.getElementById('ho_drawer_icon_container').className = "w-8 h-8 rounded-lg bg-amber-50 text-amber-500 flex items-center justify-center font-bold";
    document.getElementById('ho_drawer_icon').className = "fas fa-edit text-sm";
    document.getElementById('ho_drawer_title').innerText = "แก้ไขรายการ";
    document.getElementById('ho_drawer_subtitle').innerText = "ID: " + item.id;

    // Open Drawer
    document.getElementById('drawer-handover-toggle').checked = true;
  }

  function closeFormDrawer() {
    document.getElementById('ho_form_content').classList.add('hidden');
    document.getElementById('ho_form_actions').classList.add('hidden');
    document.getElementById('ho_form_actions').classList.remove('flex');
    document.getElementById('ho_detail_content').classList.remove('hidden');
    document.getElementById('ho_detail_actions').classList.remove('hidden');
    document.getElementById('ho_detail_actions').classList.add('flex');

    // Restore header details
    document.getElementById('ho_drawer_icon_container').className = "w-8 h-8 rounded-lg bg-emerald-50 text-emerald-600 flex items-center justify-center font-bold";
    document.getElementById('ho_drawer_icon').className = "fas fa-eye text-sm";
    document.getElementById('ho_drawer_title').innerText = "Handover Details";

    if (selectedHandoverId) {
      document.getElementById('ho_drawer_subtitle').innerText = "ID: " + selectedHandoverId;
    } else {
      closeDrawer();
    }
  }

  function closeDrawer() {
    document.getElementById('drawer-handover-toggle').checked = false;
  }

  function deleteHandover() {
    if (!selectedHandoverId) return;
    Swal.fire({ title: 'ลบรายการนี้?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#e3242b', cancelButtonColor: '#9ca3af', confirmButtonText: 'ลบทิ้ง', cancelButtonText: 'ยกเลิก', customClass: { confirmButton: 'rounded-lg', cancelButton: 'rounded-lg' } }).then((result) => {
      if (result.isConfirmed) {
        Swal.fire({ title: 'กำลังลบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        google.script.run.withSuccessHandler(function (res) {
          const resp = typeof res === 'string' ? JSON.parse(res) : res;
          if (resp && resp.success === false) return Swal.fire({ icon: 'error', title: 'ไม่สามารถลบได้', text: resp.message || resp.error });
          Swal.fire({ icon: 'success', title: 'ลบเรียบร้อย', timer: 1500, showConfirmButton: false });
          _isHandoverDataLoaded = false;
          showRightSkeleton();
          loadHandovers(false);
        }).apiHandler({ func: "deleteHandover", data: selectedHandoverId });
      }
    });
  }

  function submitHandover() {
    const detailJSON = getDynamicValues('dynamic_detail_container');
    const contactJSON = getDynamicContactValues('dynamic_contact_container');
    const creatorVal = document.getElementById('ho_creator_select').value;

    let dateVal = document.getElementById('ho_date_input').value;
    let timeVal = document.getElementById('ho_time_input').value;
    let shiftVal = document.getElementById('ho_modal_shift_select').value;

    const isHidden = document.getElementById('ho_modal_time_controls').classList.contains('hidden');
    if (isHidden && !document.getElementById('ho_edit_id').value) {
      // If not editing and it is hidden, treat it as Auto
      dateVal = "";
      timeVal = "";
      shiftVal = "Auto";
    }

    const data = {
      id: document.getElementById('ho_edit_id').value,
      tags: selectedFormTags,
      topic: document.getElementById('ho_topic').value.trim(),
      type: document.getElementById('ho_type_select').value,
      detail: detailJSON,
      contact: contactJSON,
      creator: creatorVal === "Unknown" ? "" : creatorVal,
      overrideDate: dateVal,
      overrideTime: timeVal,
      shift: shiftVal
    };
    if (!data.topic || detailJSON === '[]') { Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบ', text: 'กรุณาระบุหัวข้อและรายละเอียดอย่างน้อย 1 ขั้นตอน', timer: 2000, showConfirmButton: false }); return; }
    const btnText = document.getElementById('submit-ho-text');
    const btnSpinner = document.getElementById('submit-ho-spinner');
    const btn = document.getElementById('btn_submit_ho');
    if (btnText) btnText.classList.replace('opacity-100', 'opacity-0');
    if (btnSpinner) btnSpinner.classList.replace('opacity-0', 'opacity-100');
    btn.disabled = true;
    google.script.run.withSuccessHandler(function (res) {
      if (btnText) btnText.classList.replace('opacity-0', 'opacity-100');
      if (btnSpinner) btnSpinner.classList.replace('opacity-100', 'opacity-0');
      btn.disabled = false;
      const resp = typeof res === 'string' ? JSON.parse(res) : res;
      if (resp && resp.success === false) {
        Swal.fire({ icon: 'error', title: 'ไม่สามารถบันทึกได้', text: resp.message });
        return;
      }
      closeFormDrawer();
      Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ', timer: 1500, showConfirmButton: false });
      _isHandoverDataLoaded = false;
      showRightSkeleton();
      loadHandovers(!!data.id);
    }).apiHandler({ func: data.id ? "updateHandover" : "createHandover", data: data });
  }

  function quickResolveHandover() {
    if (!selectedHandoverId) return;
    Swal.fire({ title: 'ปิดงานนี้ (Mark as Succeed)?', text: "สถานะจะถูกเปลี่ยนเป็น เสร็จสิ้น ทันที", icon: 'question', showCancelButton: true, confirmButtonColor: '#10b981', cancelButtonColor: '#9ca3af', confirmButtonText: '<i class="fas fa-check"></i> ยืนยันปิดงาน', cancelButtonText: 'ยกเลิก', customClass: { confirmButton: 'rounded-lg', cancelButton: 'rounded-lg' } }).then((result) => {
      if (result.isConfirmed) {
        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        google.script.run.withSuccessHandler(function (res) {
          const resp = typeof res === 'string' ? JSON.parse(res) : res;
          if (resp && resp.success === false) return Swal.fire({ icon: 'error', title: 'ไม่สามารถปิดได้', text: resp.message || resp.error });
          Swal.fire({ icon: 'success', title: 'ปิดงานเรียบร้อย', timer: 1500, showConfirmButton: false });
          _isHandoverDataLoaded = false;
          showRightSkeleton();
          loadHandovers(true);
        }).withFailureHandler(function (err) { Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด' }); }).apiHandler({ func: "resolveHandover", data: selectedHandoverId });
      }
    });
  }
</script>

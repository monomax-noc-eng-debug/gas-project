<script>
  /**
   * JS_Dashboard.html
   * Version: Multi-Image Support & Grid Preview + Lightweight Polling + Skeleton + Plan Start
   */
  const Dashboard = (function () {
    // --- Helpers ---
    const getEl = function (id) {
      return document.getElementById(id);
    };
    let _currentDate = new Date();
    let _allWorkData = [];
    let _pickers = {};

    // Store array of images objects: { type: 'url'|'file', source: string|File }
    let _workImages = { "start-mono": [], "start-ais": [], "stop-mono": [], "stop-ais": [], "stop-mono-quick": [], "stop-ais-quick": [] };

    let _editMode = "all"; // 'new', 'all', 'start', 'stop'
    let _isLoaded = false;
    let _lastCalendarFetchDate = null;

    let _galleryList = [];
    let _galleryIndex = 0;

    // ✨ NEW: Checklist vars
    let _currentChecklistMatchId = null;
    let _currentChecklistData = [];
    let _checklistStaffOptions = null;

    const escapeHTML = (str) => {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    };

    // ✨ NEW: เก็บเวลาที่ดึงข้อมูลล่าสุด เพื่อใช้เทียบว่ามีข้อมูลใหม่หรือไม่
    let _lastSyncTime = Date.now();

    // --- Date Helpers ---
    const toDisplayDate = (date) => {
      if (!date) return "";
      const d = new Date(date);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${day}/${m}/${y}`;
    };

    const toInputDate = (date) => {
      if (!date) return "";
      const d = new Date(date);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    };

    const showToastInModal = (msg, type, modalId) => {
      const targetEl = getEl(modalId);
      Swal.fire({
        toast: true,
        position: "bottom-end",
        showConfirmButton: false,
        timer: 3000,
        icon: type,
        title: msg,
        target: targetEl || "body",
        customClass: { container: "z-[999999]" },
      });
    };

    const createPicker = (elementId, onSelectCallback) => {
      const el = getEl(elementId);
      if (!el) return null;
      return new Pikaday({
        field: el,
        format: "DD/MM/YYYY",
        theme: "triangle-theme",
        i18n: {
          previousMonth: "เดือนก่อน",
          nextMonth: "เดือนถัดไป",
          months: [
            "มกราคม",
            "กุมภาพันธ์",
            "มีนาคม",
            "เมษายน",
            "พฤษภาคม",
            "มิถุนายน",
            "กรกฎาคม",
            "สิงหาคม",
            "กันยายน",
            "ตุลาคม",
            "พฤศจิกายน",
            "ธันวาคม",
          ],
          weekdays: [
            "อาทิตย์",
            "จันทร์",
            "อังคาร",
            "พุธ",
            "พฤหัสบดี",
            "ศุกร์",
            "เสาร์",
          ],
          weekdaysShort: ["อา", "จ", "อ", "พ", "พฤ", "ศ", "ส"],
        },
        toString(date, format) {
          const y = date.getFullYear();
          const m = String(date.getMonth() + 1).padStart(2, "0");
          const d = String(date.getDate()).padStart(2, "0");
          return `${d}/${m}/${y}`;
        },
        onSelect: onSelectCallback,
      });
    };

    const compressImage = function (file, quality = 0.8) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.readAsDataURL(file);
        r.onload = (e) => {
          const i = new Image();
          i.src = e.target.result;
          i.onload = () => {
            const c = document.createElement("canvas");
            let w = i.width,
              h = i.height,
              m = 1200;
            if (w > m) {
              h *= m / w;
              w = m;
            }
            c.width = w;
            c.height = h;
            c.getContext("2d").drawImage(i, 0, 0, w, h);
            resolve(c.toDataURL("image/jpeg", quality).split(",")[1]);
          };
          i.onerror = reject;
        };
        r.onerror = reject;
      });
    };

    const formatDriveUrl = function (url) {
      if (!url) return "";
      if (url.startsWith("data:")) return url;
      try {
        let id = null;
        if (url.indexOf("/d/") !== -1) {
          const match = url.match(/\/d\/([a-zA-Z0-9_-]{25,})[/?#\s]?/);
          if (match) id = match[1];
        } else if (url.indexOf("id=") !== -1) {
          const match = url.match(/id=([a-zA-Z0-9_-]{25,})[&#\s]?/);
          if (match) id = match[1];
        }
        if (id)
          return "https://drive.google.com/thumbnail?id=" + id + "&sz=w1000";
        return url;
      } catch (e) {
        return url;
      }
    };

    return {
      init: function () {
        // Register this controller to Router for Lifecycle management
        if (typeof Router !== 'undefined') {
          Router.register('page-dashboard', this);
        }
        this.initDatePickers();

        // โหลดครั้งแรกตอนเปิดแอป
        this.loadWorkList(true);
      },

      onShow: function () {
        Logger.log('📄 Dashboard: onShow');
        try {
          if (_pickers.main) _pickers.main.setDate(_currentDate, true);
          if (!_isLoaded) {
            Dashboard.loadWorkList(true);
          } else {
            Dashboard.renderFilteredList();
          }

          // ✨ อัปเดต UI (ป้ายเวลาและสถานะ) แบบเรียลไทม์ (ทุก 30 วินาที) เฉพาะตอนหน้า Dashboard แสดง
          if (!this._intervalId) {
            this._intervalId = setInterval(() => {
              if (Router.activePage === "page-dashboard" && _isLoaded) {
                Dashboard.renderFilteredList();
              }
            }, 30000);
          }
        } catch (e) {
          console.error('❌ Dashboard: onShow error', e);
          if (typeof UIManager !== 'undefined') {
            UIManager.showToast('เกิดข้อผิดพลาดในการโหลด Dashboard: ' + e.message, 'error');
          }
        }
      },

      initDatePickers: function () {
        _pickers.main = createPicker("dash-date-input", (date) => {
          _currentDate = date;
          Dashboard.updateDateDisplay();
          Dashboard.loadWorkList(true);
        });
        this.updateDateDisplay();
      },

      changeDate: function (days) {
        _currentDate.setDate(_currentDate.getDate() + days);
        if (_pickers.main) {
          _pickers.main.setDate(_currentDate);
        } else {
          this.updateDateDisplay();
          this.loadWorkList(true);
        }
      },

      updateDateDisplay: function () {
        const input = getEl("dash-date-input");
        if (input) input.value = toDisplayDate(_currentDate);
      },

      // ✨ อัปเดตฟังก์ชัน loadWorkList ใส่ Skeleton Loading
      loadWorkList: function (forceRefresh) {
        if (!forceRefresh && _isLoaded) {
          return;
        }
        var btn = getEl("btn-refresh-dashboard");
        if (btn) {
          btn.classList.add("is-loading");
          btn.disabled = true;
        }
        var empty = getEl("dash-empty");
        if (empty) empty.classList.add("hidden");

        var tbody = getEl("work-list-body");
        if (tbody) {
          let skeletonHtml = '';
          for (let i = 0; i < 6; i++) {
            skeletonHtml += `
              <tr class="h-16 border-b border-base-100">
                <td class="text-center"><div class="skeleton h-3 w-8 mx-auto bg-gray-200"></div></td>
                <td class="text-center"><div class="skeleton h-4 w-12 mx-auto bg-gray-200"></div></td>
                <td class="pl-4">
                  <div class="flex flex-col gap-1.5">
                    <div class="skeleton h-2 w-24 bg-gray-200"></div>
                    <div class="skeleton h-3 w-40 bg-gray-200"></div>
                  </div>
                </td>
                <td class="text-center"><div class="skeleton h-4 w-12 mx-auto bg-gray-200"></div></td>
                <td class="text-center"><div class="skeleton h-10 w-10 mx-auto rounded-lg bg-gray-200"></div></td>
                <td class="text-center"><div class="skeleton h-10 w-10 mx-auto rounded-lg bg-gray-200"></div></td>
                <td class="text-center"><div class="skeleton h-10 w-10 mx-auto rounded-lg bg-gray-200"></div></td>
                <td class="text-center"><div class="skeleton h-10 w-10 mx-auto rounded-lg bg-gray-200"></div></td>
                <td class="text-center"><div class="skeleton h-6 w-14 mx-auto rounded-full bg-gray-200"></div></td>
                <td class="text-center"><div class="skeleton h-5 w-16 mx-auto bg-gray-200"></div></td>
              </tr>
            `;
          }
          tbody.innerHTML = skeletonHtml;
        }

        return Server.call({ func: "apiGetWorkList", silent: true }, forceRefresh)
          .then(function (res) {
            if (res && res.success) {
              _allWorkData = res.data || [];
              _lastSyncTime = Date.now(); // ✨ เก็บเวลาล่าสุดที่ซิงค์สำเร็จ
              Dashboard.renderFilteredList();
              _isLoaded = true;
            } else {
              if (typeof UIManager !== "undefined")
                UIManager.showToast(
                  "Load Failed: " + (res ? res.message : "Unknown Error"),
                  "error",
                );
              if (tbody) tbody.innerHTML = "";
            }
          })
          .catch(function (err) {
            console.error(err);
            if (tbody) tbody.innerHTML = "";
          })
          .finally(function () {
            if (btn) {
              btn.classList.remove("is-loading");
              btn.disabled = false;
            }
          });
      },

      renderFilteredList: function () {
        var curDateStr = toInputDate(_currentDate);
        var filtered = _allWorkData.filter((item) => item.date === curDateStr);
        filtered.sort((a, b) => a.time.localeCompare(b.time));
        this.renderTable(filtered);
        this.updateStats(filtered);
      },

      formatTime: function (rawTime) {
        if (!rawTime) return "-";
        var str = String(rawTime);
        if (str.indexOf("T") !== -1) return str.split("T")[1].substring(0, 5);
        return str.substring(0, 5);
      },

      renderTable: function (data) {
        var tbody = getEl("work-list-body");
        var empty = getEl("dash-empty");
        if (!tbody) return;
        tbody.innerHTML = "";

        if (!data || data.length === 0) {
          if (empty) empty.classList.remove("hidden");
          return;
        }
        if (empty) empty.classList.add("hidden");

        var html = "";
        data.forEach(function (item, index) {

          var isDone = item.status === "DONE";
          var now = new Date();
          var matchTimeStr = item.date + "T" + item.time + ":00";
          var matchDate = new Date(matchTimeStr);
          var matchEndDate = new Date(matchDate.getTime() + 120 * 60 * 1000);
          var isTimeReached = now >= matchDate;
          var isMatchEnded = now >= matchEndDate;
          var hasStart =
            !!item.start_img &&
            (Array.isArray(item.start_img) ? item.start_img.length > 0 : true);

          // Status Widget
          var statusWidget = "";
          if (isDone)
            statusWidget =
              '<div class="flex flex-col items-center justify-center opacity-70"><div class="w-6 h-6 rounded-full bg-success text-white flex items-center justify-center mb-1 shadow-sm"><i class="fas fa-check text-[10px]"></i></div><span class="text-[9px] font-bold text-success tracking-wider">DONE</span></div>';
          else if (hasStart) {
            if (isMatchEnded)
              statusWidget =
                '<div class="flex flex-col items-center justify-center gap-1"><span class="badge badge-warning badge-sm text-white font-bold tracking-wider shadow-sm">ENDED</span><span class="text-[9px] text-warning/70">จบการแข่ง</span></div>';
            else if (isTimeReached)
              statusWidget =
                '<div class="flex flex-col items-center justify-center gap-1"><div class="flex items-center gap-1 animate-pulse"><span class="w-2 h-2 bg-red-500 rounded-full shadow-[0_0_8px_rgba(239,68,68,0.6)]"></span><span class="text-[9px] font-black text-red-500 tracking-wider">ON AIR</span></div></div>';
            else
              statusWidget =
                '<div class="flex flex-col items-center justify-center gap-1"><span class="badge badge-success badge-sm text-white font-bold tracking-wider shadow-sm">READY</span><span class="text-[9px] text-success/70">รอเวลาเริ่ม</span></div>';
          } else {
            if (isTimeReached)
              statusWidget =
                '<div class="flex flex-col items-center justify-center gap-1"><span class="badge badge-error badge-sm text-white font-bold tracking-wider shadow-sm">LATE</span><span class="text-[9px] text-error/70">เลยเวลาแข่ง</span></div>';
            else
              statusWidget =
                '<span class="badge badge-ghost badge-sm text-[10px] opacity-50">WAIT</span>';
          }

          var itemJson = encodeURIComponent(JSON.stringify(item));
          var actionWidget = '<div class="flex items-center justify-center gap-1.5 flex-wrap">';
          if (hasStart && !isDone) {
            var stopBtnClass = isTimeReached ? "btn-error hover:bg-red-600 text-white" : "btn-success hover:bg-green-600 text-white";
            actionWidget +=
              "<button onclick=\"Dashboard.openStopModal('" +
              item.id +
              '\')" class="btn btn-xs border-none shadow-sm ' +
              stopBtnClass +
              ' tooltip tooltip-left" data-tip="จบงาน / Stop"><i class="fas fa-stop"></i></button>';
          }

          actionWidget +=
            "<button onclick=\"DashboardChecklist.openChecklistModal('" +
            itemJson +
            '\', this)" class="btn btn-xs bg-teal-50 border border-teal-200 text-teal-600 hover:bg-teal-500 hover:text-white hover:border-teal-500 shadow-sm tooltip tooltip-left" data-tip="รายการตรวจสอบ (Checklist)">' +
            '<span class="loading loading-spinner loading-xs"></span><i class="fas fa-clipboard-check"></i></button>';

          actionWidget +=
            "<button onclick=\"Dashboard.openEditModal('" +
            itemJson +
            '\', \'all\')" class="btn btn-xs bg-slate-100 border border-slate-200 text-slate-500 hover:bg-primary hover:text-white hover:border-primary shadow-sm tooltip tooltip-left" data-tip="แก้ไขข้อมูล (Edit)"><i class="fas fa-pen"></i></button>';

          actionWidget += "</div>";

          var btnProof = function (imgData, label) {
            var count = 0;
            var firstUrl = "";

            if (Array.isArray(imgData)) {
              count = imgData.length;
              if (count > 0) firstUrl = imgData[0];
            } else if (imgData) {
              count = 1;
              firstUrl = imgData;
            }

            if (count === 0) {
              return (
                "<div onclick=\"Dashboard.openEditModal('" +
                itemJson +
                "', '" +
                label.toLowerCase().replace(" ", "-") +
                '\')" class="tooltip tooltip-bottom cursor-pointer w-10 h-10 rounded-lg bg-slate-50 border border-dashed border-slate-200 flex items-center justify-center mx-auto hover:bg-slate-100 hover:border-primary/30 transition-all group" data-tip="เพิ่ม ' + label + '">' +
                '<i class="fas fa-plus text-[10px] text-slate-300 group-hover:text-primary transition-colors"></i>' +
                "</div>"
              );
            }

            var validUrl = formatDriveUrl(firstUrl);
            var badge =
              count > 1
                ? '<span class="absolute -top-1 -right-1 bg-black text-white text-[8px] font-bold px-1 rounded-full shadow-md border border-white">+' +
                (count - 1) +
                "</span>"
                : "";

            return (
              "<div onclick=\"Dashboard.viewWorkImages('" +
              item.id +
              "', '" +
              label.toLowerCase() +
              '\')" class="tooltip tooltip-bottom cursor-pointer bg-white rounded-lg shadow-sm border border-base-200 p-0.5 inline-block relative group" data-tip="ดูรูป ' +
              label +
              " (" +
              count +
              ')">' +
              '<img src="' +
              validUrl +
              '" class="h-10 w-10 object-cover rounded-md" onerror="this.onerror=null;this.src=\'https://placehold.co/40x40?text=Err\'">' +
              badge +
              "</div>"
            );
          };

          // ✨ คำนวณเวลา Plan Start (-2 ชม.)
          var matchTimeDisplay = Dashboard.formatTime(item.time);
          var planTimeDisplay = "";
          if (matchTimeDisplay && matchTimeDisplay !== "-") {
            var parts = matchTimeDisplay.split(":");
            var h = parseInt(parts[0], 10) - 2;
            if (h < 0) h += 24;
            planTimeDisplay = String(h).padStart(2, "0") + ":" + parts[1];
          }

          // 1. คอลัมน์เวลา (เอาป้ายแดงออก ให้เหลือแค่ตัวเลขคลีนๆ)
          var timeColumnHtml = '<div class="font-mono text-[14px] sm:text-[15px] font-extrabold text-slate-700 tracking-tight">' + matchTimeDisplay + '</div>';

          // 2. คอลัมน์รายการแข่งขัน
          var matchColumnHtml =
            '<div class="flex flex-col justify-center h-full min-w-0 pr-2">' +
            // บรรทัดบน: คู่แข่งขัน (เด่นกว่ากางได้เต็มที่)
            '<div class="font-bold text-[13px] text-slate-800 flex items-center gap-1.5 w-full mb-0.5">' +
            '<div class="truncate">' + (hasStart ? '<span class="text-primary">' + item.home + "</span>" : item.home) + '</div>' +
            '<span class="text-[10px] text-slate-300 font-black shrink-0 px-1">vs</span>' +
            '<div class="truncate">' + (hasStart ? '<span class="text-primary">' + item.away + "</span>" : item.away) + '</div>' +
            '</div>' +
            // บรรทัดล่าง: ลีก (เล็กและไม่เด่น)
            '<div class="flex items-center gap-2">' +
            '<span class="text-[9px] text-slate-400 font-normal truncate max-w-[200px]">' + (item.league || "-") + '</span>' +
            '</div>' +
            '</div>';

          // 3. คอลัมน์ Plan Start
          var planColumnHtml = planTimeDisplay ?
            '<div class="font-mono text-[12px] sm:text-[13px] font-bold text-red-500 bg-red-50 px-1.5 py-1 rounded inline-block border border-red-100 shadow-sm">' + planTimeDisplay + '</div>' :
            '<div class="text-[13px] text-gray-300">-</div>';

          // ประกอบร่างลงตาราง
          html +=
            '<tr class="hover:bg-blue-50/40 transition-colors border-b border-gray-100 last:border-none duration-200 group">' +
            '<td class="text-center align-middle">' + timeColumnHtml + '</td>' +
            '<td class="text-center align-middle">' + planColumnHtml + '</td>' +
            '<td class="pl-4 align-middle overflow-hidden w-auto min-w-[200px]">' + matchColumnHtml + '</td>' +
            '<td class="text-center align-middle px-1 overflow-hidden"><span class="inline-block px-2 py-1 max-w-[100px] truncate rounded text-[10px] font-mono font-bold bg-white border border-slate-200 text-slate-600 shadow-sm" title="' + (item.channel || "-").replace(/"/g, '&quot;') + '">' + (item.channel || "-") + '</span></td>' +
            '<td class="text-center align-middle w-24 py-2">' + btnProof(item.start_mono || (index === 0 ? item.start_img : ""), "Start Mono") + '</td>' +
            '<td class="text-center align-middle w-24 py-2">' + btnProof(item.start_ais, "Start AIS") + '</td>' +
            '<td class="text-center align-middle w-24 py-2">' + btnProof(item.stop_mono || (index === 0 ? item.stop_img : ""), "Stop Mono") + '</td>' +
            '<td class="text-center align-middle w-24 py-2">' + btnProof(item.stop_ais, "Stop AIS") + '</td>' +
            '<td class="text-center align-middle w-24">' + statusWidget + '</td>' +
            '<td class="text-center align-middle w-40 px-2">' + actionWidget + "</td></tr>";
        });

        tbody.innerHTML = html;
      },

      updateStats: function (data) {
        var now = new Date();
        var live = 0;
        var ready = 0;
        var done = 0;

        data.forEach(function (item) {
          var isDone = item.status === "DONE";
          if (isDone) {
            done++;
            return;
          }

          var matchTimeStr = item.date + "T" + item.time + ":00";
          var matchDate = new Date(matchTimeStr);
          var matchEndDate = new Date(matchDate.getTime() + 120 * 60 * 1000);
          var isTimeReached = now >= matchDate;
          var isMatchEnded = now >= matchEndDate;
          var hasStart = !!item.start_img && (Array.isArray(item.start_img) ? item.start_img.length > 0 : true);

          if (hasStart) {
            if (!isTimeReached) {
              ready++;
            } else if (!isMatchEnded) {
              live++;
            }
          }
        });

        var liveEl = getEl("stat-live");
        if (liveEl) liveEl.innerText = live;
        var readyEl = getEl("stat-ready");
        if (readyEl) readyEl.innerText = ready;
        var doneEl = getEl("stat-done");
        if (doneEl) doneEl.innerText = done;
      },

      // --- Image Management Functions ---

      resetImages: function (mode) {
        _workImages[mode] = [];
        this.renderGallery(mode);
      },

      addImages: function (mode, items) {
        if (!items || items.length === 0) return;

        Array.from(items).forEach((item) => {
          if (item instanceof File) {
            _workImages[mode].push({ type: "file", source: item });
          } else if (typeof item === "string") {
            _workImages[mode].push({ type: "url", source: item });
          }
        });
        this.renderGallery(mode);
      },

      renderGallery: function (mode) {
        const container = getEl("gallery-" + mode);
        const countEl = getEl(mode === "stop-quick" ? "" : "count-" + mode);
        const images = _workImages[mode];
        if (countEl) countEl.innerText = images.length + " รูป";
        if (!container) return;
        container.innerHTML = "";
        if (images.length === 0) return;

        images.forEach((imgObj, index) => {
          const div = document.createElement("div");
          div.className =
            "relative group w-full aspect-square bg-gray-100 rounded-lg border border-gray-200 overflow-hidden";
          let src =
            imgObj.type === "file"
              ? URL.createObjectURL(imgObj.source)
              : formatDriveUrl(imgObj.source);

          div.innerHTML = `
                        <img src="${src}" class="w-full h-full object-cover cursor-pointer hover:opacity-90 transition-opacity" onclick="Dashboard.viewGalleryFromEdit('${mode}', ${index})">
                        <button type="button" onclick="Dashboard.removeImage('${mode}', ${index})" class="absolute top-1 right-1 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center shadow-md hover:bg-red-600 transition-colors z-10">
                            <i class="fas fa-times text-[10px]"></i>
                        </button>
                    `;
          container.appendChild(div);
        });
      },

      // --- View Image & Gallery Functions ---

      viewGalleryFromEdit: function (mode, startIndex) {
        const images = _workImages[mode];
        if (!images || images.length === 0) return;

        const urlList = images.map((img) =>
          img.type === "file" ? URL.createObjectURL(img.source) : img.source,
        );
        this.viewImage(urlList, startIndex);
      },

      viewWorkImages: function (id, type) {
        // type might be 'start mono', 'start ais', etc.
        const item = _allWorkData.find((d) => d.id === id);
        if (!item) return;

        let key = type.toLowerCase().replace(" ", "_");
        let rawData = item[key];

        // Fallback for combined view if specific columns are empty
        if (!rawData && (type === "start" || type === "stop")) {
          rawData = type === "start" ? item.start_img : item.stop_img;
        }

        let list = [];
        if (Array.isArray(rawData)) list = rawData;
        else if (rawData) list = [rawData];

        if (list.length > 0) this.viewImage(list, 0);
      },

      viewImage: function (source, startIndex = 0) {
        if (!source) return;

        _galleryList = Array.isArray(source) ? source : [source];
        _galleryIndex = startIndex;

        if (_galleryList.length === 0) return;

        this.updatePreviewUI();
        getEl("modal-view-image").showModal();
      },

      updatePreviewUI: function () {
        const imgEl = getEl("img-preview-target");
        const prevBtn = getEl("btn-gallery-prev");
        const nextBtn = getEl("btn-gallery-next");
        const counter = getEl("gallery-counter");

        const currentUrl = _galleryList[_galleryIndex];
        imgEl.src = formatDriveUrl(currentUrl);

        if (_galleryList.length > 1) {
          prevBtn.classList.remove("hidden");
          nextBtn.classList.remove("hidden");
          counter.classList.remove("hidden");
          counter.innerText = `${_galleryIndex + 1} / ${_galleryList.length}`;
        } else {
          prevBtn.classList.add("hidden");
          nextBtn.classList.add("hidden");
          counter.classList.add("hidden");
        }
      },

      navGallery: function (direction) {
        let newIndex = _galleryIndex + direction;
        if (newIndex < 0) newIndex = _galleryList.length - 1;
        if (newIndex >= _galleryList.length) newIndex = 0;

        _galleryIndex = newIndex;
        this.updatePreviewUI();
      },

      removeImage: function (mode, index) {
        _workImages[mode].splice(index, 1);
        this.renderGallery(mode);
      },

      handleFileSelect: function (input, mode) {
        if (input.files && input.files.length > 0) {
          this.addImages(mode, input.files);
          input.value = "";
        }
      },

      triggerPaste: async function (mode) {
        var modalId =
          mode === "stop-quick" ? "modal-stop-work" : "modal-add-work";
        var areaId = "paste-area-" + mode;
        var area = getEl(areaId);

        if (area) {
          area.style.width = "1px";
          area.style.height = "1px";
          area.style.opacity = "0";
          area.style.position = "fixed";
          area.focus();
          if (!area.hasAttribute("data-listening")) {
            area.addEventListener("paste", (e) =>
              Dashboard.handlePasteEvent(e, mode),
            );
            area.setAttribute("data-listening", "true");
          }
        }

        try {
          const clipboardItems = await navigator.clipboard.read();
          let imageFound = false;
          for (const item of clipboardItems) {
            const imageTypes = item.types.filter((type) =>
              type.startsWith("image/"),
            );
            for (const type of imageTypes) {
              const blob = await item.getType(type);
              const file = new File([blob], "pasted_image.png", {
                type: "image/png",
              });
              this.addImages(mode, [file]);
              showToastInModal("วางรูปสำเร็จ", "success", modalId);
              imageFound = true;
              break;
            }
            if (imageFound) break;
          }
          if (!imageFound)
            showToastInModal("ไม่พบรูปภาพใน Clipboard", "warning", modalId);
        } catch (err) {
          console.warn("Clipboard API failed:", err);
          showToastInModal("กด Ctrl+V เพื่อวางรูป", "info", modalId);
        }
      },

      handlePasteEvent: function (e, mode) {
        var items = (e.clipboardData || e.originalEvent.clipboardData).items;
        for (var i = 0; i < items.length; i++) {
          if (items[i].type.indexOf("image") !== -1) {
            var blob = items[i].getAsFile();
            this.addImages(mode, [blob]);
            e.preventDefault();
            var modalId =
              mode === "stop-quick" ? "modal-stop-work" : "modal-add-work";
            showToastInModal("วางรูปเรียบร้อย", "success", modalId);
            return;
          }
        }
      },

      // --- Form Logic ---

      // ✨ ฟังก์ชันคำนวณเวลา Plan Start (-2 ชม.)
      calcPlanStart: function () {
        var timeInput = getEl("input-time");
        var displayWrap = getEl("plan-start-display");
        var displayTime = getEl("plan-start-time");

        if (!timeInput || !timeInput.value) {
          if (displayWrap) displayWrap.classList.add("hidden");
          return;
        }

        // แยกชั่วโมงและนาที
        var parts = timeInput.value.split(":");
        var hours = parseInt(parts[0], 10);
        var mins = parts[1];

        // ลบย้อนหลัง 2 ชั่วโมง
        hours = hours - 2;

        // จัดการกรณีข้ามเที่ยงคืน (เช่น 01:00 ลบ 2 ชม = 23:00)
        var isCrossMidnight = false;
        if (hours < 0) {
          hours = hours + 24;
          isCrossMidnight = true;
        }

        var formattedHours = String(hours).padStart(2, "0");
        var timeStr = formattedHours + ":" + mins;

        if (isCrossMidnight) {
          timeStr += ' <span class="text-[9px] font-normal text-error/70 ml-0.5">(เมื่อวาน)</span>';
        }

        if (displayTime) displayTime.innerHTML = timeStr;
        if (displayWrap) displayWrap.classList.remove("hidden");
      },

      openAddModal: function () {
        this._editMode = "new";
        getEl("form-add-work").reset();
        getEl("input-edit-id").value = "";
        getEl("modal-title-work").innerText = "เริ่มงานใหม่ (New Work)";

        getEl("section-import").classList.remove("hidden");
        getEl("form-add-work").classList.remove("lg:grid-cols-2");
        getEl("form-add-work").classList.add("lg:grid-cols-3");

        // Hide stop sections in new mode
        if (getEl("section-img-stop-mono")) getEl("section-img-stop-mono").classList.add("hidden");
        if (getEl("section-img-stop-ais")) getEl("section-img-stop-ais").classList.add("hidden");
        getEl("btn-delete-work").classList.add("hidden");
        getEl("btn-submit-start").innerHTML =
          '<span class="loading loading-spinner loading-xs hidden" id="spinner-submit-start"></span><i class="fas fa-save"></i> <span>บันทึกและเริ่มงาน</span>';

        var now = new Date();
        getEl("input-date").value = toInputDate(now);
        var HH = String(now.getHours()).padStart(2, "0");
        var ii = String(now.getMinutes()).padStart(2, "0");
        getEl("input-time").value = HH + ":" + ii;

        this.resetImages("start-mono");
        this.resetImages("start-ais");
        this.resetImages("stop-mono");
        this.resetImages("stop-ais");

        getEl("import-date-picker").value = toInputDate(now);
        if (_lastCalendarFetchDate !== toInputDate(now)) {
          DashboardCalendar.fetchCalendarEvents();
        } else {
          var list = getEl("calendar-picker-list");
          if (!list || list.children.length === 0) DashboardCalendar.fetchCalendarEvents();
        }

        getEl("modal-add-work").showModal();
        this.checkFormInput();
        this.calcPlanStart(); // ✨ สั่งคำนวณ Plan Start ตอนเปิดหน้า
      },

      openEditModal: function (itemEncoded, mode) {
        this._editMode = mode || "all";
        var item = JSON.parse(decodeURIComponent(itemEncoded));
        getEl("input-edit-id").value = item.id;
        getEl("input-date").value = item.date;
        getEl("input-time").value = item.time;
        getEl("input-league").value = item.league;
        getEl("input-home").value = item.home;
        getEl("input-away").value = item.away;
        getEl("input-channel").value = item.channel;

        getEl("modal-title-work").innerText = "แก้ไขข้อมูล (Edit)";
        getEl("section-import").classList.add("hidden");
        getEl("form-add-work").classList.remove("lg:grid-cols-3");
        getEl("form-add-work").classList.add("lg:grid-cols-2");
        getEl("btn-delete-work").classList.remove("hidden");
        getEl("btn-submit-start").innerHTML =
          '<span class="loading loading-spinner loading-xs hidden" id="spinner-submit-start"></span><i class="fas fa-save"></i> <span>บันทึกการแก้ไข</span>';

        this.resetImages("start-mono");
        this.resetImages("start-ais");
        this.resetImages("stop-mono");
        this.resetImages("stop-ais");

        const pushToGallery = (mode, data) => {
          if (Array.isArray(data)) {
            this.addImages(mode, data);
          } else if (data) {
            this.addImages(mode, [data]);
          }
        };

        pushToGallery("start-mono", item.start_mono || item.start_img);
        pushToGallery("stop-mono", item.stop_mono || item.stop_img);
        pushToGallery("start-ais", item.start_ais);
        pushToGallery("stop-ais", item.stop_ais);

        // Show/hide sections
        var sections = ['section-img-start-mono', 'section-img-start-ais', 'section-img-stop-mono', 'section-img-stop-ais'];
        sections.forEach(function (s) { if (getEl(s)) getEl(s).classList.remove('hidden'); });

        if (mode === "stop") {
          if (getEl('section-img-start-mono')) getEl('section-img-start-mono').classList.add('hidden');
          if (getEl('section-img-start-ais')) getEl('section-img-start-ais').classList.add('hidden');
        }

        getEl("modal-add-work").showModal();
        this.calcPlanStart(); // ✨ สั่งคำนวณ Plan Start ตอนเปิดหน้า

        // ✨ Shortcut: Scroll to specific section if mode is provided
        if (mode && mode !== "all") {
          setTimeout(() => {
            const sectionId = "section-img-" + mode;
            const target = getEl(sectionId);
            if (target) {
              target.scrollIntoView({ behavior: 'smooth', block: 'center' });
              target.classList.add("ring-2", "ring-primary", "ring-offset-2");
              setTimeout(() => target.classList.remove("ring-2", "ring-primary", "ring-offset-2"), 2000);
            }
          }, 300);
        }
      },

      checkFormInput: function () {
        var home = getEl("input-home").value.trim();
        var away = getEl("input-away").value.trim();
        var sectionMono = getEl("section-img-start-mono");
        var sectionAis = getEl("section-img-start-ais");

        if (this._editMode === "new") {
          if (home && away) {
            if (sectionMono) sectionMono.classList.remove("hidden");
            if (sectionAis) sectionAis.classList.remove("hidden");
          } else {
            if (sectionMono) sectionMono.classList.add("hidden");
            if (sectionAis) sectionAis.classList.add("hidden");
          }
        }
      },

      handleDeleteWork: function () {
        var id = getEl("input-edit-id").value;
        if (!id) return;
        Swal.fire({
          title: "ยืนยันการลบ?",
          text: "คุณต้องการลบรายการนี้ใช่หรือไม่",
          icon: "warning",
          showCancelButton: true,
          confirmButtonColor: "#d33",
          cancelButtonColor: "#3085d6",
          confirmButtonText: "ใช่, ลบรายการ",
          cancelButtonText: "ยกเลิก",
          target: getEl("modal-add-work"),
        }).then((result) => {
          if (result.isConfirmed) {
            var btn = getEl("btn-delete-work");
            var btnTxt = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML =
              '<span class="loading loading-spinner loading-xs"></span> กำลังลบ...';
            Server.call({ func: "apiDeleteWorkItem", silent: true }, id)
              .then((res) => {
                if (res && res.success) {
                  showToastInModal(
                    "ลบรายการเรียบร้อย",
                    "success",
                    "modal-add-work",
                  );
                  setTimeout(() => {
                    getEl("modal-add-work").close();
                    Dashboard.loadWorkList(true);
                  }, 1000);
                } else {
                  throw new Error(res ? res.message : "Unknown Error");
                }
              })
              .catch((e) =>
                Swal.fire({
                  title: "Error",
                  text: e.message,
                  icon: "error",
                  target: getEl("modal-add-work"),
                }),
              )
              .finally(() => {
                btn.disabled = false;
                btn.innerHTML = btnTxt;
              });
          }
        });
      },

      handleSubmitWork: function () {
        var form = getEl("form-add-work");
        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        var id = getEl("input-edit-id").value;
        var isEdit = !!id;
        var payload = {
          id: id,
          date: getEl("input-date").value,
          time: getEl("input-time").value,
          league: getEl("input-league").value,
          home: getEl("input-home").value,
          away: getEl("input-away").value,
          channel: getEl("input-channel").value,
          startMono: [],
          startAis: [],
          stopMono: [],
          stopAis: [],
        };

        var btn = getEl("btn-submit-start");
        var spinner = getEl("spinner-submit-start");
        btn.disabled = true;
        spinner.classList.remove("hidden");

        const processImages = async (mode) => {
          const results = [];
          if (!_workImages[mode]) return results;
          for (const item of _workImages[mode]) {
            if (item.type === "file") {
              const b64 = await compressImage(item.source);
              results.push({ type: "base64", data: b64 });
            } else {
              results.push({ type: "url", data: item.source });
            }
          }
          return results;
        };

        Promise.all([
          processImages("start-mono"),
          processImages("start-ais"),
          processImages("stop-mono"),
          processImages("stop-ais"),
        ])
          .then(([smRes, saRes, emRes, eaRes]) => {
            payload.startMono = smRes;
            payload.startAis = saRes;
            payload.stopMono = emRes;
            payload.stopAis = eaRes;

            const apiFunc = isEdit ? "apiUpdateWorkItem" : "apiCreateWorkItem";
            return Server.call({ func: apiFunc, silent: true }, payload);
          })
          .then((res) => {
            if (res && res.success) {
              showToastInModal(
                isEdit ? "แก้ไขข้อมูลสำเร็จ" : "เริ่มงานสำเร็จ",
                "success",
                "modal-add-work",
              );
              setTimeout(() => {
                getEl("modal-add-work").close();
                Dashboard.loadWorkList(true);
              }, 1000);
            } else {
              throw new Error(res ? res.message : "Unknown Error");
            }
          })
          .catch((e) => {
            Swal.fire({
              title: "Error",
              text: e.message,
              icon: "error",
              target: getEl("modal-add-work"),
            });
          })
          .finally(() => {
            btn.disabled = false;
            spinner.classList.add("hidden");
          });
      },

      openStopModal: function (id) {
        getEl("inp-stop-id-quick").value = id;
        this.resetImages("stop-mono-quick");
        this.resetImages("stop-ais-quick");
        getEl("modal-stop-work").showModal();
      },

      submitStopWork: function (skipImage) {
        var id = getEl("inp-stop-id-quick").value;
        var btn = getEl("btn-submit-stop");
        var btnSkip = getEl("btn-submit-stop-skip");
        var spinner = getEl("spinner-submit-stop");

        if (btn) btn.disabled = true;
        if (btnSkip) btnSkip.disabled = true;
        if (spinner) spinner.classList.remove("hidden");

        const processQuickStop = async (mode) => {
          const results = [];
          if (!skipImage && _workImages[mode]) {
            for (const item of _workImages[mode]) {
              if (item.type === "file") {
                const b64 = await compressImage(item.source);
                results.push({ type: "base64", data: b64 });
              }
            }
          }
          return results;
        };

        Promise.all([
          processQuickStop("stop-mono-quick"),
          processQuickStop("stop-ais-quick"),
        ]).then(([monoImgs, aisImgs]) => {
          Server.call(
            { func: "apiStopWorkItem", silent: true },
            {
              id: id,
              stopMono: monoImgs,
              stopAis: aisImgs,
              isSkipImage: skipImage,
            },
          )
            .then((res) => {
              if (res && res.success) {
                showToastInModal(
                  "จบงานเรียบร้อย!",
                  "success",
                  "modal-stop-work",
                );
                setTimeout(() => {
                  getEl("modal-stop-work").close();
                  Dashboard.loadWorkList(true);
                }, 1000);
              } else {
                throw new Error(res ? res.message : "Unknown Error");
              }
            })
            .catch((e) => {
              Swal.fire({
                title: "Error",
                text: e.message,
                icon: "error",
                target: getEl("modal-stop-work"),
              });
            })
            .finally(() => {
              if (btn) btn.disabled = false;
              if (btnSkip) btnSkip.disabled = false;
              if (spinner) spinner.classList.add("hidden");
            });
        });
      },

      // Calendar Fetch Logic moved to JS_Dashboard_Calendar.html

      // Checklist logic has been moved to JS_Dashboard_Checklist.html
      // Calendar Fetch Logic moved to JS_Dashboard_Calendar.html
      // Accessors for external modules:
      getAllWorkData: function () { return _allWorkData; },
      setLastCalendarFetchDate: function (val) { _lastCalendarFetchDate = val; }
    };
  })();
</script>
